<html lang="zh" id="html-root">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生模拟游戏</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f3ee;--surface:#fdfaf6;--surface2:#f0ebe3;
  --border:#e2d9ce;--border2:#cec3b5;
  --text:#2a2420;--muted:#7a6e63;--faint:#b0a497;
  --sage:#6b8f71;--sage-light:#e8f2ea;
  --terracotta:#b5715a;--terra-light:#faf0eb;--sand:#c9b89a;
}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.lang-switch{position:fixed;top:1.25rem;right:1.25rem;z-index:999;display:flex;background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.07)}
.lang-btn{background:transparent;border:none;padding:0.35rem 0.85rem;font-size:12px;cursor:pointer;font-family:inherit;color:var(--muted);transition:all 0.18s;letter-spacing:0.04em}
.lang-btn.active{background:var(--text);color:var(--bg)}

/* ── 首页 ── */
#page-home{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem 1.5rem;text-align:center;animation:fadeIn 0.8s ease}
.home-label{font-size:11px;letter-spacing:0.16em;color:var(--faint);text-transform:uppercase;margin-bottom:1.75rem}
.home-title{font-size:clamp(1.9rem,5.5vw,2.8rem);font-weight:300;line-height:1.25;margin-bottom:0.85rem;color:var(--text)}
.home-title em{font-style:italic;color:var(--terracotta)}
.home-sub{font-size:14px;color:var(--muted);line-height:1.8;max-width:400px;margin:0 auto 2.5rem}

/* 两个入口卡片 */
.entry-row{display:flex;flex-direction:column;gap:10px;width:100%;max-width:440px;margin-bottom:2rem}
.entry-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.35rem;text-align:left;cursor:pointer;transition:all 0.2s;position:relative}
.entry-card:hover{border-color:var(--sage);background:var(--sage-light);transform:translateY(-1px)}
.entry-top{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.4rem}
.entry-icon{font-size:1.1rem}
.entry-name{font-size:0.92rem;font-weight:500;color:var(--text)}
.entry-desc{font-size:0.78rem;color:var(--muted);line-height:1.6;padding-left:1.75rem}
.entry-arrow{position:absolute;right:1.25rem;top:50%;transform:translateY(-50%);color:var(--faint);transition:all 0.2s}
.entry-card:hover .entry-arrow{color:var(--sage);transform:translateY(-50%) translateX(3px)}

/* 匹配输入（点击后展开） */
.match-box{width:100%;max-width:440px;display:none;flex-direction:column;gap:10px;margin-bottom:2rem;animation:fadeIn 0.3s ease}
.match-box.open{display:flex}
.confuse-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;font-size:14px;color:var(--text);font-family:inherit;resize:none;outline:none;line-height:1.7;transition:border-color 0.2s}
.confuse-input::placeholder{color:var(--faint)}
.confuse-input:focus{border-color:var(--sage)}
.match-actions{display:flex;gap:8px}
.match-submit{flex:1;background:var(--text);color:var(--bg);border:none;border-radius:8px;padding:0.75rem;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity 0.2s}
.match-submit:hover{opacity:0.82}
.match-cancel{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:0.75rem 1rem;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit}
.match-cancel:hover{border-color:var(--sage);color:var(--sage)}

/* 探索面板（点击后展开） */
.explore-box{width:100%;max-width:440px;display:none;flex-direction:column;margin-bottom:2rem;animation:fadeIn 0.3s ease}
.explore-box.open{display:flex}
.explore-title{font-size:11px;color:var(--faint);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.85rem;text-align:left}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:0.85rem}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 0.9rem;text-align:left;position:relative;overflow:hidden;transition:all 0.2s}
.cat-card.live{cursor:pointer}
.cat-card.live:hover{border-color:var(--sage);background:var(--sage-light);transform:translateY(-2px)}
.cat-card.soon{opacity:0.5;cursor:default}
.cat-icon{font-size:1.25rem;margin-bottom:0.5rem;display:block}
.cat-name{font-size:0.85rem;font-weight:500;color:var(--text);margin-bottom:0.25rem}
.cat-desc{font-size:0.72rem;color:var(--muted);line-height:1.55}
.cat-badge{position:absolute;top:0.6rem;right:0.6rem;font-size:0.56rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;padding:0.15rem 0.45rem;border-radius:100px}
.badge-live{background:var(--sage-light);color:var(--sage)}
.badge-soon{background:var(--surface2);color:var(--faint)}
.explore-back{background:transparent;border:none;font-size:12px;color:var(--faint);cursor:pointer;font-family:inherit;padding:0.4rem}
.explore-back:hover{color:var(--muted)}

/* 计数器 */
.counter-row{display:flex;max-width:440px;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.counter-item{flex:1;padding:0.85rem 0.5rem;text-align:center;border-right:1px solid var(--border)}
.counter-item:last-child{border-right:none}
.counter-num{font-size:1.4rem;font-weight:500;color:var(--text);line-height:1;margin-bottom:0.25rem}
.counter-label{font-size:0.65rem;color:var(--muted);letter-spacing:0.05em}

/* ── 初心页 ── */
#page-manifesto{min-height:100vh;display:none;flex-direction:column;justify-content:center;align-items:center;padding:2rem;background:var(--bg);animation:fadeIn 0.6s ease}
.mf-wrap{width:100%;max-width:460px}
.mf-top{text-align:center;margin-bottom:2rem}
.mf-eyebrow{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--faint);margin-bottom:0.6rem}
.mf-heading{font-size:1.4rem;font-weight:300;color:var(--text);line-height:1.3;margin-bottom:0.4rem}
.mf-sub{font-size:13px;color:var(--faint)}
.mf-list{margin-bottom:2rem}
.mf-item{display:flex;gap:0.85rem;padding:0.85rem 0;border-bottom:1px solid var(--border);align-items:flex-start;animation:fadeIn 0.4s ease both}
.mf-item:first-child{border-top:1px solid var(--border)}
.mf-num{font-size:11px;color:var(--sage);font-weight:500;min-width:18px;padding-top:2px}
.mf-text{font-size:13.5px;color:var(--muted);line-height:1.75}
.mf-text strong{color:var(--text);font-weight:500}
.mf-enter{width:100%;background:var(--sage);color:#fff;border:none;border-radius:10px;padding:0.85rem;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-bottom:0.75rem}
.mf-enter:hover{opacity:0.85}
.mf-skip{width:100%;background:transparent;border:none;font-size:13px;color:var(--faint);cursor:pointer;font-family:inherit}
.mf-skip:hover{color:var(--muted)}

/* ── 自我描述 ── */
#page-profile{min-height:100vh;display:none;flex-direction:column;justify-content:center;align-items:center;padding:2rem;background:var(--bg);animation:fadeIn 0.6s ease}
.profile-wrap{width:100%;max-width:460px}
.profile-progress{display:flex;gap:5px;justify-content:center;margin-bottom:2rem}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.pdot.done{background:var(--sage)}
.pdot.active{background:var(--sand)}
.profile-q{font-size:18px;font-weight:400;color:var(--text);line-height:1.45;margin-bottom:0.5rem;text-align:center}
.profile-hint{font-size:13px;color:var(--faint);text-align:center;margin-bottom:1.5rem}
.profile-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.75rem;justify-content:center}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:0.5rem 1.1rem;font-size:14px;color:var(--muted);cursor:pointer;transition:all 0.18s;font-family:inherit}
.chip:hover{border-color:var(--sage);color:var(--sage)}
.chip.sel{background:var(--sage);border-color:var(--sage);color:#fff}
.chip.multi.sel{background:var(--sage-light);border-color:var(--sage);color:var(--sage)}
.profile-actions{display:flex;gap:8px;justify-content:center}
.profile-next{background:var(--text);color:var(--bg);border:none;border-radius:8px;padding:0.7rem 1.75rem;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.profile-next:hover{opacity:0.82}
.profile-skip{background:transparent;border:none;font-size:13px;color:var(--faint);cursor:pointer;font-family:inherit;padding:0.6rem 1rem}

/* ── 匹配页 ── */
#page-match{min-height:100vh;display:none;flex-direction:column;justify-content:center;align-items:center;padding:2rem;text-align:center;background:var(--bg)}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--sand);margin:0 3px;animation:pulse 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:0.2s}
.dots span:nth-child(3){animation-delay:0.4s}
.match-thinking{margin-bottom:2.5rem}
.match-label{font-size:11px;letter-spacing:0.16em;color:var(--faint);text-transform:uppercase;margin-bottom:2rem;margin-top:1.5rem}
.match-card{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;text-align:left;margin-bottom:1.25rem;cursor:pointer;transition:all 0.2s}
.match-card.sel{border-color:var(--sage)}
.match-img{width:100%;height:155px;object-fit:cover;opacity:0.85;display:block}
.match-body{padding:1.25rem}
.match-tag{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--sage);margin-bottom:0.5rem}
.match-title{font-size:1.1rem;font-weight:500;line-height:1.3;margin-bottom:0.5rem;color:var(--text)}
.match-desc{font-size:13px;color:var(--muted);line-height:1.7}
.match-meta{display:flex;gap:0.5rem;margin-top:0.85rem;font-size:11px;color:var(--faint);flex-wrap:wrap}
.match-all{width:100%;max-width:460px;text-align:left;margin-bottom:1.25rem}
.match-all-label{font-size:11px;color:var(--faint);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.75rem}
.match-mini{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.match-mini:hover{border-color:var(--sage);background:var(--sage-light)}
.match-mini-img{width:44px;height:44px;border-radius:6px;object-fit:cover;flex-shrink:0}
.match-mini-tag{font-size:10px;color:var(--sage);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2px}
.match-mini-title{font-size:13px;color:var(--text)}
.start-btn{width:100%;max-width:460px;background:var(--sage);color:#fff;border:none;border-radius:10px;padding:0.9rem;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.start-btn:hover{opacity:0.85}
.back-btn{margin-top:0.75rem;background:transparent;border:none;font-size:13px;color:var(--faint);cursor:pointer;font-family:inherit;padding:0.5rem}
.back-btn:hover{color:var(--muted)}

/* ── 游戏页 ── */
#page-game{display:none;background:var(--bg)}
#game-wrap{max-width:640px;margin:0 auto}
.scene-frame{position:relative;width:100%;min-height:420px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;animation:fadeIn 0.6s ease}
.scene-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.72}
.scene-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(247,243,238,1) 0%,rgba(247,243,238,0.7) 45%,rgba(247,243,238,0.05) 100%)}
.top-bar{position:absolute;top:0;left:0;right:0;z-index:2;padding:1.25rem 1.5rem 0;display:flex;justify-content:space-between;align-items:center}
.prog-wrap{flex:1;height:1.5px;background:rgba(0,0,0,0.1);border-radius:2px;overflow:hidden;margin-right:1rem}
.prog-fill{height:100%;background:var(--sage);border-radius:2px;transition:width 0.7s ease}
.loop-badge{font-size:10px;letter-spacing:0.1em;color:var(--muted);white-space:nowrap}
.scene-content{position:relative;z-index:2;padding:1.5rem 1.5rem 1.25rem}
.scene-tag{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--sage);margin-bottom:0.75rem}
.scene-body{font-size:15px;color:var(--text);line-height:1.9;margin-bottom:1.25rem}
.scene-body strong{font-weight:500}
.scene-body em{color:var(--terracotta);font-style:italic}
.nudge{font-size:12.5px;color:var(--muted);font-style:italic;margin-bottom:1.25rem;padding:0.75rem 1rem;background:var(--terra-light);border-radius:8px;border-left:2px solid var(--terracotta);line-height:1.7}
.pause-line{font-size:12.5px;color:var(--muted);font-style:italic;margin-bottom:1.25rem;padding:0.6rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;line-height:1.7}
.choices{display:flex;flex-direction:column;gap:10px;padding:0 1.5rem 2rem;background:var(--bg)}
.choice{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.15rem;cursor:pointer;text-align:left;font-size:14px;color:var(--text);line-height:1.65;transition:all 0.2s;font-family:inherit}
.choice:hover{background:var(--sage-light);border-color:var(--sage);transform:translateX(4px)}
.choice.comfort{background:var(--surface2);color:var(--muted)}
.choice.comfort:hover{border-color:var(--border2);transform:translateX(2px)}
.choice-label{font-size:10px;font-weight:500;color:var(--faint);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.ending-frame{position:relative;width:100%;min-height:280px;overflow:hidden;animation:fadeIn 0.6s ease;display:flex;flex-direction:column;justify-content:flex-end}
.ending-frame .scene-img{opacity:0.5}
.ending-frame .scene-overlay{background:linear-gradient(to top,rgba(247,243,238,1) 0%,rgba(247,243,238,0.75) 50%,rgba(247,243,238,0) 100%)}
.ending-content{position:relative;z-index:2;padding:1.75rem 1.5rem 0}
.ending-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--sage);margin-bottom:0.75rem}
.ending-title{font-size:22px;font-weight:400;color:var(--text);line-height:1.3}
.ending-body{padding:1.25rem 1.5rem 1.5rem;background:var(--bg)}
.ending-story{font-size:14.5px;color:var(--muted);line-height:1.95;margin-bottom:1rem}
.ending-story em{color:var(--text);font-style:normal;font-weight:500}
.ending-divider{height:1px;background:var(--border);margin:1.25rem 0}
.ending-insight{font-size:13.5px;color:var(--terracotta);line-height:1.8;font-style:italic;margin-bottom:1.75rem;padding:1rem 1.25rem;background:var(--terra-light);border-radius:10px}
.consult-area{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem;position:relative;overflow:hidden}
.consult-area::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--sage),var(--sand),var(--terracotta))}
.consult-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--sage);margin-bottom:0.6rem}
.consult-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:0.5rem;line-height:1.4}
.consult-desc{font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:1.1rem}
.consult-btn{display:inline-flex;align-items:center;gap:6px;background:var(--sage);color:#fff;border:none;border-radius:8px;padding:0.65rem 1.25rem;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:none}
.consult-btn:hover{opacity:0.85}
.consult-author{display:flex;align-items:center;gap:0.6rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.consult-avatar{width:32px;height:32px;border-radius:50%;background:var(--sage-light);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--sage);font-weight:500;flex-shrink:0;cursor:pointer;transition:transform 0.2s}
.consult-avatar:hover{transform:scale(1.1)}
.consult-author-name{font-size:12px;font-weight:500;color:var(--text)}
.consult-author-role{font-size:11px;color:var(--faint)}
.comments-area{margin-bottom:1.25rem}
.comments-title{font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint);margin-bottom:1rem}
.comment-list{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem}
.comment-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.9rem 1rem}
.comment-meta{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem}
.comment-av{width:22px;height:22px;border-radius:50%;background:var(--sage-light);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--sage);font-weight:500}
.comment-name{font-size:11px;color:var(--faint)}
.comment-body{font-size:13px;color:var(--muted);line-height:1.65}
.comment-input-row{display:flex;gap:8px;align-items:flex-end}
.comment-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;font-size:13px;color:var(--text);font-family:inherit;resize:none;outline:none;line-height:1.6}
.comment-input::placeholder{color:var(--faint)}
.comment-input:focus{border-color:var(--sage)}
.comment-send{background:var(--sage);color:#fff;border:none;border-radius:8px;padding:0.65rem 1rem;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.submit-area{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
.submit-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--faint);margin-bottom:0.4rem}
.submit-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:0.75rem}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;padding-bottom:3rem}
.btn-p{background:var(--text);color:var(--bg);border:none;border-radius:8px;padding:0.7rem 1.4rem;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-p:hover{opacity:0.8}
.btn-g{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:0.7rem 1.25rem;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit}
.btn-g:hover{border-color:var(--sage);color:var(--sage)}
/* 作者弹层 */
.author-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(42,36,32,0.45);align-items:center;justify-content:center;padding:1.5rem}
.author-overlay.open{display:flex}
.author-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;max-width:420px;width:100%;overflow:hidden;position:relative;animation:slideUp 0.25s ease}
.ac-cover{height:72px;background:linear-gradient(135deg,var(--sage-light),var(--terra-light));position:relative}
.ac-cover-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--sage),var(--sand),var(--terracotta))}
.ac-av{width:52px;height:52px;border-radius:50%;background:var(--sage-light);border:3px solid var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:500;color:var(--sage);position:absolute;bottom:-26px;left:1.5rem}
.ac-body{padding:2rem 1.5rem 1.5rem}
.ac-name{font-size:1rem;font-weight:500;color:var(--text);margin-bottom:0.2rem}
.ac-role{font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--sage);margin-bottom:1rem}
.ac-bio{font-size:0.86rem;color:var(--muted);line-height:1.85;margin-bottom:1.1rem}
.ac-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.1rem}
.ac-tag{font-size:0.66rem;font-weight:500;padding:0.22rem 0.65rem;border-radius:100px;color:var(--muted);background:var(--surface2);border:1px solid var(--border)}
.ac-links{display:flex;gap:8px;flex-wrap:wrap}
.ac-link{display:inline-flex;align-items:center;gap:5px;font-size:0.76rem;color:var(--sage);text-decoration:none;padding:0.38rem 0.85rem;border:1px solid var(--sage-light);border-radius:8px;background:var(--sage-light)}
.ac-close{position:absolute;top:0.75rem;right:0.75rem;background:rgba(0,0,0,0.12);border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* ── 邮件收集 ── */
.email-area{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.35rem 1.5rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.email-area-text{flex:1;min-width:160px}
.email-area-label{font-size:12px;font-weight:500;color:var(--text);margin-bottom:0.2rem}
.email-area-sub{font-size:11.5px;color:var(--faint);line-height:1.5}
.email-area-right{display:flex;gap:7px;width:100%;max-width:280px;flex-shrink:0}
.email-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.85rem;font-size:13px;color:var(--text);font-family:inherit;outline:none;min-width:0;transition:border-color 0.2s}
.email-input::placeholder{color:var(--faint)}
.email-input:focus{border-color:var(--sage)}
.email-send{background:var(--sage);color:#fff;border:none;border-radius:8px;padding:0.6rem 1rem;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity 0.2s;flex-shrink:0}
.email-send:hover{opacity:0.85}
.email-done{font-size:12.5px;color:var(--sage);display:flex;align-items:center;gap:5px}
@media(max-width:500px){.email-area{flex-direction:column;align-items:flex-start}.email-area-right{max-width:100%}}
</style>

<body>
<div class="lang-switch">
  <button class="lang-btn active" id="btn-zh" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
</div>
<!-- 作者弹层 -->
<div class="author-overlay" id="author-overlay" onclick="closeAuthor(event)">
  <div class="author-card">
    <div class="ac-cover"><div class="ac-cover-bar"></div><div class="ac-av" id="ac-av">M</div></div>
    <button class="ac-close" onclick="closeAuthorDirect()">✕</button>
    <div class="ac-body">
      <div class="ac-name" id="ac-name">Mark</div>
      <div class="ac-role" id="ac-role"></div>
      <div class="ac-bio" id="ac-bio"></div>
      <div class="ac-tags" id="ac-tags"></div>
      <div class="ac-links" id="ac-links"></div>
    </div>
  </div>
</div>
<!-- 首页 -->
<div id="page-home">
  <p class="home-label" id="hl-label">Beta · 人生模拟游戏</p>
  <h1 class="home-title" id="hl-title">没有标准答案<br><em>但我们总会得到些什么</em></h1>
  <p class="home-sub" id="hl-sub">每一个游戏，都来自一段真实经历。</p>
  <div class="entry-row">
    <div class="entry-card" id="entry-match" onclick="openMatchBox()">
      <div class="entry-top"><span class="entry-icon">💭</span><span class="entry-name" id="en1">我有一个困惑，帮我匹配</span></div>
      <div class="entry-desc" id="ed1">说说你最近在想什么，我们来找一个最贴近你处境的故事。</div>
      <span class="entry-arrow">→</span>
    </div>
    <div class="entry-card" id="entry-explore" onclick="openExploreBox()">
      <div class="entry-top"><span class="entry-icon">🗺️</span><span class="entry-name" id="en2">我想自由探索</span></div>
      <div class="entry-desc" id="ed2">按主题浏览，找一个你感兴趣的故事。</div>
      <span class="entry-arrow">→</span>
    </div>
  </div>
  <!-- 匹配输入框（隐藏，点击后展开） -->
  <div class="match-box" id="match-box">
    <textarea class="confuse-input" id="confuse-input" rows="3" placeholder="比如：我总是很难迈出第一步……"></textarea>
    <div class="match-actions">
      <button class="match-submit" id="match-submit" onclick="doMatch()">为我匹配故事</button>
      <button class="match-cancel" onclick="closeMatchBox()" id="match-cancel">取消</button>

  </div>
  <!-- 探索面板（隐藏，点击后展开） -->

    <button class="explore-back" onclick="closeExploreBox()" id="explore-back">← 返回</button>
  </div>
  <!-- 计数器 -->
  <div class="counter-row">
    <div class="counter-item"><div class="counter-num" id="cnt-v">—</div><div class="counter-label" id="cnt-vl">位访问者</div></div>
    <div class="counter-item"><div class="counter-num" id="cnt-p">—</div><div class="counter-label" id="cnt-pl">次游戏体验</div></div>
    <div class="counter-item"><div class="counter-num">3</div><div class="counter-label" id="cnt-al">位创作者</div></div>
  </div>
</div>
<!-- 初心页 -->
<div id="page-manifesto">
  <div class="mf-wrap">
    <div class="mf-top">
      <p class="mf-eyebrow" id="mf-eyebrow">设计者的话</p>
      <h2 class="mf-heading" id="mf-heading">在你开始之前</h2>

    <div class="mf-list" id="mf-list"></div>
    <button class="mf-enter" id="mf-enter" onclick="goToProfile()">开始体验</button>

</div>

    <div class="profile-progress" id="profile-progress"></div>

  </div>
</div>
<!-- 匹配页 -->
<div id="page-match">
  <div class="match-thinking"><div class="dots"><span></span><span></span><span></span></div></div>

</div>

<script>
var LANG='zh', userProfile={}, selIdx=0, loopCount=0, curScene='start', curGame=null;

function T(o){if(typeof o==='string')return o;if(o&&typeof o==='object')return LANG==='en'?(o.en||o.zh):(o.zh||o.en);return '';}

function setLang(lang){
  LANG=lang;
  document.getElementById('html-root').lang=lang;
  document.getElementById('btn-zh').classList.toggle('active',lang==='zh');
  document.getElementById('btn-en').classList.toggle('active',lang==='en');
  renderText();
  var pgs=['page-manifesto','page-profile','page-match','page-game','page-home'];
  pgs.forEach(function(p){
    var el=document.getElementById(p);
    if(el&&el.style.display!=='none'){
      if(p==='page-manifesto')renderManifesto();
      if(p==='page-profile')renderProfile();
      if(p==='page-home'){renderText();renderCatGrid();updateCounters();}
      if(p==='page-game'&&curGame)render();
    }
  });
}

function renderText(){
  var zh=LANG==='zh';
  var E={
    label:'Beta \u00b7 Life Simulation',
    title:'No right answers.<br><em>But we always take something away.</em>',
    sub:'Every game here starts from a real experience.',
    en1:'I have a question \u2014 help me match',
    ed1:"Tell us what's on your mind. We'll find the story closest to your situation.",
    en2:'I want to explore freely',
    ed2:'Browse by theme and find a story that interests you.',
    ph:'e.g. I always hesitate before taking the first step\u2026',
    submit:'Match a story for me',
    cancel:'Cancel',
    etitle:'Choose a theme',
    eback:'\u2190 Back',
    mlabel:"Here's a story for you",
    startbtn:'Enter this story',
    backbtn:'\u2190 Back',
    otherl:'Or choose another story',
    cvl:'visitors', cpl:'plays', cal:'contributors'
  };
  function s(id,txt){var el=document.getElementById(id);if(el)el.innerHTML=txt;}
  s('hl-label',zh?'Beta \u00b7 \u4eba\u751f\u6a21\u62df\u6e38\u620f':E.label);
  s('hl-title',zh?'\u6ca1\u6709\u6807\u51c6\u7b54\u6848<br><em>\u4f46\u6211\u4eec\u603b\u4f1a\u5f97\u5230\u4e9b\u4ec0\u4e48</em>':E.title);
  s('hl-sub',zh?'\u6bcf\u4e00\u4e2a\u6e38\u620f\uff0c\u90fd\u6765\u81ea\u4e00\u6bb5\u771f\u5b9e\u7ecf\u5386\u3002':E.sub);
  s('en1',zh?'\u6211\u6709\u4e00\u4e2a\u56f0\u60d1\uff0c\u5e2e\u6211\u5339\u914d':E.en1);
  s('ed1',zh?'\u8bf4\u8bf4\u4f60\u6700\u8fd1\u5728\u60f3\u4ec0\u4e48\uff0c\u6211\u4eec\u6765\u627e\u4e00\u4e2a\u6700\u8d34\u8fd1\u4f60\u5904\u5883\u7684\u6545\u4e8b\u3002':E.ed1);
  s('en2',zh?'\u6211\u60f3\u81ea\u7531\u63a2\u7d22':E.en2);
  s('ed2',zh?'\u6309\u4e3b\u9898\u6d4f\u89c8\uff0c\u627e\u4e00\u4e2a\u4f60\u611f\u5174\u8da3\u7684\u6545\u4e8b\u3002':E.ed2);
  var ci=document.getElementById('confuse-input');
  if(ci)ci.placeholder=zh?'\u6bd4\u5982\uff1a\u6211\u603b\u662f\u5f88\u96be\u8fc8\u51fa\u7b2c\u4e00\u6b65\u2026\u2026':E.ph;
  s('match-submit',zh?'\u4e3a\u6211\u5339\u914d\u6545\u4e8b':E.submit);
  s('match-cancel',zh?'\u53d6\u6d88':E.cancel);
  s('explore-title',zh?'\u9009\u62e9\u4e00\u4e2a\u4e3b\u9898':E.etitle);
  s('explore-back',zh?'\u2190 \u8fd4\u56de':E.eback);
  s('match-label',zh?'\u4e3a\u4f60\u627e\u5230\u4e86\u4e00\u4e2a\u6545\u4e8b':E.mlabel);
  s('start-btn',zh?'\u8fdb\u5165\u8fd9\u4e2a\u6545\u4e8b':E.startbtn);
  s('back-btn',zh?'\u2190 \u8fd4\u56de':E.backbtn);
  var ol=document.getElementById('match-all-label');if(ol)ol.textContent=zh?'\u6216\u8005\u9009\u53e6\u4e00\u4e2a\u6545\u4e8b':E.otherl;
  s('cnt-vl',zh?'\u4f4d\u8bbf\u95ee\u8005':E.cvl);
  s('cnt-pl',zh?'\u6b21\u6e38\u620f\u4f53\u9a8c':E.cpl);
  s('cnt-al',zh?'\u4f4d\u521b\u4f5c\u8005':E.cal);
}

/* ── 两个入口交互 ── */
function openMatchBox(){
  closeExploreBox();
  document.getElementById('match-box').classList.add('open');
  document.getElementById('confuse-input').focus();
}
function closeMatchBox(){document.getElementById('match-box').classList.remove('open');}
function openExploreBox(){
  closeMatchBox();
  document.getElementById('explore-box').classList.add('open');
  renderCatGrid();
}
function closeExploreBox(){document.getElementById('explore-box').classList.remove('open');}

/* ── 四类主题 ── */
var CATS=[
  {key:'insight',icon:'\u2728',name:{zh:'\u611f\u609f',en:'Insight'},
   desc:{zh:'\u4ece\u4e00\u6bb5\u771f\u5b9e\u7ecf\u5386\u51fa\u53d1\uff0c\u987a\u7740\u547d\u8fd0\u7684\u5f00\u5173\uff0c\u627e\u5230\u5c5e\u4e8e\u81ea\u5df1\u7684\u611f\u609f\u3002',en:'Start from a real experience, follow the turns of fate, find your own understanding.'},live:true},
  {key:'sports',icon:'\ud83c\udfbe',name:{zh:'\u8fd0\u52a8',en:'Sports'},
   desc:{zh:'\u8fd0\u52a8\u4e0d\u53ea\u662f\u8fd0\u52a8\u3002\u8fd0\u52a8\u91cc\u85cf\u7740\u4e00\u4e2a\u4eba\u5982\u4f55\u9762\u5bf9\u81ea\u5df1\u7684\u65b9\u5f0f\u3002',en:'Sports are never just sports. They reveal how a person faces themselves.'},live:true},
  {key:'career',icon:'\ud83c\udfe2',name:{zh:'\u804c\u573a',en:'Career'},
   desc:{zh:'\u5927\u5382\u3001\u521b\u4e1a\u3001\u8f6c\u578b\u2014\u2014\u8fd9\u4e9b\u73af\u5883\u90fd\u662f\u771f\u5b9e\u7684\uff0c\u91cc\u9762\u7684\u4eba\u4e5f\u662f\u3002',en:'Big tech, startups, pivots \u2014 these worlds are real, and so are the people inside them.'},live:false},
  {key:'daily',icon:'🌿',name:{zh:'日常',en:'Daily'},
   desc:{zh:'不需要大事。一只猫，一个傍晚，一些说不清楚但实实在在的东西。',en:'Nothing significant. A cat, an evening, something real that is hard to name.'},live:true}
];


function renderCatGrid(){
  var zh=LANG==='zh';
  var el=document.getElementById('cat-grid');
  if(!el)return;
  el.innerHTML=CATS.map(function(c){
    var badge=c.live
      ?'<span class="cat-badge badge-live">'+(zh?'\u53ef\u4f53\u9a8c':'Live')+'</span>'
      :'<span class="cat-badge badge-soon">'+(zh?'\u5373\u5c06\u4e0a\u7ebf':'Soon')+'</span>';
    var cls='cat-card '+(c.live?'live':'soon');
    var click=c.live?' onclick="pickCat(this.dataset.key)"':'';
    return '<div class="'+cls+'" data-key="'+c.key+'"'+click+'>'
      +badge+'<span class="cat-icon">'+c.icon+'</span>'
      +'<div class="cat-name">'+T(c.name)+'</div>'
      +'<div class="cat-desc">'+T(c.desc)+'</div>'
      +'</div>';
  }).join('');
}

function pickCat(key){
  var list=GAMES.filter(function(g){return g.category===key;});
  if(!list.length)return;
  if(list.length===1){selIdx=GAMES.indexOf(list[0]);startGame();}
  else{
    var order=list.map(function(g){return GAMES.indexOf(g);});
    selIdx=order[0];
    show('page-match');
    setTimeout(function(){renderMatchPage(order);},100);
  }
}

/* ── 初心页 ── */
var MF=[
  {zh:'\u9053\u7406\u4ece\u4e0d\u7a00\u7f3a\u3002\u771f\u6b63\u6539\u53d8\u4eba\u751f\u7684\uff0c\u4ece\u6765\u4e0d\u662f<strong>\u77e5\u9053</strong>\uff0c\u800c\u662f\u4e00\u6b21\u6b21\u5177\u4f53\u7684\u9009\u62e9\u4e0e\u4f53\u609f\u3002',en:'Wisdom is never scarce. What truly changes a life is never <strong>knowing</strong> \u2014 it is the weight of specific choices and lived realisation.'},
  {zh:'\u65e0\u8bba\u6765\u81ea\u4e66\u672c\u3001\u8bbf\u8c08\uff0c\u8fd8\u662fAI\uff0c\u6211\u4eec\u83b7\u5f97\u7684\u59cb\u7ec8\u53ea\u662f\u201c\u9053\u7406\u201d\uff0c\u5dee\u522b\u4e0d\u8fc7\u662f\u83b7\u53d6\u65b9\u5f0f\u7684\u66f4\u65b0\u3002',en:'Whether from books, conversations, or AI \u2014 what we receive is always just principle. Only the delivery method changes.'},
  {zh:'\u5b64\u72ec\uff0c\u662f\u6bcf\u4e2a\u4eba\u7684\u5e95\u8272\u3002\u8fde\u63a5\uff0c\u4e0d\u662f\u4e3a\u4e86\u9003\u907f\u5b64\u72ec\uff0c\u800c\u662f\u8ba9\u6211\u4eec\u66f4\u6709\u529b\u91cf<strong>\u9762\u5bf9</strong>\u5b83\u3002',en:"Solitude is everyone's undertone. Connection gives us the strength to <strong>face</strong> it."},
  {zh:'\u4eba\u4e0e\u4eba\u4e4b\u95f4\u7684\u771f\u5b9e\u8fde\u63a5\uff0c\u4e0e\u5177\u4f53\u800c\u9c9c\u6d3b\u7684\u7ecf\u5386\uff0c\u662f\u4efb\u4f55AI\u5bf9\u8bdd\u90fd<strong>\u65e0\u6cd5\u66ff\u4ee3</strong>\u7684\u3002',en:'Real human connection and lived experience are things no AI conversation can <strong>replace</strong>.'},
  {zh:'\u771f\u6b63\u6709\u610f\u4e49\u7684\u8fde\u63a5\uff0c\u4e0d\u5728\u4e8e\u5bf9\u65b9\u7684\u5934\u8861\u6216\u9ad8\u5ea6\uff0c\u800c\u5728\u4e8e\u4ed6\u662f\u5426\u7a7f\u8fc7\u4e0e\u4f60<strong>\u76f8\u4f3c\u7684\u5904\u5883</strong>\u3002',en:'Meaningful connection is not about status. It is about whether someone has walked through a <strong>similar passage</strong>.'},
  {zh:'\u751f\u547d\u6709\u9650\uff0c\u65e0\u6cd5\u904d\u5386\u6240\u6709\u60c5\u5883\u3002\u4f46\u201c\u4eba\u751f\u6a21\u62df\u201d\uff0c\u8ba9\u6211\u4eec\u5f97\u4ee5\u5728\u4ed6\u4eba\u7684\u7ecf\u9a8c\u4e2d\uff0c\u63d0\u524d<strong>\u9884\u6f14\u4e0e\u7406\u89e3</strong>\u3002',en:'Life is finite. But <strong>simulation</strong> lets us rehearse and understand through the experience of others.'},
  {zh:'\u6bcf\u4e2a\u4eba\u90fd\u6709\u5c5e\u4e8e\u81ea\u5df1\u7684\u201c\u547d\u8fd0\u5faa\u73af\u201d\uff0c\u5b83\u4f1a\u4ee5\u4e0d\u540c\u9762\u8c8c\u53cd\u590d\u51fa\u73b0\uff0c\u76f4\u5230\u4f60\u771f\u6b63<strong>\u770b\u89c1\uff0c\u5e76\u9009\u62e9\u7a7f\u8fc7</strong>\u3002',en:'Everyone has their cycle of fate. It returns until you truly <strong>see it and choose to move through</strong>.'},
  {zh:'\u90a3\u4e9b\u88ab\u79f0\u4f5c\u201c\u78e8\u96be\u201d\u7684\u65f6\u523b\uff0c\u672a\u5fc5\u662f\u60e9\u7f5a\uff0c\u66f4\u50cf\u662f<strong>\u5305\u88f9\u7740\u793c\u7269\u7684\u8003\u9898</strong>\u3002',en:'The moments we call hardship are more like <strong>questions wrapped around a gift</strong>.'},
  {zh:'\u8fd9\u4e2a\u6e38\u620f\uff0c\u672c\u8d28\u662f\u4e00\u9762\u955c\u5b50\u3002\u5b83<strong>\u4e0d\u8bc4\u5224</strong>\uff0c\u53ea\u7167\u89c1\u6b64\u523b\u6700\u771f\u5b9e\u7684\u4f60\u3002',en:'This game is a mirror. It does <strong>not judge</strong> \u2014 it simply reflects who you are right now.'},
  {zh:'\u4eba\u751f\u6216\u8bb8\u6ca1\u6709\u6807\u51c6\u7b54\u6848\u3002\u5b83\u66f4\u50cf\u4e00\u6b21<strong>\u5b8c\u6574\u7684\u4f53\u9a8c</strong>\u3002\u80fd\u591f\u5c3d\u60c5\u7ecf\u5386\uff0c\u5e76\u9010\u6e10\u6210\u4e3a\u81ea\u5df1\uff0c\u5df2\u7ecf\u8db3\u591f\u3002',en:'Life may have no right answer. It is a <strong>complete experience</strong>. To live it fully and become yourself \u2014 that is enough.'}
];

function renderManifesto(){
  var zh=LANG==='zh';

var pIdx=0,pAnswers={};

function renderProfile(){
  var zh=LANG==='zh';
  var step=PS[pIdx];
  var dots=PS.map(function(_,i){return '<div class="pdot '+(i<pIdx?'done':i===pIdx?'active':'')+'"></div>';}).join('');
  document.getElementById('profile-progress').innerHTML=dots;
  var cur=pAnswers[step.key]||(step.type==='multi'?[]:null);
  var chips=step.chips.map(function(c){
    var sel=step.type==='multi'?(cur.indexOf(c.v)>=0):(cur===c.v);
    return '<button class="chip'+(step.type==='multi'?' multi':'')+(sel?' sel':'')+'" data-v="'+c.v+'" data-key="'+step.key+'" data-multi="'+(step.type==='multi')+'" onclick="pickChip(this)">'+(zh?c.zh:c.en)+'</button>';
  }).join('');
  var back=pIdx>0?'<button class="profile-skip" onclick="pBack()" style="margin-right:auto">\u2190 '+(zh?'\u4e0a\u4e00\u6b65':'Back')+'</button>':'';
  var nextL=pIdx===PS.length-1?(zh?'\u5b8c\u6210 \u2192':'Done \u2192'):(zh?'\u4e0b\u4e00\u6b65 \u2192':'Next \u2192');
  document.getElementById('profile-content').innerHTML=
    '<div><div class="profile-q">'+T(step.q)+'</div>'
    +(T(step.hint)?'<div class="profile-hint">'+T(step.hint)+'</div>':'')
    +'<div class="profile-chips">'+chips+'</div>'
    +'<div class="profile-actions">'+back
    +'<button class="profile-skip" onclick="pSkip()">'+(zh?'\u8df3\u8fc7':'Skip')+'</button>'
    +'<button class="profile-next" onclick="pNext()">'+nextL+'</button></div></div>';
}

function pickChip(el){
  var key=el.dataset.key,v=el.dataset.v,multi=el.dataset.multi==='true';
  if(multi){var arr=pAnswers[key]||[];var i=arr.indexOf(v);if(i>=0)arr.splice(i,1);else arr.push(v);pAnswers[key]=arr;}
  else pAnswers[key]=v;
  renderProfile();
}
function pNext(){if(pIdx<PS.length-1){pIdx++;renderProfile();}else{userProfile=pAnswers;goToMatch();}}
function pSkip(){if(pIdx<PS.length-1){pIdx++;renderProfile();}else{userProfile=pAnswers;goToMatch();}}
function pBack(){if(pIdx>0){pIdx--;renderProfile();}}

t. Hasn't asked for help."},nudge:{zh:'这是今天第二次了——有个缺口在等你，你要不要靠近一步？',en:"Second time today — there's an opening waiting. Will you step toward it?"},choices:[{l:'A',t:{zh:'主动过去问他需不需要帮忙。',en:'Go over and ask if he needs help.'},n:'stranger_connection'},{l:'B',t:{zh:'等等看，也许他自己能找到。',en:'Wait and see — he might figure it out himself.'},n:'loop3_wait',c:true}],prog:40},loop2_walk:{tag:{zh:'街角，一家小店',en:'Street corner, a small shop'},img:'alley',body:{zh:'你走着走着，发现一条没走过的小巷。里面有家小店，门口挂着手写的牌子。\n\n店主站在门口，和你对上了眼。',en:"Walking, you find an alley you haven't been down. A small shop inside, handwritten sign on the door.\n\nThe owner is standing there. Your eyes meet."},nudge:{zh:'你已经走出来了。门就在这里。',en:'You already stepped out. The door is right here.'},choices:[{l:'A',t:{zh:'走进去，比划着问问卖的是什么。',en:"Go in and gesture to ask what they're selling."},n:'stranger_connection'},{l:'B',t:{zh:'笑了笑，继续往前走。',en:'Smile and keep walking.'},n:'loop3_pass',c:true}],prog:45},loop3_wait:{tag:{zh:'购物中心，几分钟后',en:'Shopping mall, a few minutes later'},img:'mall',body:{zh:'老人把地图折起来，慢慢往一个方向走去。你看着他的背影，想了一会儿。\n\n这时候你的手机响了——一个陌生号码。',en:'The old man folds his map and slowly walks off. You watch him go.\n\nYour phone rings — unknown number.'},nudge:{zh:'命运很有耐心。它会一直问，直到你准备好回答。',en:"Life is patient. It keeps asking until you're ready to answer."},choices:[{l:'A',t:{zh:'接起来，看看是谁。',en:'Pick up and see who it is.'},n:'stranger_connection'},{l:'B',t:{zh:'没接，可能是骚扰电话。',en:"Don't answer — probably spam."},n:'gentle_end',c:true}],prog:55},loop3_pass:{tag:{zh:'小巷尽头',en:'End of the alley'},img:'alley',body:{zh:'你走到了小巷尽头，是一片空地。一个年轻人坐在台阶上，用英语问：\n\n"你是来找什么的？"',en:'You reach the end of the alley. A young man sits on steps and asks in English:\n\n"What are you looking for?"'},choices:[{l:'A',t:{zh:'"我也不知道，就随便走走。" 然后聊了起来。',en:'"No idea, just wandering." And you start talking.'},n:'stranger_connection'},{l:'B',t:{zh:'"走错了，不好意思。" 转身离开。',en:'"Wrong turn, sorry." You head back.'},n:'gentle_end',c:true}],prog:58},cafe_discovery:{tag:{zh:'小咖啡馆，一个下午',en:'A small café, one afternoon'},img:'cafe',body:{zh:'你坐进去，要了一杯咖啡。老板话不多，但看你在看窗外，主动说：\n\n"雨天这里其实很好看，你知道旁边那片湿地吗？"',en:'You sit down, order a coffee. The owner says:\n\n"This place looks beautiful in the rain. You know the wetland nearby?"'},choices:[{l:'→',t:{zh:'你们聊了起来。他提到了一个你从没听说过的地方。',en:"You start talking. He mentions a place you've never heard of."},n:'wetland_discover_alt'}],prog:50},wetland_discover:{tag:{zh:'地图上，一个发现',en:'On the map, a discovery'},img:'map',body:{zh:'你顺着海岸线慢慢翻，大部分地方都查过了。\n\n然后你看到——<strong>亚庇湿地公园</strong>。评论写着：<em>"无栈道徒步，建议穿靴。"</em>\n\n"无栈道"三个字让你停了一下。',en:'You scroll along the coastline. Most places already seen.\n\nThen: <strong>KK Wetland Park</strong>. A review says: <em>"Off-boardwalk hiking, boots recommended."</em>\n\nThe words make you pause.'},choices:[{l:'A',t:{zh:'有点意思，去试试。',en:'Sounds interesting — worth a try.'},n:'wetland_enter'},{l:'B',t:{zh:'听起来有点麻烦，找个熟悉的地方。',en:'Sounds like too much effort. Find somewhere familiar instead.'},n:'loop1_hotel',c:true}],prog:30},wetland_discover_alt:{tag:{zh:'原来就在附近',en:'It was nearby all along'},img:'map',body:{zh:'老板说的那个地方，你打开地图一看——<strong>亚庇湿地公园</strong>，步行十分钟。\n\n"很多人不知道，"他说，"但去过的人都说值得。有段路没有栈道，自己走。"',en:'You look it up — <strong>KK Wetland Park</strong>, ten minutes on foot.\n\n"Most people don\'t know about it," he says. "But everyone who goes says it\'s worth it. Part of the path has no boardwalk — you\'re on your own."'},choices:[{l:'A',t:{zh:'既然说值得，去看看。',en:"If they say it's worth it, go see."},n:'wetland_enter'},{l:'B',t:{zh:'谢谢他，感觉有点累，回酒店了。',en:"Thank him, but you're tired. Head back to the hotel."},n:'gentle_end',c:true}],prog:55},stranger_connection:{tag:{zh:'一次意外的连接',en:'An unexpected connection'},img:'stranger',body:{zh:'你们聊了起来。\n\n说着说着，对方提到了一个地方——一片红树林湿地，"很少人去，但值得。"\n\n你看了看时间，还有半天。',en:'You start talking.\n\nAt some point they mention a place — a mangrove wetland. "Not many people go, but it\'s worth it."\n\nYou check the time. Half a day left.'},choices:[{l:'A',t:{zh:'去看看。',en:'Go take a look.'},n:'wetland_enter'},{l:'B',t:{zh:'改天吧，今天有点累了。',en:"Another time — you're tired today."},n:'gentle_end',c:true}],prog:60},wetland_enter:{tag:{zh:'湿地公园，栈道尽头',en:'Wetland park, end of the boardwalk'},img:'wetland',body:{zh:'木栈道走到一半，突然断了。\n\n前方是一片被积水覆盖的泥潭——没有路，没有脚印，只有几只旧轮胎摆在那里，像某种邀请，又像某种警告。',en:'Halfway along the boardwalk, it ends.\n\nAhead: a mudflat covered in water. No path. No footprints. Just a few old tyres — an invitation, or a warning.'},pause:{zh:'那个"算了"的声音，开始出现了。',en:'That "forget it" voice is starting to appear.'},choices:[{l:'A',t:{zh:'太不确定了，退回去。',en:'Too uncertain. Turn back.'},n:'loop_mudflat',c:true},{l:'B',t:{zh:'已经来了，往前走一段试试。',en:"You're already here. Walk a bit further and see."},n:'mudflat_deep'}],prog:62},loop_mudflat:{tag:{zh:'退回来了，栈道上',en:'Back on the boardwalk'},img:'wetland',body:{zh:'你站回栈道，看着那片泥地。它很平静。\n\n这时从后面走来两个背包客，直接踏进了泥里。没有特别装备，也没有特别紧张。\n\n其中一个回头看了你一眼，说："来吗？"',en:"You step back onto the boardwalk and look at the mud. It's still.\n\nTwo backpackers come from behind and walk straight in. No special gear. Not nervous at all.\n\nOne looks back at you. \"Coming?\""},nudge:{zh:'有时候，我们只是需要看到别人先走一步。',en:'Sometimes all we need is to see someone else go first.'},choices:[{l:'A',t:{zh:'点头，跟上去。',en:'Nod and follow them in.'},n:'mudflat_deep'},{l:'B',t:{zh:'摇摇头，"你们去吧。"',en:'"You go ahead."'},n:'gentle_end',c:true}],prog:72},mudflat_deep:{tag:{zh:'泥潭中，某处',en:'Somewhere in the mudflat'},img:'mud',body:{zh:'你踏进去了。\n\n轮胎走完，路消失了。积水、绿藻、四周的安静。还有脑子里那个声音：\n\n<strong>"就这样吧，退回去。"</strong>',en:'You step in.\n\nThe tyres end. The path disappears. Standing water, green algae, silence. And a voice in your head:\n\n<strong>"That\'s enough. Turn back."</strong>'},pause:{zh:'这个声音，你在生活里的哪些时候也听过它？',en:'When else in your life have you heard that voice?'},choices:[{l:'A',t:{zh:'给自己打气，一步一步往前试探。',en:'Encourage yourself and inch forward, one step at a time.'},n:'end_full'},{l:'B',t:{zh:'听了那个声音，退出来。',en:'Listen to that voice and step back.'},n:'end_partial'}],prog:82},end_full:{tag:{zh:'瞭望台，第20分钟',en:'The watchtower, minute 20'},img:'tower',isEnd:true,endType:'full',title:{zh:'你走完了这300米',en:'You walked those 300 metres'},story:{zh:'你一步一步试探——浅色绿藻更硬，可以踩。一段树桩挡路，你卸下背包从底下钻过去。\n\n整整20分钟，300米。\n\n踏上木栈道的那一刻，你长长地呼了一口气。回头看，那片泥地已经<em>完全平静，像镜子一样映着蓝天和红树林</em>，仿佛从来没有人走过。\n\nMark后来写道：\n\n"如果预知了这场冒险实际如何，可能我也就不会踏上这段路了。而这，不正是计划外的魅力所在吗？"',en:'You test each step — lighter algae is harder, can hold weight. A log blocks the way; you take your bag off and crawl underneath.\n\nTwenty minutes. Three hundred metres.\n\nWhen you step back onto the boardwalk, you breathe out slowly. Looking back, the mudflat is <em>completely still, mirroring the sky and mangroves</em>, as if no one had ever been there.\n\nMark wrote afterwards:\n\n"If I\'d known what the adventure would actually involve, I probably wouldn\'t have started. And isn\'t that exactly the point?"'},insight:{zh:'迈出那一步之前，我们永远不知道会发生什么。但走过之后，有些东西会留下来——不是结论，而是经验。它会在你需要的时候告诉你：你曾经穿越过不确定。',en:'Before that step, we never know what will happen. But after — something stays. Not a conclusion, but an experience. It will tell you, when you need it: you have crossed uncertainty before.'},prog:100},end_partial:{tag:{zh:'退出来了',en:'You stepped back out'},img:'wetland',isEnd:true,endType:'reflective',title:{zh:'你触碰到了它的边界',en:'You touched the edge of it'},story:{zh:'你进去了，又退出来。脚上沾着泥。\n\n坐在栈道边缘，你看着那片泥潭。它很平静，像什么都没发生过。\n\n但你知道——<em>进去了再退出来，和从来没进去，是两件不同的事。</em>你已经知道了它的质地。',en:"You went in, then came back out. Mud on your shoes.\n\nSitting at the edge of the boardwalk, you look at the mudflat. It's still. As if nothing happened.\n\nBut you know — <em>going in and coming back is different from never going in.</em> You know what it feels like now."},insight:{zh:'退出来和没进去，是两回事。那个"算了"的声音，你现在比以前更了解它了。下一次，也许会不一样。',en:'Stepping back and never stepping in are two different things. That voice — you understand it better now. Next time might be different.'},prog:90},gentle_end:{tag:{zh:'这一天，结束了',en:'That day, over'},img:'rain',isEnd:true,endType:'gentle',title:{zh:'生活还会再问你',en:'Life will ask again'},story:{zh:'这一天平静地过去了。没有什么特别的事情发生，也没有什么东西丢失。\n\n只是，那些岔路口还在那里。\n\n<em>命运很有耐心。</em>它不会只问一次。换一个场景，换一个形式，同样的问题会再次出现——直到你准备好，走出那一步。',en:"The day passed quietly. Nothing remarkable happened. Nothing was lost.\n\nBut those crossroads are still there.\n\n<em>Life is patient.</em> It won't only ask once. Different setting, different form — the same question will come back, until you're ready to take that step."},insight:{zh:'没关系。生活会再给你机会的。',en:"It's okay. Life will give you another chance."},prog:100}}
  },
  {
    id:'effort',category:'sports',template:'A',level:1,
    tag:{zh:'日常 · 真实改编',en:'Daily Life · Based on a true story'},
    title:{zh:'大力出不了奇迹',en:"Trying Harder Isn't the Answer"},
    desc:{zh:'你有没有过这种感觉：越用力，越失控。一个发生在球场上的故事——关于节奏、代偿，和那个让一切自然发生的状态。',en:"Ever feel the harder you try, the worse it gets? A story from a tennis court — about rhythm, compensation, and the state where things just flow."},
    cover:'tennis',
    meta:[{zh:'约 5 分钟',en:'~5 min'},{zh:'向内的旅程',en:'Inner journey'},{zh:'无标准答案',en:'No right answers'}],
    keywords:['用力','努力','焦虑','失控','工作压力','越努力','效率','节奏','effort','stress','pressure'],
    scenes:{
      start:{tag:{zh:'球场，训练开始',en:'The court, training begins'},img:'tennis',body:{zh:'你已经好几周没有找到感觉了。\n\n今天的球打得很涩，准备总是慢半拍，出球又浅又软。教练在对面喂球，你接一个，失误一个。\n\n你知道问题在哪——你太紧了。但这个"知道"，好像没有任何用。',en:"You haven't found your rhythm in weeks.\n\nToday every shot feels wrong — late preparation, shallow returns. The coach feeds balls. You miss one after another.\n\nYou know the problem: you're too tense. But knowing doesn't help."},choices:[{l:'A',t:{zh:'咬牙继续，多打几组，用量把感觉找回来。',en:'Push through. More reps. Force the feeling back.'},n:'loop1_grind',c:true},{l:'B',t:{zh:'停下来一秒，感受一下现在身体是什么状态。',en:'Pause for a moment and notice what your body actually feels like.'},n:'pause_feel'}],prog:5},
      loop1_grind:{tag:{zh:'又打了二十分钟',en:'Twenty more minutes'},img:'tennis',body:{zh:'你又打了二十分钟。\n\n球没有更好，手臂开始有点酸。你意识到自己在每次击球前都在屏气——像是在用全身准备一次很重要的事情。\n\n教练叫暂停，说："我换一种方式喂球给你。"',en:"Twenty more minutes. Still not working. Your arm is getting sore. You notice you've been holding your breath before every shot.\n\nThe coach calls a pause. \"Let me feed differently.\""},nudge:{zh:'同样的问题，正在用不同的方式再问你一次。',en:'The same question, asking itself again in a different form.'},choices:[{l:'A',t:{zh:'摆摆手，说"没事，我自己再调整调整"。',en:'"It\'s fine, I\'ll sort it myself."'},n:'loop2_adjust',c:true},{l:'B',t:{zh:'点头，让教练来。',en:'Nod and let the coach take over.'},n:'coach_slow'}],prog:22},
      loop2_adjust:{tag:{zh:'又过了一会儿',en:'A little while later'},img:'tennis',body:{zh:'你试着调整——告诉自己放松，告诉自己不要用力，告诉自己节奏、节奏、节奏。\n\n但"告诉自己"这件事本身，就已经是一种用力了。\n\n球还是不对。你有点想离开球场。',en:"You try to adjust — telling yourself to relax, don't force it, rhythm, rhythm, rhythm.\n\nBut the act of telling yourself is itself a kind of forcing.\n\nStill not right. You feel like leaving."},nudge:{zh:'有时候，我们需要的不是更多努力，而是允许另一种可能出现。',en:"Sometimes what we need isn't more effort, but allowing a different possibility to emerge."},choices:[{l:'A',t:{zh:'算了，今天状态不好，收拍走人。',en:'Forget it. Bad day. Pack up and leave.'},n:'loop3_quit',c:true},{l:'B',t:{zh:'去喝口水，什么都不想，就站在那里一分钟。',en:'Get some water. Stand there for a minute and think nothing.'},n:'pause_feel'}],prog:38},
      loop3_quit:{tag:{zh:'更衣室',en:'The locker room'},img:'locker',body:{zh:'你换好衣服，坐在更衣室的长椅上。\n\n手机里有三条未读消息，都是工作的。你盯着屏幕，突然发现——\n\n你处理工作的方式，好像和今天打球的方式一模一样。',en:"You've changed and you're sitting on the locker room bench.\n\nThree unread work messages on your phone. You stare at the screen and suddenly notice —\n\nYou deal with work exactly the way you played today."},nudge:{zh:'球场和生活，有时候是同一道题。',en:'The court and life are sometimes the same question.'},choices:[{l:'A',t:{zh:'回复消息，先把事情处理掉再说。',en:'Reply to messages. Handle things first.'},n:'work_grind',c:true},{l:'B',t:{zh:'放下手机，想想这个发现说明了什么。',en:"Put the phone down and sit with what you just noticed."},n:'pause_feel'}],prog:50},
      work_grind:{tag:{zh:'办公室，深夜',en:'Office, late at night'},img:'night',body:{zh:'你加班到很晚。任务一件一件完成，但每完成一件，待办清单里又多出两件。\n\n你感觉自己像一台运转超负荷的机器——转速很高，但不知道在往哪里走。\n\n手机闹钟响了：明天还有训练。',en:"You work late. Finishing tasks, but every one completed adds two more.\n\nYou feel like a machine running too hot — spinning fast, going nowhere clear.\n\nYour alarm goes off: training tomorrow."},nudge:{zh:'命运很有耐心。它换了一个场景，但问的还是同一件事。',en:'Life is patient. Different setting, same question.'},choices:[{l:'A',t:{zh:'继续撑，明天早点去球场多练一会儿。',en:'Keep going. Get to the court earlier tomorrow.'},n:'loop_tired',c:true},{l:'B',t:{zh:'关电脑，今晚先停下来。',en:'Close the laptop. Stop for tonight.'},n:'pause_feel'}],prog:62},
      loop_tired:{tag:{zh:'第二天，球场',en:'Next day, the court'},img:'tennis',body:{zh:'你比平时早到了半小时。\n\n但身体还是昨天的身体，节奏还是昨天的节奏。球打出去，还是那种硬、浅、不对的感觉。\n\n教练走过来，什么都没说，只是把喂球机的速度调慢了一半。',en:"You arrive half an hour early.\n\nBut your body is yesterday's body. Your rhythm is yesterday's rhythm. Every shot: hard, shallow, wrong.\n\nThe coach walks over without a word and halves the speed of the ball machine."},nudge:{zh:'你已经是第三次站在这个门口了。',en:"This is the third time you've stood at this door."},choices:[{l:'A',t:{zh:'让节奏慢下来，真的试一次。',en:'Let the rhythm slow down. Actually try it.'},n:'coach_slow'},{l:'B',t:{zh:'"不用，快一点，我要练实战节奏。"',en:'"No thanks, keep it fast. I need to train at match speed."'},n:'gentle_end',c:true}],prog:72},
      pause_feel:{tag:{zh:'停下来的那一刻',en:'The moment you stop'},img:'tennis',body:{zh:'你停下来了。\n\n没有做什么，只是站在那里，感受了一下：手臂在哪里，重心在哪里，呼吸是快还是慢。\n\n发现自己的肩膀一直是耸着的，已经耸了很久，你自己都没有注意到。',en:"You stop.\n\nNothing dramatic. Just standing there, noticing: where are your arms, where is your weight, is your breath fast or slow.\n\nYour shoulders have been raised for a long time. You hadn't noticed."},choices:[{l:'→',t:{zh:'肩膀慢慢落下来，你告诉教练："换一种方式喂球吧。"',en:'Let your shoulders drop. Tell the coach: "Feed it differently."'},n:'coach_slow'}],prog:40},
      coach_slow:{tag:{zh:'节奏慢下来之后',en:'Once the rhythm slows'},img:'tennis',body:{zh:'教练喂球的节奏慢了很多。\n\n突然之间，你有了时间——时间去站好位，时间去引拍，时间去让重心转过来。\n\n你打出去的那一球，不知道为什么，出乎意料地干净。\n\n然后又一球。又一球。',en:"The coach's feed slows right down.\n\nSuddenly you have time — to get into position, to backswing, to let your weight transfer.\n\nThe next ball you hit is, somehow, unexpectedly clean.\n\nThen another. And another."},pause:{zh:'这个状态，你在生活里有没有经历过？是什么时候？',en:'Have you felt this state in your life before? When?'},choices:[{l:'A',t:{zh:'告诉自己"要保持这个状态"，开始刻意维持。',en:'"Keep this state" and start trying to hold on to it.'},n:'loop_maintain',c:true},{l:'B',t:{zh:'什么都不想，就让它继续发生。',en:'Think nothing. Let it keep happening.'},n:'flow_state'}],prog:65},
      loop_maintain:{tag:{zh:'又开始用力了',en:'Trying hard again'},img:'tennis',body:{zh:'"保持，保持，保持。"\n\n你开始想这件事，然后你开始又紧了。\n\n球又打回了原来的感觉。\n\n教练说："你刚才想什么了？"',en:'"Keep it, keep it, keep it."\n\nYou start thinking about it. And then you tighten up again.\n\nThe shots go back to what they were.\n\n"What were you just thinking about?" the coach asks.'},nudge:{zh:'那个状态不是被"维持"出来的。它是在你放下的那一刻出现的。',en:"That state can't be maintained. It appeared the moment you let go."},choices:[{l:'A',t:{zh:'"我不知道。" 停下来，不再想。',en:'"I don\'t know." Stop. Stop thinking.'},n:'flow_state'},{l:'B',t:{zh:'"我在想怎么保持好状态。" 继续想。',en:'"I was thinking about how to stay in the zone." Keep thinking.'},n:'gentle_end',c:true}],prog:78},
      flow_state:{tag:{zh:'接下来的几分钟',en:'The next few minutes'},img:'tennis',body:{zh:'你什么都没想。\n\n球过来，你打过去。准备、挥拍、推送，连贯地发生了，不需要指挥。\n\n有那么几分钟，你找到了那种久违的自如感——<strong>不是"我在努力打好"，而是过程走到了，结果就出现了</strong>。',en:"You think nothing.\n\nBall comes, you hit it. Preparation, swing, follow-through — it all just happens, no directing needed.\n\nFor a few minutes, you find that long-lost feeling of ease. <strong>Not 'I'm trying to hit well' — but the process completing itself, and the result just appearing.</strong>"},choices:[{l:'→',t:{zh:'雨开始下了，训练提前结束。你坐在场边，想了一会儿。',en:'Rain starts. Training ends early. You sit courtside and think for a while.'},n:'end_full'}],prog:90},
      end_full:{tag:{zh:'场边，雨里',en:'Courtside, in the rain'},img:'rain',isEnd:true,endType:'full',title:{zh:'大力不是答案',en:"Trying harder wasn't the answer"},story:{zh:'今天只打了二十分钟，却找回了那个感觉。\n\nMark后来写道：\n\n"所谓大力出奇迹，其实是一种对准备不足的代偿。当准备是完整的，这条代偿路径自然失效了，因为根本不需要它。"\n\n<em>力量不再被刻意调用，击球反而更稳定、更自然。</em>\n\n这件事不只属于球场。它更像是在提醒你：很多时候，结果不是被"努力"出来的，而是在过程回到它本来应有的节奏时，自然发生的。',en:"Only twenty minutes today, but the feeling came back.\n\nMark wrote afterwards:\n\n\"Trying harder is really just compensation for insufficient preparation. When preparation is complete, that compensation pathway becomes unnecessary — because you don't need it.\"\n\n<em>Force stops being deliberately applied, and the shots become more stable, more natural.</em>\n\nThis isn't only about tennis. It's a reminder: results often aren't produced by effort — they emerge when the process returns to its natural rhythm."},insight:{zh:'与其不断加码投入，不如反复去感受、校准、复原——让事情回到它本来该展开的方式。至于结果，只要路径是自然的，发生只是时间问题。',en:"Rather than constantly adding effort, return again and again to sensing, calibrating, restoring — letting things unfold the way they naturally should. As for results: if the path is natural, they are only a matter of time."},prog:100},
      gentle_end:{tag:{zh:'今天就这样了',en:"That's it for today"},img:'tennis',isEnd:true,endType:'gentle',title:{zh:'感觉还没找到',en:"The feeling didn't come today"},story:{zh:'今天没有找到那个感觉。\n\n但Mark说，那种自如感从来不是靠"找"找到的——\n\n<em>它是在你停下来的那一刻，自己出现的。</em>\n\n你今天没有停下来。但你知道了有这样一种可能。下一次，也许会不一样。',en:"The feeling didn't come today.\n\nBut Mark says that ease is never found by looking for it —\n\n<em>it appears the moment you stop.</em>\n\nYou didn't stop today. But now you know that's possible. Next time might be different."},insight:{zh:'命运很有耐心。它会一直问，直到你准备好，让节奏回来。',en:"Life is patient. It keeps asking until you're ready to let the rhythm return."},prog:100}
    }
  },

    desc:{zh:'积极心理暗示和自我评判，背后是同一件事。一个关于内心游戏的真实故事。',en:"Positive self-talk and self-judgment share the same core. A true story about the inner game."},

    keywords:['用力','急躁','内耗','失控','状态','心流','内心游戏','心态','运动','inner game','zone'],
    scenes:{
      start:
      {tag:{zh:'球场，清晨',en:"The court, early morning"},img:'tennis',prog:8,body:{zh:'清晨的练习，一开始就不对劲。\n\n小场热身，力道总是偏大，落点掉在发球区外。退到底线后，击球莫名其妙——不是击飞，就是打呲，或者下网。这种离谱的状态，是几个月来不多见的。\n\n连续的失误，让水面下隐藏的东西浮了上来：练习了这么久，怎么还可以打这么烂。明明知道动作要怎么做，为什么结果却差十万八千里。\n\n这种感觉就像一个大大的脑袋，困在了一个小小的身躯上。你指东，身体往西。',en:"Something is wrong from the start of morning practice.\n\nWarm-up in the service box — the force keeps coming out too big, shots landing beyond the line. Moving back to the baseline, the hitting becomes inexplicable — flying long, shanking off the frame, hitting the net. A state this bad has not happened in months.\n\nConsecutive errors bring something surfacing from beneath: after all this practice, how can you still play this badly. You know exactly what the motion should be, so why does the result miss by a mile.\n\nIt feels like a very large head trapped inside a very small body. You tell it to go right. It goes left."},choices:[{l:'A',t:{zh:'告诉自己放松，积极暗示，继续打。',en:"Tell yourself to relax. Positive self-talk. Keep going."},n:'positive_talk',c:true},{l:'B',t:{zh:'停下来，走到边上喝口水。',en:"Stop. Walk to the side. Get some water."},n:'pause_water'}]},
      positive_talk:
      {tag:{zh:'底线，继续打',en:"Baseline, keep playing"},img:'tennis',prog:20,body:{zh:'你开始在心里对自己说：放松，trust yourself，I can do it。\n\n这些话你以前用过，某些时候确实有效。于是你一边击球，一边在脑海里重复这些句子，像念咒一样。\n\n但球还是不对。\n\n不仅如此，这些咒语反而让你更加注意到每一次失误——每打完一球，你立刻判断它和预期的差距，然后再次输出指令，再次重复那几句话。\n\n身体还在场上，但心思早已离场，自顾自玩起了另一场游戏。',en:"You start talking to yourself internally: relax, trust yourself, I can do it.\n\nThese phrases have worked before, sometimes. So you hit balls and repeat the sentences in your mind, like an incantation.\n\nBut the hitting is still wrong.\n\nWorse — the incantations make you more aware of each error. After every ball you immediately assess the gap between result and expectation, then issue new instructions, then repeat the phrases again.\n\nYour body is still on the court. Your mind left a while ago and is playing a different game entirely."},nudge:{zh:'积极暗示和自我评判，背后藏着同一件事：预期。',en:"Positive self-talk and self-judgment share the same hidden ingredient: expectation."},choices:[{l:'→',t:{zh:'Tengku 叫停了。',en:"Tengku calls a halt."},n:'tengku_stops'}]},
      pause_water:
      {tag:{zh:'球场边，长凳旁',en:"Courtside, by the bench"},img:'locker',prog:22,body:{zh:'你走到边上，喝了口水。\n\nTengku 走过来，问：昨晚睡好了吗？\n\n你愣了一下。你不记得睡得如何。但你确实感觉到，有什么东西压在心里——说不清楚是什么，只是很笃定地在那里。\n\n你好奇地问他是怎么看出来的。\n\n他说：你的内心世界，已经全部透明地写在击球里。也许你的思维会撒谎，但击球不会，从不会。',en:"You walk to the side and drink some water.\n\nTengku comes over. Did you sleep well last night?\n\nYou pause. You do not actually remember how you slept. But you do sense something pressing on you — you cannot name it clearly, only feel its presence with certainty.\n\nYou ask him how he could tell.\n\nHe says: your inner world is written transparently in every shot. Your thoughts might lie. But your hitting never does."},pause:{zh:'击球不会撒谎。这句话让你停了一下。',en:"Your hitting never lies. That stops you for a moment."},choices:[{l:'→',t:{zh:'你们坐下来聊了一会儿。',en:"You sit and talk for a moment."},n:'after_talk'}]},
      tengku_stops:
      {tag:{zh:'球场边，Tengku 叫停',en:"Courtside, Tengku calls a halt"},img:'locker',prog:25,body:{zh:'Tengku 走过来，让你休息。\n\n他问：昨晚睡好了吗？\n\n你愣了一下。不记得睡得如何。但你笃定地感觉到，有什么东西压在心里，被他清晰地捕捉到了。\n\n你问他是怎么看出来的。\n\n他说：你的内心世界，已经全部透明地写在击球里。也许你的思维会撒谎，但击球不会，从不会。\n\n你坐在那里，想了一下这句话。',en:"Tengku comes over and calls a rest.\n\nDid you sleep well last night?\n\nYou pause. You do not remember. But you feel with certainty that something is pressing on you — and he has caught it clearly.\n\nYou ask how he could tell.\n\nHe says: your inner world is written transparently in every shot. Your thoughts might lie. But your hitting never does.\n\nYou sit with that for a moment."},choices:[{l:'→',t:{zh:'Tengku 提议打一盘记分比赛。',en:"Tengku suggests playing a proper set."},n:'match_proposal'}]},
      after_talk:
      {tag:{zh:'重新站上场',en:"Back on court"},img:'tennis',prog:30,body:{zh:'喝完水，你重新站上了底线。\n\n没有做什么特别的准备。只是站着，等球。\n\n然后Tengku提议：我们打一盘记分比赛吧。\n\n你点头。',en:"After the water, you stand on the baseline again.\n\nNo special preparation. Just standing. Waiting for the ball.\n\nThen Tengku suggests: let's play a proper set, keep score.\n\nYou nod."},choices:[{l:'→',t:{zh:'第一分开始了。',en:"The first point begins."},n:'zone_entry'}]},
      match_proposal:
      {tag:{zh:'记分比赛',en:"A scored set"},img:'tennis',prog:32,body:{zh:'Tengku 提议打一盘记分比赛。\n\n这个间隙好像打断了什么。当你重新站上场，脚踩在底线位置，望向隔网远处，脑海中一片空白——所有的思绪仍在缓冲中，尚未来得及加载。\n\n你没有主动做任何事，只是站在那里。',en:"Tengku suggests playing a proper set.\n\nThis gap seems to break something. When you stand on the baseline again, looking across the net, your mind is blank — all the thoughts still buffering, not yet loaded.\n\nYou do not do anything deliberately. You just stand there."},choices:[{l:'→',t:{zh:'第一分开始了。',en:"The first point begins."},n:'zone_entry'}]},
      zone_entry:
      {tag:{zh:'第一分',en:"The first point"},img:'tennis',prog:55,body:{zh:'球飞过来。\n\n你没有想任何事。准备提前了，步伐跟上了，拍面对准了，球落在你想要的地方。\n\n然后又一球，又一球。\n\n你没有叫它来，但它来了——盯球更清楚，准备更提前，步伐更勤快，击打更准确。零失误拿到三个破发点，然后一鼓作气完成破发。\n\n这是你练习以来第一次拿下教练的发球局。而且是连下四分的方式。\n\n你几乎不敢相信。',en:"The ball comes over.\n\nYou are not thinking about anything. Preparation is earlier, footwork follows, the racket face aligns, the ball lands where you want it.\n\nThen another. And another.\n\nYou did not summon it, but it came — tracking the ball more clearly, preparing earlier, feet moving quicker, striking more accurately. Zero errors, three break points, then the break itself.\n\nThis is the first time you have broken Tengku's serve since you started training. With four straight points.\n\nYou can barely believe it."},pause:{zh:'你不知道自己做了什么。它只是发生了。',en:"You do not know what you did. It just happened."},choices:[{l:'A',t:{zh:'状态太好了，想搞清楚自己做对了什么，把它延续下去。',en:"The state is extraordinary. You want to understand what you did right and keep it going."},n:'analyze_zone',c:true},{l:'B',t:{zh:'什么都不想，就让它继续发生。',en:"Think nothing. Let it keep happening."},n:'stay_zone'}]},
      stay_zone:
      {tag:{zh:'继续打',en:"Continuing"},img:'tennis',prog:72,body:{zh:'你没有去想。\n\n球来，你打。步伐、引拍、随挥——连贯地发生，不需要指挥。\n\n这个状态延续了六局，比分来到3:3。这是你练习以来最好的一段表现。\n\nTengku 在对面打得更认真了，但你能感觉到他眼睛里有一种你以前没见过的东西。',en:"You do not think.\n\nBall comes, you hit. Footwork, backswing, follow-through — happening in sequence, without direction.\n\nThe state holds for six games. Score reaches 3-3. The best stretch of play since you started training.\n\nTengku is playing more seriously across the net. But you can sense something in his eyes you have not seen before."},choices:[{l:'→',t:{zh:'然后一个念头出现了。',en:"Then a thought arrives."},n:'thought_arrives'}]},
      analyze_zone:
      {tag:{zh:'你开始想',en:"You start thinking"},img:'tennis',prog:65,body:{zh:'你开始琢磨：刚才到底做对了什么？\n\n是步伐？是引拍时机？还是什么别的？\n\n你想把它找出来，复制它，延续这个状态。\n\n但就在这个念头出现之后，击球开始走偏。不是一下，是慢慢的，越来越偏，像沙漏里的沙，在你没注意到的地方，悄悄流走了。',en:"You start to work it out: what exactly did you do right just then?\n\nWas it the footwork? The timing of the backswing? Something else?\n\nYou want to identify it, replicate it, extend the state.\n\nBut from the moment this thought appears, the hitting starts to drift. Not all at once — slowly, gradually further off, like sand in an hourglass, slipping away somewhere you were not watching."},nudge:{zh:'你开始想要捉住它的那一刻，它就已经走了。',en:"The moment you tried to hold it, it was already leaving."},choices:[{l:'→',t:{zh:'你飞快丢掉了接下来三局。',en:"You quickly lose the next three games."},n:'losing_streak'}]},
      thought_arrives:
      {tag:{zh:'一个念头',en:"A thought"},img:'tennis',prog:80,body:{zh:'3:3。\n\n你站在底线，忽然意识到——自己刚才打了多么不可思议的六局。\n\n于是一个念头出现了：我刚才到底做对了什么？\n\n就那么一下，思绪动了。\n\n接下来三局，你飞快丢掉了。',en:"3-3.\n\nYou stand on the baseline and suddenly realise — what an extraordinary six games you just played.\n\nA thought arrives: what exactly did I do right just then?\n\nJust that movement of thought.\n\nYou lose the next three games quickly."},choices:[{l:'→',t:{zh:'3:6 告负。Tengku 走过来。',en:"3-6. Tengku comes over."},n:'tengku_end'}]},
      losing_streak:
      {tag:{zh:'比分滑落',en:"The score slides"},img:'tennis',prog:82,body:{zh:'3局，飞快丢掉。\n\n3:6 告负。\n\n你坐在椅子上，脑子里同时存在两种感受：那六局的不可思议，和这三局的迅速崩盘。\n\nTengku 走过来，在旁边坐下。',en:"Three games. Lost quickly.\n\n3-6. Defeat.\n\nYou sit in the chair, holding two feelings at once: the extraordinary six games, and the rapid collapse of these three.\n\nTengku comes over and sits beside you."},choices:[{l:'→',t:{zh:'他说了一句话。',en:"He says something."},n:'tengku_end'}]},
      tengku_end:
      {tag:{zh:'球场边，练习结束后',en:"Courtside, after practice"},img:'locker',prog:90,body:{zh:'Tengku 坐在旁边。\n\n他说：你知道那六局你在做什么吗？\n\n你说：什么都没想。\n\n他点头。然后他说：你不关注的时候，那个状态自然就出来了。你开始想要它，它就走了。积极暗示也好，自我评判也好，背后是同一件事——预期。你把注意力全部放在结果和预期的差距上，身体就没有空间了。\n\n你坐在那里，听着。\n\n然后他补了一句：每一分开始前，做一次归零。然后只管去打。',en:"Tengku sits beside you.\n\nHe says: do you know what you were doing in those six games?\n\nYou say: not thinking about anything.\n\nHe nods. Then: when you stopped paying attention, the state appeared naturally. When you wanted it, it left. Positive self-talk, self-judgment — at their core they are the same thing: expectation. When all your attention goes to the gap between result and expectation, the body has no space left.\n\nYou sit and listen.\n\nThen he adds: before each point, reset to zero. Then just play."},pause:{zh:'每一分开始前，做一次归零。然后只管去打。',en:"Before each point, reset to zero. Then just play."},choices:[{l:'→',t:{zh:'你想了很久这句话。',en:"You sit with this for a long time."},n:'end_full'}]},
      end_full:
      {tag:{zh:'练习结束后，回家路上',en:"On the way home after practice"},img:'rain',prog:100,body:{zh:'',en:""},choices:[],isEnd:true,endType:'full',title:{zh:'你即你的击球，而击球不会撒谎',en:"You Are Your Hitting, and Hitting Never Lies"},story:{zh:'你想到那六局。\n\n那时候你没有在想任何事，球就来了，你就打了，步伐、引拍、随挥——连贯地发生，不需要指挥。那个状态不是被努力出来的，也不是被积极心理暗示召唤来的。它是在你停下来、脑子清空的那一刻，自己出现的。\n\n然后你开始想要理解它，想要复制它，它就走了。\n\n你想到 Tengku 那句话——积极暗示和自我评判，背后是同一件事：预期。两者都把注意力投射在实际与预期的差距上。虽然一个是正向的，一个是负向的，但它们做的是同一件事：把心带离了当下。\n\n然后你想到另一句：每一分开始前，做一次归零。\n\n不是忘掉上一分，是不把它带进下一分。\n\n<em>究竟哪个是真正的我——那个有如神助的我，还是低迷不振的我？也许完整的你，像一把游标卡尺，而当下的你，只是其中一个切片。你打出什么样的球，不是你是谁，只是这一刻你在哪里。</em>',en:"You think about those six games.\n\nYou were not thinking about anything. The ball came, you hit it, footwork, backswing, follow-through — happening in sequence, without direction. That state was not produced by effort, or summoned by positive self-talk. It appeared by itself in the moment you stopped, when your mind went quiet.\n\nThen you tried to understand it, replicate it. And it left.\n\nYou think about what Tengku said — positive self-talk and self-judgment are the same thing at their core: expectation. Both direct attention toward the gap between result and expectation. One is framed positively, one negatively, but they do the same thing: they take the mind away from now.\n\nThen you think about the other thing he said: before each point, reset to zero.\n\nNot forgetting the last point. Not carrying it into the next one.\n\n<em>Which is the real you — the one playing with extraordinary ease, or the one stuck in a slump? Maybe the complete you is like a measuring instrument, and the present you is just one reading on its scale. What kind of shot you hit is not who you are. It is only where you are, in this moment.</em>"},insight:{zh:'积极心理暗示不是没用，只是它和自我评判一样，都暗含了预期。真正的平静不是告诉自己没问题，而是在下一分开始前，真正地放下上一分。',en:"Positive self-talk is not useless — but like self-judgment, it contains expectation. Real composure is not telling yourself things are fine. It is genuinely releasing the last point before the next one begins."}},
      end_partial:
      {tag:{zh:'练习结束，还在想',en:"After practice, still thinking"},img:'rain',prog:90,body:{zh:'',en:""},choices:[],isEnd:true,endType:'reflective',title:{zh:'那六局，和它消失的那一刻',en:"Those Six Games, and the Moment They Left"},story:{zh:'你还在想那六局。\n\n那时候你什么都没想，球就打对了。然后你开始想要理解它，想要延续它，它就走了。\n\n你想不明白这件事——不是因为它太复杂，而是因为它太简单，简单到让你不知道该怎么相信它。\n\n你想起 Tengku 的那句话：积极暗示也好，自我评判也好，背后是同一件事——预期。\n\n也许有些状态，不是靠寻找得来的。它们只在你不找的时候，悄悄出现。\n\n<em>这不是一个你现在就能完全理解的事情。但它发生过——那六局是真实的，你打出了那些球，那个状态是真实的。这就够了，先记住它。</em>',en:"You are still thinking about those six games.\n\nYou were not thinking about anything, and the hitting was right. Then you tried to understand it, to extend it, and it left.\n\nYou cannot quite work it out — not because it is too complicated, but because it is too simple. Simple enough that you do not know how to trust it.\n\nYou think of what Tengku said: positive self-talk and self-judgment, at their core, are the same thing — expectation.\n\nMaybe some states cannot be found. They appear only when you stop looking.\n\n<em>This is not something you can fully understand right now. But it happened — those six games were real, you hit those shots, that state was real. That is enough. Remember it first.</em>"},insight:{zh:'不是每一次领悟都能在发生的当天就完全消化。有些东西，需要在以后某一次练习里，突然想起来，才真正明白。',en:"Not every insight can be fully absorbed on the day it happens. Some things only become clear later — in a future session, when something suddenly reminds you."}}
    }
  }

    tag:{zh:'日常 · 真实改编',en:"Daily Life · Based on a true story"},
    title:{zh:'愿无所拘束的活下去',en:"May We Live Without Restraint"},
    desc:{zh:'一只叫大咪的猫，三年，一个平常傍晚的质地。以及他一直在静静教你的事。',en:"A cat named Dami. Three years. The texture of daily life, and what he has been quietly teaching you."},
    cover:'home',
    meta:[{zh:'约 6 分钟',en:"~6 min"},{zh:'一个傍晚',en:"One evening"},{zh:'真实故事',en:"True story"}],
    keywords:['猫','养猫','日常','独居','阯伴','当下','安静','生活'],
    scenes:{
      start:
      {tag:{zh:'某个下班的傍晚',en:"A weekday evening, coming home"},img:'night',prog:8,body:{zh:'钥匙插进去，门开了。\n\n他已经在那里了。\n\n不是等在门口的那种——是听到声音，从某处缓缓走过来，走廊上爪子踩出轻微的声响。鼻头红彤彤的，说明刚才在玩。\n\n他停在你面前，看着你。\n\n你放下包，也看着他。',en:"Key in, door open.\n\nHe is already there.\n\nNot waiting at the door — he heard you and walked over slowly from somewhere, his paws making soft sounds on the hallway floor. His nose is pink-red, which means he was just playing.\n\nHe stops in front of you and looks at you.\n\nYou put down your bag and look back."},choices:[{l:'A',t:{zh:'蹲下来，把手伸向他。',en:"Crouch down and reach your hand toward him."},n:'touch'},{l:'B',t:{zh:'先站着，等他过来。',en:"Stay standing. Wait for him to come to you."},n:'wait'}]},
      wait:
      {tag:{zh:'走廊里，对视',en:"In the hallway, looking at each other"},img:'night',prog:18,body:{zh:'你没有动。\n\n他也没有动。\n\n然后他开口了——ngha，ngha，眼睛圆圆的，古铜色，满是疑惑和迫不及待。\n\n你笑了，把手伸过去。他立刻踮起四肢，脑袋微微用力地顶着你的手心。\n\n你们已经这样做过上千次了，每次都像第一次一样自然。',en:"You do not move.\n\nNeither does he.\n\nThen he opens his mouth — ngha, ngha — eyes wide and copper-coloured, full of puzzlement and urgency.\n\nYou smile and reach your hand out. He immediately lifts onto his toes, head pushing gently but firmly into your palm.\n\nYou have done this a thousand times. Each time feels as natural as the first."},choices:[{l:'→',t:{zh:'进屋，开始这个晚上。',en:"Go inside. The evening begins."},n:'living_room'}]},
      touch:
      {tag:{zh:'走廊里，蹲下来',en:"In the hallway, crouching down"},img:'night',prog:18,body:{zh:'他立刻踮起四肢，脑袋微微用力地顶着你的手心。\n\n这个动作你们已经重复过上千次了——他总是这样，主动迎上来那么一点点，好像在说，我也想。\n\n他的毛是温的，鼻头还是热的，刚才玩得很尽兴。\n\n你在走廊里蹲了一会儿，没有急着站起来。',en:"He immediately lifts onto his toes, his head pushing gently but firmly into your palm.\n\nYou have repeated this gesture a thousand times — he always does this, meeting you just that little bit, as if to say, me too.\n\nHis fur is warm. His nose is still hot from playing.\n\nYou stay crouched in the hallway for a moment, in no hurry to stand."},choices:[{l:'→',t:{zh:'进屋，开始这个晚上。',en:"Go inside. The evening begins."},n:'living_room'}]},
      living_room:
      {tag:{zh:'客厅，晚上',en:"Living room, evening"},img:'home',prog:30,body:{zh:'客厅里空荡荡的，没什么摆件——他搬来没多久，龟背竹和天堂鸟就被破坏殆尽了。玻璃制品碎了好几个。后来干脆什么都不放，看上去家徒四壁。\n\n但你早就习惯了，甚至觉得清爽。\n\n他在沙发上蹲着，尾巴卷成一圈，看你在屋里走动。你经过他旁边，他用额头蹭了一下你的腿，不动声色地标记气味。\n\n你把腿往旁边挪了一步，假装没给他蹭到。他高高扬起尾巴，又倾过来蹭了一下。\n\n就是这么锲而不舍。',en:"The living room is sparse, not much on the shelves — shortly after he moved in, the plants were destroyed, a few glass things broken. Eventually you stopped putting anything out. It looks bare but you got used to it. Actually you find it clean.\n\nHe is crouched on the sofa, tail curled into a ring, watching you move around the room. As you pass, he rubs his forehead against your leg, marking his scent without making a fuss about it.\n\nYou move your leg a step sideways, pretending not to give him the opportunity. He lifts his tail high and leans over to do it again.\n\nThis is just how he is. Persistent."},choices:[{l:'A',t:{zh:'在沙发上坐下来。',en:"Sit down on the sofa."},n:'sofa'},{l:'B',t:{zh:'去厨房倒杯水，他跟过来了。',en:"Go to the kitchen for water. He follows."},n:'kitchen'}]},
      kitchen:
      {tag:{zh:'厨房，他跟过来了',en:"Kitchen, he followed you"},img:'cafe',prog:38,body:{zh:'你去倒杯水，他也跟了过来。\n\n没有什么理由。你去哪里，他就在不远处出现。\n\n他坐在厨房地板上，看你倒水，然后看你把杯子放下，然后看你准备离开，然后站起来，跟你一起走回客厅。\n\n不粘，不吵，只是在。\n\n你想，他大概不需要你一直陪着，他只是喜欢知道你在。',en:"You go to pour some water. He comes along.\n\nNo particular reason. Wherever you go, he appears nearby.\n\nHe sits on the kitchen floor and watches you pour, watches you put the glass down, watches you prepare to leave, then stands and walks back to the living room with you.\n\nNot clingy. Not loud. Just there.\n\nYou think he probably does not need you to be with him constantly. He just likes knowing you are around."},choices:[{l:'→',t:{zh:'回到沙发上。',en:"Back to the sofa."},n:'sofa'}]},
      sofa:
      {tag:{zh:'沙发上，过了一会儿',en:"On the sofa, a while later"},img:'home',prog:50,body:{zh:'你躺下来。\n\n没过多久，他跳上来，在你大腿上蹲稳，收起爪子，尾巴轻轻扫了两下，然后定住。\n\n然后是那个声音——呼噜，呼噜，低沉而均匀，像一台小型的、运转正常的机器。\n\n你第一次听到这个声音时以为他感冒了，呼吸不畅。后来才知道，这是他非常享受当下的信号。\n\n屋里很安静，只有呼噜声。',en:"You lie down.\n\nNot long after, he jumps up and settles on your thighs, tucks his paws in, gives his tail a couple of light sweeps, then goes still.\n\nThen that sound — purring, low and steady, like a small machine running smoothly.\n\nThe first time you heard it you thought he had a cold, his breathing obstructed. Later you learned this is his signal for deep contentment.\n\nThe room is quiet. Just the purring."},pause:{zh:'你上一次在家里什么都不做，是什么时候的事了。',en:"When was the last time you did nothing at home."},choices:[{l:'A',t:{zh:'抚摸他的脑袋，揉揉肚子。',en:"Stroke his head. Rub his belly."},n:'knead'},{l:'B',t:{zh:'就这样，什么都不做，听着他。',en:"Stay still. Do nothing. Just listen."},n:'just_listen'}]},
      just_listen:
      {tag:{zh:'沙发上，听着',en:"On the sofa, listening"},img:'home',prog:60,body:{zh:'你什么都没做。\n\n就听着他的呼噜声，低沉而均匀，随着他的呼吸起伏。\n\n外面偶尔有车声，楼道里偶尔有脚步声，但都是远的。这里很安静。\n\n你不知道自己在想什么，或者说，你没有在特别想什么。只是在这里，感受到他的重量压在大腿上，温热的，一动不动。\n\n你意识到，你已经很久没有这样了——什么都不做，只是在。',en:"You do nothing.\n\nJust listening to his purring, low and steady, rising and falling with his breathing.\n\nOccasionally a car outside, occasionally footsteps in the hallway, but all distant. It is quiet here.\n\nYou do not know what you are thinking, or rather, you are not thinking about anything in particular. Just here, feeling his weight on your thighs, warm, motionless.\n\nYou realise it has been a long time since you were like this — doing nothing. Just being."},choices:[{l:'→',t:{zh:'过了一会儿，他开始踩奶。',en:"After a while, he starts kneading."},n:'knead'}]},
      knead:
      {tag:{zh:'踩奶',en:"Kneading"},img:'home',prog:70,body:{zh:'他开始踩奶了。\n\n前爪一下一下，有节奏地踩在你的腿上，眼睛微微眯起，表情心满意足。\n\n这是猫小时候刚出生、为了获取母乳的动作，但离开母亲之后，长大了，还是会这样做。你觉得，这大概是他表达依赖和羁绊的方式。\n\n他的爪子不算重，但能感受到每一下的力道。踩着踩着，你发现自己的肩膀不知道什么时候松下来了。',en:"He starts kneading.\n\nFront paws, one after the other, pressing rhythmically into your leg, eyes half-closed, expression fully satisfied.\n\nThis is what kittens do at birth to get milk from their mother. He left his mother long ago. He still does this. You think it is probably his way of expressing attachment.\n\nHis paws are not heavy, but you can feel each press. Somewhere in the middle of it, you notice your shoulders have come down."},choices:[{l:'→',t:{zh:'他慢慢安静下来，趴稳了。',en:"He gradually settles, lying flat and still."},n:'sleeping'}]},
      sleeping:
      {tag:{zh:'他睡着了',en:"He falls asleep"},img:'home',prog:82,body:{zh:'呼噜声慢慢低了下去，踩奶的动作也停了。\n\n他趴在你腿上，闭着眼睛，呼吸变得缓慢而深长。\n\n你没有动。\n\n窗外的光已经暗了，屋里也没开灯。你就在半暗中坐着，他在你腿上睡着，发出轻微的呼吸声。\n\n这一方天地不大，但此刻，它是完整的。',en:"The purring gradually fades. The kneading stops.\n\nHe lies flat on your legs, eyes closed, breathing becoming slow and deep.\n\nYou do not move.\n\nThe light outside has darkened. You have not turned on the lights inside. You sit in the half-dark, him asleep on your legs, the faint sound of his breathing.\n\nThis space is small. But right now, it is complete."},choices:[{l:'A',t:{zh:'轻轻摸了摸他，他动了一下，没醒。',en:"You reach down and touch him lightly. He stirs but does not wake."},n:'touch_sleeping'},{l:'B',t:{zh:'就这样坐着，不打扰他。',en:"Stay still. Do not disturb him."},n:'end_still'}]},
      touch_sleeping:
      {tag:{zh:'他动了一下',en:"He stirs"},img:'home',prog:90,body:{zh:'他动了一下，身体往你腿上更贴了一点，又沉下去，继续睡。\n\n你把手放在他背上，能感受到他呼吸时轻微的起伏。\n\n你想起他刚来的时候，四个多月大，像个长条子，轻盈地吱溜乱窜。那时候你以为他可能刻着瘦的基因。\n\n现在他是心宽体胖的猪咪了，压在你腿上，沉甸甸的，踏实。\n\n三年了。',en:"He shifts, pressing himself a little closer into your legs, then sinks back down and keeps sleeping.\n\nYou rest your hand on his back and feel the slight rise and fall of his breathing.\n\nYou think of when he first arrived, four months old, all stretched out and darting around lightly. You thought he might have a lean constitution.\n\nNow he is a plump, contented cat, heavy on your legs, solid.\n\nThree years."},choices:[{l:'→',t:{zh:'窗外的天完全黑了。',en:"Outside, the sky has gone completely dark."},n:'end_still'}]},
      end_still:
      {tag:{zh:'这个晚上',en:"This evening"},img:'night',prog:100,body:{zh:'',en:""},choices:[],isEnd:true,endType:'full',title:{zh:'愿无所拘束的活下去',en:"May We Live Without Restraint"},story:{zh:'你在这里坐了很久。\n\n他在你腿上睡着了，屋里没开灯，外面的车声偶尔传进来，又消失。\n\n你不知道自己有没有想什么。大概没有。只是在，只是坐着，只是感受他压在腿上的重量，温热的，均匀呼吸着。\n\n你想到他的名字，想到三年里那些日常——鼻头红彤彤说明刚在玩，长假回来他扒拉一整晚房门，客厅里什么都不放空荡荡的，他锲而不舍地用额头蹭你的腿。\n\n没有一件是大事。\n\n但加在一起，是生活的质地。是某种你说不太清楚的、却实实在在存在的东西。\n\n窗外是夜晚的城市，屋里是安静的他。<em>他毫不介意房屋不大，毫不介意陪伴有限，就在这一方天地里，充分享受着每一天。</em>\n\n你想，也许这就是他一直在教你的事。',en:"You have been sitting here for a long time.\n\nHe is asleep on your legs. The lights are off. The sound of cars outside comes and goes.\n\nYou do not know if you have been thinking about anything. Probably not. Just here, just sitting, just feeling his weight on your legs, warm, breathing steadily.\n\nYou think of his name, of three years of ordinary things — nose pink-red from just playing, pawing at the door all night when you returned from a long trip, the living room bare and clear, the way he presses his forehead against your leg and keeps going.\n\nNone of it is significant.\n\nBut together, it is the texture of a life. Something you cannot quite name but that is undeniably there.\n\nOutside is the night city. Inside is his quiet presence. <em>He does not mind that the space is small. Does not mind that company is limited. He simply lives each day fully, in this small world of his.</em>\n\nYou think: maybe this is what he has been teaching you all along."},insight:{zh:'有些东西，只有和动物在一起才会出现——不是顿悟，不是改变，只是某种被拉回当下的感觉。他不问你今天过得怎样，不需要你表现什么，他只是在，你也只是在，这已经是一件完整的事了。',en:"Some things only appear when you are with an animal — not a revelation, not a change, just a feeling of being pulled back to now. He does not ask how your day was. Does not need you to perform anything. He is simply here, and so are you, and that is already something complete."}}
    }
  }
