    id:'cat2',category:'daily',template:'C',level:2,
    tag:{zh:'日常 · 真实改编',en:"Daily Life · Based on a true story"},
    title:{zh:'心之所向，千千万万遇',en:"Wherever the Heart Points, A Thousand Times Over"},
    desc:{zh:'离开一座城市前，你把大咪送走了。那个深夜的哭，让你明白了一件事。',en:"Before leaving a city, you handed Dami over. The tears that night told you something you had not known before."},
    cover:'night',
    meta:[{zh:'约 8 分钟',en:"~8 min"},{zh:'离别与归属',en:"Parting and belonging"},{zh:'真实故事',en:"True story"}],
    keywords:['离开','分别','猫','日常','独居','归属','流浪','记得'],
    scenes:{
      start:
      {tag:{zh:'离开前，某个下午',en:"Before leaving, one afternoon"},img:'home',prog:5,body:{zh:'你决定了，要离开这座城市。\n\n大咪的去处，成了一个难题。\n\n把他带出国，在当下不是最优解。托付给一位非常信赖的朋友——她家里有一只布偶，两只猫互相有个伴，住处离这里也很近，对大咪少一些折腾。\n\n道理上说得通。\n\n但你还是拖了几天，才拨通朋友的电话。',en:"You have decided. You are leaving this city.\n\nWhat to do with Dami becomes a problem.\n\nTaking him abroad is not the best option right now. Entrusting him to a close friend — she has a Ragdoll at home, two cats can keep each other company, and she lives nearby, less disruption for Dami.\n\nIt makes sense.\n\nBut you put it off for a few days before making the call."},choices:[{l:'→',t:{zh:'送走的那天到了。',en:"The day of handover arrives."},n:'sendoff'}]},
      sendoff:
      {tag:{zh:'送走的那天',en:"The day you hand him over"},img:'home',prog:22,body:{zh:'你把猫包打开，放在地上。\n\n大咪走过来闻了一下，然后看了你一眼。\n\n他似乎感知到了什么。当你把他的下半身放进猫包，他后腿蹬地，前爪向上顶，使出全身的力气想钻出来。你和他拉锯了很久，好不容易装进去，拉链刚拉上，他就开启了嚎叫模式。\n\n去朋友家不过步行十分钟，他嗷了一路，路人回头率几乎百分之百。\n\n你低着头走，什么都没说。',en:"You open the carrier and place it on the floor.\n\nDami walks over, sniffs it, then looks at you.\n\nHe seems to sense something. When you lower his back half into the bag, he pushes with his hind legs, presses up with his front paws, using every bit of strength to get out. You struggle with him for a long time. Finally he is in, the zip barely closed, and he starts howling.\n\nThe walk to your friend's place is ten minutes. He cried the whole way. Nearly everyone you passed turned to look.\n\nYou walked with your head down and said nothing."},choices:[{l:'→',t:{zh:'安顿好大咪，你回到住处。',en:"Dami is settled. You walk back home."},n:'return_alone'}]},
      return_alone:
      {tag:{zh:'回到住处，入夜',en:"Back home, night falling"},img:'night',prog:38,body:{zh:'家里很安静。\n\n以前这个时间，他会从某处缓缓走过来，鼻头红彤彤或是奶白，蹭蹭你的腿，或者ngha ngha冲你叫。\n\n现在什么声音都没有。\n\n你在沙发上坐了一会儿，然后去洗漱，然后躺下。辗转反侧，睡不着。\n\n不知道过了多久，鼻子一酸。',en:"The apartment is very quiet.\n\nAt this hour he would usually walk over slowly from somewhere, nose pink-red or cream, rub against your leg, or make that ngha ngha sound.\n\nNow there is nothing.\n\nYou sit on the sofa for a while, then wash up, then lie down. Restless, unable to sleep.\n\nAfter some time, your nose stings."},pause:{zh:'屋里很安静。以前这个安静里，有他的呼噜声。',en:"The apartment is quiet. Before, inside this quiet, there was the sound of his purring."},choices:[{l:'A',t:{zh:'眼泪就这样下来了。',en:"The tears come."},n:'crying'},{l:'B',t:{zh:'你强迫自己闭上眼睛，告诉自己没事的。',en:"You force your eyes shut and tell yourself it is fine."},n:'suppress',c:true}]},
      suppress:
      {tag:{zh:'深夜，忍着',en:"Late night, holding it in"},img:'night',prog:48,body:{zh:'你告诉自己，这没什么。只是一只猫，他去了更好的地方，有人照顾，有猫做伴。\n\n你知道这是对的。\n\n但身体不听。鼻子还是酸，眼眶还是热，情绪像是涨满的水，你试着用理智把它压住，它就从别的地方渗出来。\n\n最后你放弃了。',en:"You tell yourself it is nothing. Just a cat. He has gone somewhere better, someone to look after him, another cat for company.\n\nYou know it is right.\n\nBut your body does not listen. Your nose still stings, your eyes are still hot, emotion like water pressing against a surface. You try to hold it down with reason and it seeps out somewhere else.\n\nFinally you give up."},choices:[{l:'→',t:{zh:'眼泪还是下来了。',en:"The tears come anyway."},n:'crying'}]},
      crying:
      {tag:{zh:'深夜，枕头上',en:"Late night, on the pillow"},img:'night',prog:55,body:{zh:'情绪像山洪一样涌出来，然后止不住地抽泣。\n\n周遭很静，你不知道哭了多久。脑海中一片空白，没有在想任何具体的事，只是哭。\n\n后来你慢慢平静下来，盯着天花板，想起了很多——他第一次来的时候，那只瘦瘦长长的「条子」；他踮起四肢顶着你的手心；他嗷嗷嗷一路被你抱来的第一天；他压在你腿上发出呼噜声的每一个晚上。\n\n三年多，每天不多的陪伴，平凡而深刻。\n\n此刻，你才真正意识到，这对你有多重要。',en:"Emotion floods out like a burst of water and you cannot stop sobbing.\n\nThe room is quiet. You do not know how long you cry. Your mind is blank, not thinking of anything specific. Just crying.\n\nAfterwards you slowly calm and stare at the ceiling, thinking of things — the first day he arrived, that stretched-out skinny shape; him lifting onto his toes to press into your palm; him howling the whole way here on that first day; every evening with him settled on your legs, purring.\n\nThree years, not much time each day, ordinary and deep.\n\nIn this moment, you finally understand how much this has mattered to you."},choices:[{l:'→',t:{zh:'天快亮了，你做了一个决定。',en:"Near dawn, you make a decision."},n:'decision'}]},
      decision:
      {tag:{zh:'第二天早上',en:"The next morning"},img:'home',prog:65,body:{zh:'你醒来，脑子出奇地清醒。\n\n你打开手机，锁定了回老家的机票，预订了宠物舱位。\n\n然后拨了爸妈的电话。这些年一起生活的三年多，你从来没和他们提起过大咪——这是一件和他们毫不相干的事，你以为。\n\n电话那头，你告诉他们：我要把一只猫带回来。\n\n你以为会有一场解释，甚至争论。\n\n他们几乎很快欣然接纳了。\n\n可能这些年，他们对你离经叛道的选择，也逐渐脱敏了。',en:"You wake up with unusual clarity.\n\nYou open your phone, find a flight home, book a pet cabin.\n\nThen you call your parents. In the three-plus years of life together, you never mentioned Dami to them — you thought it had nothing to do with them.\n\nOn the phone, you tell them: I am bringing a cat home.\n\nYou expected to have to explain. Maybe argue.\n\nThey agreed, quickly, almost warmly.\n\nMaybe over these years they have gradually become desensitised to your unconventional choices."},nudge:{zh:'你以为这是一件和他们毫不相干的事。但他们说好了。',en:"You thought it had nothing to do with them. They said yes."},choices:[{l:'→',t:{zh:'离开的前一晚。',en:"The night before you leave."},n:'last_night'}]},
      last_night:
      {tag:{zh:'离开前的最后一晚',en:"The last night"},img:'home',prog:78,body:{zh:'你去朋友家把大咪接了回来。\n\n这三年，你从没让他进过卧室。偶尔趁机溜进来，也被你请了出去。他虽然不乐意，但适应了。\n\n那晚，你把卧室门敞开了。\n\n大咪站在门口，像是瞳孔地震了一番，然后小心翼翼地摸索进来，在房间里转了几圈，闻了闻，确认了，然后跳上床，在你腿边侧卧下来。\n\n你以为半夜会被他压醒。\n\n没有。那一晚你睡得格外踏实。',en:"You go to your friend's place and bring Dami back.\n\nThese three years, you never let him into the bedroom. If he slipped in he was escorted out. He was unhappy about it but adapted.\n\nThat night, you left the bedroom door open.\n\nDami stood at the doorway, something like shock crossing his face, then carefully felt his way in, circled a few times, sniffed, confirmed something, then jumped on the bed and lay down on his side beside your legs.\n\nYou thought you would be woken by his weight in the night.\n\nYou were not. That night you slept more soundly than usual."},choices:[{l:'→',t:{zh:'早上醒来。',en:"Waking up in the morning."},n:'morning_last'}]},
      morning_last:
      {tag:{zh:'最后一个早上，醒来',en:"Last morning, waking up"},img:'home',prog:88,body:{zh:'你睁开眼。\n\n他就在那里，侧卧在你腿边，安静的像一只XXXL号躺平海参。\n\n窗帘透着光，这个房间你住了三年，今天是最后一天。他不知道这些，只是把自己妥帖地安置在那里，发出轻微的呼吸声。\n\n你没有立刻起来。\n\n就这样又多躺了一会儿，和他一起。',en:"You open your eyes.\n\nHe is there, lying on his side beside your legs, as still as an XXXL-sized sea cucumber.\n\nLight comes through the curtains. You have lived in this room for three years. Today is the last day. He does not know any of this. He has simply arranged himself there, breathing softly.\n\nYou do not get up right away.\n\nYou lie there a little longer. With him."},choices:[{l:'→',t:{zh:'收拾行李，准备出发。',en:"Pack up. Time to go."},n:'departure_cat'}]},
      departure_cat:
      {tag:{zh:'出发',en:"Departure"},img:'rain',prog:93,body:{zh:'大咪这次进猫包，没有上次那么激烈。\n\n也许感知到了什么不同，也许只是疲倦，他进去之后，嗷了几声，然后安静下来。\n\n你提着他，出了门。\n\n身后这套房子，你把钥匙留给了房东。你想，以后大概不会再回来了。\n\n但现在，你低头看了一眼猫包，他正透过网眼看着你，古铜色的眼睛，圆的，安静的。\n\n你继续往前走。',en:"This time Dami goes into the carrier without as much drama.\n\nMaybe he senses something is different. Maybe he is just tired. He goes in, calls out a few times, then goes quiet.\n\nYou pick him up and walk out the door.\n\nYou have left the keys with the landlord. You think, you probably will not come back.\n\nBut right now you look down at the carrier. He is looking back at you through the mesh, copper eyes, round, quiet.\n\nYou keep walking."},choices:[{l:'→',t:{zh:'回到老家，新的开始。',en:"Back home. A new beginning."},n:'new_home'}]},
      new_home:
      {tag:{zh:'老家，之后',en:"Back home, some time later"},img:'home',prog:97,body:{zh:'大咪的生活，一下子从经济舱跃升至头等舱。\n\n爸妈在真香定律支配下，对他宠爱有加。家里没有任何禁区，他任意溜达，和爸妈的作息逐渐拟合。每天晒足太阳，吃饱喝足，找个柔软的地方倒头就睡。\n\n早上叫醒服务，晚上迎接回家，是他亲密表达的集中时刻。其余时间，他很享受独处，偶尔看不见人了，转悠一圈，看到你在视线里，也不粘着，便继续自己的事。\n\n你从他们发来的照片和视频里，看见这一切。\n\n你想，他过得很好。',en:"Dami's life upgrades from economy to first class overnight.\n\nYour parents, subject to the law of eventual appreciation, spoil him thoroughly. No forbidden zones anywhere in the house. He roams freely, his schedule gradually syncing with theirs. Full sun every day, well fed, finding the softest spot and lying down whenever he likes.\n\nMorning wake-up service, evening welcome home — these are his concentrated moments of affection. The rest of the time he enjoys being alone, occasionally checking that you are somewhere in his field of vision, then returning to his own business without clinging.\n\nYou see all of this in the photos and videos they send.\n\nYou think: he is doing well."},choices:[{l:'→',t:{zh:'生日快乐，大咪。',en:"Happy birthday, Dami."},n:'end_full'}]},
      end_full:
      {tag:{zh:'四岁了',en:"Four years old"},img:'home',prog:100,body:{zh:'',en:""},choices:[],isEnd:true,endType:'full',title:{zh:'心之所向，千千万万遍',en:"Wherever the Heart Points, A Thousand Times Over"},story:{zh:'你有时会想，不知道是你像大咪，还是大咪像你，或者你们本就是一体。\n\n他不介意空间的大小，不介意陪伴的多少，不介意是在北京的出租屋还是老家的房子。他只是充分地活在当下，活在他所在的地方，活在他所有的每一天里。\n\n而你呢——这些年，你也一直在寻找一种活法：不被太多东西框住，随心而动，走到哪里就在哪里扎根一阵子，然后再走。\n\n送走他的那个深夜，你才真正明白，那三年的日常有多重要。不是因为特别，恰恰是因为太普通了——下班开门，他走过来；你躺下，他跳上来；他嗷嗷嗷，你低着头走。\n\n这些加在一起，是一种联结，是一种证明——<em>证明你在一个地方，真实地活过，被一个生命记得，也记得一个生命。</em>\n\n大咪四岁了。愿我们皆为心之所向，千千万万遍。',en:"You sometimes wonder: do you resemble Dami, or does Dami resemble you, or are you perhaps the same thing.\n\nHe does not mind the size of the space, does not mind how much company there is, does not mind whether it is a rental in a distant city or the house he grew up in. He simply lives fully in the present, in wherever he is, in every day he has.\n\nAnd you — these years, you have been looking for a way to live: not boxed in by too many things, moving when the heart moves, putting down roots wherever you land for a while, then moving again.\n\nThat late night when you sent him away, you finally understood how much those three ordinary years meant. Not because they were special. Precisely because they were so ordinary — door opening after work, him walking over; you lying down, him jumping up; him howling, you walking with your head down.\n\nAll of it together is a connection, a kind of proof — <em>proof that in one place, you lived truly, were remembered by a life, and remembered one in return.</em>\n\nDami is four. May we each go wherever the heart points, a thousand times over."},insight:{zh:'有时候，你以为在照顾一个生命，回头看，才发现那个生命也在照顾你。不是用语言，不是用道理，只是用它每天活着的样子，提醒你：就是这样，就在这里，就是现在。',en:"Sometimes you think you are the one doing the caring. Looking back, you find the life was caring for you too. Not with words or reasons. Just by the way it lived each day, reminding you: just like this, just here, just now."}}
    }

/* ── 匹配逻辑 ── */
function matchGames(input){
  var text=input.toLowerCase();
  var scores=GAMES.map(function(g,i){
    var sc=0;
    g.keywords.forEach(function(k){if(text.indexOf(k)>=0)sc+=2;});
    if(userProfile.interests){
      if(userProfile.interests.indexOf('travel')>=0&&i===0)sc++;
      if(userProfile.interests.indexOf('family')>=0&&i===1)sc++;
      if(userProfile.interests.indexOf('sports')>=0&&i===2)sc++;
    }
    return{idx:i,score:sc};
  });
  scores.sort(function(a,b){return b.score-a.score;});
  if(scores[0].score===0){
    var lw=['家','妈','爸','父母','爱','关系','说不出','亲情'];
    var ew=['用力','努力','焦虑','失控','工作压力','越努力','效率','节奏'];
    var ls=lw.filter(function(w){return text.indexOf(w)>=0;}).length;
    var es=ew.filter(function(w){return text.indexOf(w)>=0;}).length;
    if(es>ls&&es>0)return[2,0,1];
    return ls>0?[1,0,2]:[0,1,2];
  }
  return scores.map(function(s){return s.idx;});
}

function doMatch(){
  var val=document.getElementById('confuse-input').value.trim();

  show('page-manifesto');
  renderManifesto();
}

function goToProfile(){pIdx=0;pAnswers={};show('page-profile');renderProfile();}

function goToMatch(){
  show('page-match');
  setTimeout(function(){
    var order=matchGames(window._input||'');
    selIdx=order[0];
    renderMatchPage(order);
  },1600);
}

function renderMatchPage(order){
  var zh=LANG==='zh';
  var g=GAMES[order[0]];
  document.getElementById('featured-img').src=IMGS[g.cover];
  document.getElementById('featured-tag').textContent=T(g.tag);
  document.getElementById('featured-title').textContent=T(g.title);
  document.getElementById('featured-desc').textContent=T(g.desc);
  document.getElementById('featured-meta').innerHTML=g.meta.map(function(m){return '<span>'+T(m)+'</span>';}).join('<span> · </span>');
  if(order.length>1){
    var html='';
    for(var i=1;i<order.length;i++){
      var og=GAMES[order[i]];
      html+='<div class="match-mini" data-idx="'+order[i]+'" onclick="switchGame(+this.dataset.idx)">'
        +'<img class="match-mini-img" src="'+IMGS[og.cover]+'" alt="">'
        +'<div><div class="match-mini-tag">'+T(og.tag)+'</div><div class="match-mini-title">'+T(og.title)+'</div></div></div>';
    }
    document.getElementById('other-cards').innerHTML=html;
    document.getElementById('match-all').style.display='block';
  }
}

function switchGame(idx){
  selIdx=idx;
  var g=GAMES[idx];
  document.getElementById('featured-img').src=IMGS[g.cover];
  document.getElementById('featured-tag').textContent=T(g.tag);
  document.getElementById('featured-title').textContent=T(g.title);
  document.getElementById('featured-desc').textContent=T(g.desc);
}

function show(id){
  ['page-home','page-manifesto','page-profile','page-match','page-game'].forEach(function(p){
    document.getElementById(p).style.display='none';
  });
  var t=document.getElementById(id);
  t.style.display=(id==='page-game')?'block':'flex';
  window.scrollTo({top:0,behavior:'smooth'});
}

function goHome(){
  closeMatchBox();closeExploreBox();
  show('page-home');
  renderCatGrid();updateCounters();
}

function startGame(){
  curGame=GAMES[selIdx];loopCount=0;curScene='start';

}

/* ── 渲染游戏 ── */
function render(){
  if(!curGame||!curGame.scenes[curScene])return;
  var s=curGame.scenes[curScene];
  var stage=document.getElementById('stage');
  var lmap={full:{zh:'\u4f60\u8d70\u5230\u4e86\u8fd9\u91cc',en:'You made it here'},reflective:{zh:'\u8fd9\u4e00\u6b21\u7684\u6536\u83b7',en:'What you took away'},gentle:{zh:'\u5173\u4e8e\u8fd9\u4e00\u6b21',en:'About this time'}};
  if(s.isEnd){
    var loopTxt=loopCount>0?(LANG==='zh'?'\u547d\u8fd0\u95ee\u4e86\u4f60 '+loopCount+' \u6b21':'Fate asked '+loopCount+' time'+(loopCount>1?'s':'')):'' ;
    stage.innerHTML=
      '<div class="ending-frame">'
      +'<img class="scene-img" src="'+IMGS[s.img]+'" alt="">'
      +'<div class="scene-overlay"></div>'
      +'<div class="top-bar"><div class="prog-wrap"><div class="prog-fill" style="width:'+s.prog+'%"></div></div>'
      +(loopTxt?'<span class="loop-badge">'+loopTxt+'</span>':'')
      +'</div>'
      +'<div class="ending-content"><div class="ending-label">'+T(lmap[s.endType])+'</div><div class="ending-title">'+T(s.title)+'</div></div>'
      +'</div>'
      +'<div class="ending-body">'
      +'<div class="ending-story">'+T(s.story).replace(/\n/g,'<br>')+'</div>'
      +'<div class="ending-divider"></div>'
      +'<div class="ending-insight">'+T(s.insight)+'</div>'
      +buildConsult()+buildComments()+buildEmail()+buildSubmit()
      +'<div class="btn-row">'
      +'<button class="btn-p" onclick="restartGame()">'+(LANG==='zh'?'\u91cd\u65b0\u8d70\u4e00\u9057':'Play again')+'</button>'
      +'<button class="btn-g" onclick="goHome()">'+(LANG==='zh'?'\u56de\u5230\u5165\u53e3':'Back to home')+'</button>'
      +'</div></div>';
    return;
  }
  var nudge=s.nudge?'<div class="nudge">\u21bb '+T(s.nudge)+'</div>':'';
  var pause=s.pause?'<div class="pause-line">'+T(s.pause)+'</div>':'';
  var choices='';
  if(s.choices&&s.choices.length){
    choices=s.choices.map(function(ch){
      var lbl=ch.l?'<div class="choice-label">'+(LANG==='zh'?'\u9009\u9879 ':'Option ')+ch.l+'</div>':'';
      return '<button class="choice'+(ch.c?' comfort':'')+'" data-n="'+ch.n+'" data-c="'+(ch.c?'1':'0')+'" onclick="pick(this.dataset.n,this.dataset.c===\'1\')">'
        +lbl+T(ch.t)+'</button>';
    }).join('');
  }
  var lb=loopCount>0?'<span class="loop-badge">'+(LANG==='zh'?'\u547d\u8fd0\u7b2c '+loopCount+' \u6b21\u95ee\u4f60':'Fate asks again ('+loopCount+')')+'</span>':'';
  stage.innerHTML='<div class="scene-frame">'
    +'<img class="scene-img" src="'+IMGS[s.img]+'" alt="">'
    +'<div class="scene-overlay"></div>'
    +'<div class="top-bar"><div class="prog-wrap"><div class="prog-fill" style="width:'+s.prog+'%"></div></div>'+lb+'</div>'
    +'<div class="scene-content"><div class="scene-tag">'+T(s.tag)+'</div>'
    +'<div class="scene-body">'+T(s.body).replace(/\n/g,'<br>')+'</div>'
    +nudge+pause+'</div></div>'
    +'<div class="choices">'+choices+'</div>';
}

function pick(next,isComfort){if(isComfort)loopCount++;curScene=next;render();window.scrollTo({top:0,behavior:'smooth'});}
function restartGame(){loopCount=0;curScene='start';render();window.scrollTo({top:0,behavior:'smooth'});}

  var email=val.value.trim();
  var gid=curGame?curGame.id:'_';
  // 发到 mailto（简单方案）或未来接后端
  var zh=LANG==='zh';
  var subj=encodeURIComponent((zh?'订阅人生模拟游戏新故事':'New story subscription')+' — '+email);
  // 打开邮件发给作者（临时方案，后续可换 API）
  window.open('mailto:guchao815@gmail.com?subject='+subj+'&body='+encodeURIComponent(email),'_blank');
  _emailDone[gid]=true;
  // 重新渲染结尾
  var area=document.querySelector('.email-area');
  if(area){
    area.innerHTML='<div class="email-done">✓ '+(zh?'已记录，有新故事时会通知你':'Saved. We will let you know when there is a new story.')+'</div>';
  }
}

      :"Every game here started as a real experience. If you've walked through something similar and want to write it down — it might become the next story that walks someone else through.")

    +'<a class="consult-btn" href="mailto:guchao815@gmail.com?subject='+subj+'" style="background:var(--terracotta)">'
    +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>'
    +(zh?'\u7ed9 Mark \u5199\u4fe1\uff0c\u5206\u4eab\u4f60\u7684\u6545\u4e8b \u2192':'Write to Mark and share your story \u2192')
    +'</a></div>';
}

    :"Spent many years in big tech working across strategy and business, then chose to leave \u2014 now based in South East Asia. Tennis, slow travel, meditation, writing. I believe paying close attention to life is its own kind of art.<br><br>I also have a cat. His grasp of living in the present is probably deeper than mine.";
  var tags=zh?['\u7f51\u7403','\u65c5\u884c','\u5199\u4f5c','\u5192\u60f3','\u79d1\u6280','\u732b']:['Tennis','Travel','Writing','Meditation','Tech','Cat'];
  document.getElementById('ac-tags').innerHTML=tags.map(function(t){return '<span class="ac-tag">'+t+'</span>';}).join('');
  var links=zh?[{l:'\u4e2a\u4eba\u4e3b\u9875',h:'index.html'},{l:'\u53d1\u90ae\u4ef6',h:'mailto:guchao815@gmail.com'}]:[{l:'Personal site',h:'index.html'},{l:'Send email',h:'mailto:guchao815@gmail.com'}];
  document.getElementById('ac-links').innerHTML=links.map(function(l){return '<a class="ac-link" href="'+l.h+'">'+l.l+'</a>';}).join('');

function closeAuthor(e){if(e.target===document.getElementById('author-overlay'))document.getElementById('author-overlay').classList.remove('open');}
function closeAuthorDirect(){document.getElementById('author-overlay').classList.remove('open');}

/* ── 计数器 ── */
function initCounters(){
  try{var v=parseInt(localStorage.getItem('ls_v')||'0')+1;localStorage.setItem('ls_v',v);}catch(e){}
  updateCounters();
}
function incrementPlays(){try{var p=parseInt(localStorage.getItem('ls_p')||'0')+1;localStorage.setItem('ls_p',p);}catch(e){}}
function updateCounters(){
  var zh=LANG==='zh';
  var v=0,p=0;
  try{v=parseInt(localStorage.getItem('ls_v')||'0');}catch(e){v=128;}
  try{p=parseInt(localStorage.getItem('ls_p')||'0');}catch(e){p=47;}
  function fmt(n){return n>999?(n/1000).toFixed(1)+'k':n;}
  var vEl=document.getElementById('cnt-v');var pEl=document.getElementById('cnt-p');
  if(vEl)vEl.textContent=fmt(v);if(pEl)pEl.textContent=fmt(p);
  var vl=document.getElementById('cnt-vl');var pl=document.getElementById('cnt-pl');var al=document.getElementById('cnt-al');
  if(vl)vl.textContent=zh?'\u4f4d\u8bbf\u95ee\u8005':'visitors';
  if(pl)pl.textContent=zh?'\u6b21\u6e38\u620f\u4f53\u9a8c':'plays';
  if(al)al.textContent=zh?'\u4f4d\u521b\u4f5c\u8005':'contributors';
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('page-home').style.display='flex';
  renderText();renderCatGrid();initCounters();
});
</script>
