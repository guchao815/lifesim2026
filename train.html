<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>观景号列车 · 好好生活星球</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: #faf8f4;
  font-family: 'Noto Sans SC', sans-serif;
  color: #3a3228;
  overflow-x: hidden;
}
.lang-switch {
  position: fixed; top: 1.25rem; right: 1.25rem; z-index: 999;
  display: flex; border: 1px solid #e0d8cc; border-radius: 20px; overflow: hidden;
  background: #faf8f4;
}
.lang-btn {
  background: transparent; border: none;
  padding: 0.32rem 0.85rem; font-size: 11px; cursor: pointer;
  font-family: inherit; color: #a09080; letter-spacing: 0.06em;
  transition: all 0.18s;
}
.lang-btn.active { background: #3a3228; color: #faf8f4; }

.header {
  padding: 1.5rem 3rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #ede8e0;
}
.back-link {
  font-size: 12px; color: #8a7a6a;
  text-decoration: none; letter-spacing: 0.1em; transition: color 0.2s;
}
.back-link:hover { color: #3a3228; }
.header-right { text-align: right; }
.header-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px; font-weight: 300; color: #3a3228; letter-spacing: 0.1em;
}
.header-sub { font-size: 10px; color: #b0a090; }

/* HERO */
.hero {
  display: grid; grid-template-columns: 1fr 1fr;
  min-height: 88vh;
}
.hero-left {
  padding: 5rem 4rem 4rem;
  display: flex; flex-direction: column; justify-content: center;
  border-right: 1px solid #ede8e0;
}
.hero-eyebrow {
  font-size: 10px; color: #b0a090;
  letter-spacing: 0.22em; margin-bottom: 2rem;
}
.hero-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(28px, 3.5vw, 44px);
  font-weight: 300; line-height: 1.55;
  color: #2a2218; margin-bottom: 1.5rem;
}
.hero-desc {
  font-size: 14px; color: #7a6a58;
  line-height: 2; font-weight: 300;
  max-width: 360px; margin-bottom: 2.5rem;
}
.hero-scroll {
  font-size: 10px; color: #c0b0a0;
  letter-spacing: 0.16em;
}
.hero-right {
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, #e8f4e8 0%, #c8e8d0 50%, #a8d8c0 100%);
  display: flex; align-items: center; justify-content: center;
}
.hero-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.hero-img-caption {
  position: absolute; bottom: 1.5rem; right: 1.5rem;
  font-size: 10px; color: rgba(255,255,255,0.7);
  letter-spacing: 0.1em; background: rgba(0,0,0,0.2);
  padding: 4px 10px; border-radius: 20px;
}

/* MAP SECTION */
.map-section {
  padding: 5rem 4rem;
  border-bottom: 1px solid #ede8e0;
}
.section-label {
  font-size: 10px; color: #b0a090;
  letter-spacing: 0.2em; margin-bottom: 1rem;
}
.section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px; font-weight: 300; color: #2a2218;
  margin-bottom: 3rem;
}
.world-map { width: 100%; max-width: 800px; height: auto; }

@keyframes glow {
  0%, 100% { opacity: 1; r: 5; }
  50% { opacity: 0.6; r: 7; }
}
.tw-glow { animation: glow 2.5s ease-in-out infinite; }

/* DESTINATIONS */
.dest-section {
  padding: 4rem;
}
.dest-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 20px; margin-top: 2rem;
}
.dest-card {
  border-radius: 16px; overflow: hidden;
  text-decoration: none; display: block;
  border: 1px solid #ede8e0;
  transition: transform 0.2s, box-shadow 0.2s;
}
.dest-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(60,50,40,0.08); }
.dest-card.locked { opacity: 0.4; pointer-events: none; }
.dest-img-wrap { position: relative; height: 200px; overflow: hidden; }
.dest-img-wrap::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(40,32,24,0.7) 0%, transparent 60%);
}
.dest-img { width: 100%; height: 100%; object-fit: cover; }
.dest-placeholder { width: 100%; height: 100%; background: #f0ebe3; }
.dest-info { padding: 1.25rem; background: #fff; }
.dest-status { font-size: 10px; color: #8a9a78; letter-spacing: 0.1em; margin-bottom: 4px; }
.dest-card.locked .dest-status { color: #c0b0a0; }
.dest-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px; font-weight: 300; color: #2a2218; margin-bottom: 4px;
}
.dest-tagline { font-size: 12px; color: #9a8a78; }

/* FOOTER */
.footer {
  padding: 2.5rem 4rem;
  border-top: 1px solid #ede8e0;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-text { font-size: 12px; color: #c0b0a0; letter-spacing: 0.08em; }
.footer-link {
  font-size: 12px; color: #8a7a6a;
  text-decoration: none; letter-spacing: 0.06em;
  transition: color 0.2s;
}
.footer-link:hover { color: #3a3228; }

@media (max-width: 768px) {
  .hero { grid-template-columns: 1fr; }
  .hero-left { padding: 3rem 2rem; }
  .hero-right { height: 50vw; }
  .dest-grid { grid-template-columns: 1fr; }
  .map-section, .dest-section { padding: 3rem 2rem; }
  .footer { flex-direction: column; gap: 1rem; text-align: center; }
}
</style>

};
function setLang(lang) {
  LANG = lang;
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  var t = T[lang];
  document.getElementById('back-link').textContent = t.backLink;
  document.getElementById('header-title').textContent = t.headerTitle;
  document.getElementById('header-sub').textContent = t.headerSub;
  document.getElementById('hero-title').innerHTML = t.heroTitle;
  document.getElementById('hero-desc').innerHTML = t.heroDesc;
  document.getElementById('hero-scroll').textContent = t.heroScroll;
  document.getElementById('map-eyebrow').textContent = t.mapEyebrow;
  document.getElementById('map-title').textContent = t.mapTitle;
  document.getElementById('dest-eyebrow').textContent = t.destEyebrow;
  document.getElementById('dest-title').textContent = t.destTitle;
  document.getElementById('tw-status').textContent = t.twStatus;
  document.getElementById('tw-name').textContent = t.twName;
  document.getElementById('tw-tagline').textContent = t.twTagline;
  document.getElementById('ru-status').textContent = t.ruStatus;
  document.getElementById('ru-name').textContent = t.ruName;
  document.getElementById('ru-tagline').textContent = t.ruTagline;
  document.getElementById('id-status').textContent = t.idStatus;
  document.getElementById('id-name').textContent = t.idName;
  document.getElementById('id-tagline').textContent = t.idTagline;
  document.getElementById('footer-text').textContent = t.footer;
  document.getElementById('footer-link').textContent = t.footerLink;
}
</script>
