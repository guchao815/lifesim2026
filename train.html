<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>观景号列车 · 好好生活星球</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: #faf8f4;
  font-family: 'Noto Sans SC', sans-serif;
  color: #3a3228;
  overflow-x: hidden;
}
.lang-switch {
  position: fixed; top: 1.25rem; right: 1.25rem; z-index: 999;
  display: flex; border: 1px solid #e0d8cc; border-radius: 20px; overflow: hidden;
  background: #faf8f4;
}
.lang-btn {
  background: transparent; border: none;
  padding: 0.32rem 0.85rem; font-size: 11px; cursor: pointer;
  font-family: inherit; color: #a09080; letter-spacing: 0.06em;
  transition: all 0.18s;
}
.lang-btn.active { background: #3a3228; color: #faf8f4; }

.header {
  padding: 1.5rem 3rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #ede8e0;
}
.back-link {
  font-size: 12px; color: #8a7a6a;
  text-decoration: none; letter-spacing: 0.1em; transition: color 0.2s;
}
.back-link:hover { color: #3a3228; }
.header-right { text-align: right; }
.header-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px; font-weight: 300; color: #3a3228; letter-spacing: 0.1em;
}
.header-sub { font-size: 10px; color: #b0a090; }

/* HERO */
.hero {
  display: grid; grid-template-columns: 1fr 1fr;
  min-height: 88vh;
}
.hero-left {
  padding: 5rem 4rem 4rem;
  display: flex; flex-direction: column; justify-content: center;
  border-right: 1px solid #ede8e0;
}
.hero-eyebrow {
  font-size: 10px; color: #b0a090;
  letter-spacing: 0.22em; margin-bottom: 2rem;
}
.hero-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(28px, 3.5vw, 44px);
  font-weight: 300; line-height: 1.55;
  color: #2a2218; margin-bottom: 1.5rem;
}
.hero-desc {
  font-size: 14px; color: #7a6a58;
  line-height: 2; font-weight: 300;
  max-width: 360px; margin-bottom: 2.5rem;
}
.hero-scroll {
  font-size: 10px; color: #c0b0a0;
  letter-spacing: 0.16em;
}
.hero-right {
  position: relative; overflow: hidden;
}
.hero-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.hero-img-caption {
  position: absolute; bottom: 1.5rem; right: 1.5rem;
  font-size: 10px; color: rgba(255,255,255,0.7);
  letter-spacing: 0.1em; background: rgba(0,0,0,0.2);
  padding: 4px 10px; border-radius: 20px;
}

/* MAP SECTION */
.map-section {
  padding: 5rem 4rem;
  border-bottom: 1px solid #ede8e0;
}
.section-label {
  font-size: 10px; color: #b0a090;
  letter-spacing: 0.2em; margin-bottom: 1rem;
}
.section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px; font-weight: 300; color: #2a2218;
  margin-bottom: 3rem;
}
.world-map { width: 100%; max-width: 800px; height: auto; }

@keyframes glow {
  0%, 100% { opacity: 1; r: 5; }
  50% { opacity: 0.6; r: 7; }
}
.tw-glow { animation: glow 2.5s ease-in-out infinite; }

/* DESTINATIONS */
.dest-section {
  padding: 4rem;
}
.dest-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 20px; margin-top: 2rem;
}
.dest-card {
  border-radius: 16px; overflow: hidden;
  text-decoration: none; display: block;
  border: 1px solid #ede8e0;
  transition: transform 0.2s, box-shadow 0.2s;
}
.dest-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(60,50,40,0.08); }
.dest-card.locked { opacity: 0.4; pointer-events: none; }
.dest-img-wrap { position: relative; height: 200px; overflow: hidden; }
.dest-img-wrap::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(40,32,24,0.7) 0%, transparent 60%);
}
.dest-img { width: 100%; height: 100%; object-fit: cover; }
.dest-placeholder { width: 100%; height: 100%; background: #f0ebe3; }
.dest-info { padding: 1.25rem; background: #fff; }
.dest-status { font-size: 10px; color: #8a9a78; letter-spacing: 0.1em; margin-bottom: 4px; }
.dest-card.locked .dest-status { color: #c0b0a0; }
.dest-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px; font-weight: 300; color: #2a2218; margin-bottom: 4px;
}
.dest-tagline { font-size: 12px; color: #9a8a78; }

/* FOOTER */
.footer {
  padding: 2.5rem 4rem;
  border-top: 1px solid #ede8e0;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-text { font-size: 12px; color: #c0b0a0; letter-spacing: 0.08em; }
.footer-link {
  font-size: 12px; color: #8a7a6a;
  text-decoration: none; letter-spacing: 0.06em;
  transition: color 0.2s;
}
.footer-link:hover { color: #3a3228; }

@media (max-width: 768px) {
  .hero { grid-template-columns: 1fr; }
  .hero-left { padding: 3rem 2rem; }
  .hero-right { height: 50vw; }
  .dest-grid { grid-template-columns: 1fr; }
  .map-section, .dest-section { padding: 3rem 2rem; }
  .footer { flex-direction: column; gap: 1rem; text-align: center; }
}
</style>
</head>
<body>

<div class="lang-switch">
  <button class="lang-btn active" id="btn-zh" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
</div>

<header class="header">
  <a href="index.html" class="back-link" id="back-link">← 回到星球</a>
  <div class="header-right">
    <p class="header-title" id="header-title">观景号列车</p>
    <p class="header-sub" id="header-sub">⑥ 线 · 好好生活星球</p>
  </div>
</header>

<section class="hero">
  <div class="hero-left">
    <p class="hero-eyebrow">SCENIC TRAIN · LINE 6</p>
    <h1 class="hero-title" id="hero-title">坐上列车<br>慢慢进入<br>一个真实的地方</h1>
    <p class="hero-desc" id="hero-desc">不是攻略，不是 vlog。<br>是一个地方的气息、颜色，<br>和它留在人身上的东西。</p>
    <p class="hero-scroll" id="hero-scroll">↓ 选择目的地</p>
  </div>
  <div class="hero-right">
    <img class="hero-img" src="tw-qingshui-blue.jpg" alt="清水断崖"/>
    <p class="hero-img-caption">清水断崖 · 台湾花莲</p>
  </div>
</section>

<section class="map-section">
  <p class="section-label" id="map-eyebrow">DESTINATIONS</p>
  <h2 class="section-title" id="map-title">目的地 · 台湾目前开放</h2>

  <svg class="world-map" viewBox="0 0 960 460" xmlns="http://www.w3.org/2000/svg">
    <rect width="960" height="460" fill="#f5f0e8" rx="16"/>

    <!-- 北美 -->
    <path fill="#e8e0d4" stroke="#d8d0c4" stroke-width="0.8"
      d="M 85 72 Q 118 52 158 60 Q 188 56 208 76 Q 230 82 234 106 Q 240 130 226 152 Q 210 172 194 182 Q 176 196 160 212 Q 148 228 146 246 Q 140 252 132 244 Q 118 228 106 210 Q 90 188 80 164 Q 70 142 72 116 Q 74 90 85 72 Z"/>
    <path fill="#e8e0d4" stroke="#d8d0c4" stroke-width="0.8"
      d="M 143 248 Q 150 258 153 272 Q 156 284 150 290 Q 144 296 138 290 Q 132 280 132 266 Q 131 254 137 250 Z"/>
    <path fill="#e8e0d4" stroke="#d8d0c4" stroke-width="0.8"
      d="M 146 296 Q 168 286 190 292 Q 213 298 226 316 Q 238 336 236 360 Q 232 384 218 406 Q 202 424 184 432 Q 166 438 152 426 Q 138 412 132 392 Q 124 370 124 346 Q 124 322 132 306 Q 138 299 146 296 Z"/>
    <!-- 유럽 -->
    <path fill="#e8e0d4" stroke="#d8d0c4" stroke-width="0.8"
      d="M 422 56 Q 446 48 470 54 Q 490 52 506 64 Q 520 58 534 66 Q 546 74 542 90 Q 534 103 520 108 Q 506 114 492 110 Q 478 116 462 113 Q 448 116 436 110 Q 424 102 418 88 Q 414 72 422 56 Z"/>
    <!-- 아프리카 -->
    <path fill="#e8e0d4" stroke="#d8d0c4" stroke-width="0.8"
      d="M 440 116 Q 465 106 490 110 Q 514 114 527 130 Q 541 146 543 168 Q 545 192 537 214 Q 526 234 512 250 Q 496 266 478 272 Q 460 276 444 268 Q 426 258 416 240 Q 404 220 401 196 Q 398 172 403 150 Q 410 130 426 120 Q 432 116 440 116 Z"/>
    <!-- 아시아 -->
    <path fill="#e8e0d4" stroke="#d8d0c4" stroke-width="0.8"
      d="M 538 48 Q 570 38 608 42 Q 646 44 680 54 Q 716 62 743 76 Q 770 90 776 110 Q 780 130 768 150 Q 753 168 733 178 Q 710 188 686 190 Q 660 192 636 186 Q 610 178 588 168 Q 564 156 548 140 Q 532 124 528 103 Q 524 76 538 48 Z"/>
    <!-- 인도 -->
    <path fill="#e8e0d4" stroke="#d8d0c4" stroke-width="0.8"
      d="M 596 128 Q 614 122 630 128 Q 645 134 649 150 Q 651 168 641 184 Q 629 198 612 202 Q 596 204 584 194 Q 572 182 570 164 Q 568 146 578 134 Q 586 128 596 128 Z"/>
    <!-- 동남아 -->
    <path fill="#e8e0d4" stroke="#d8d0c4" stroke-width="0.8"
      d="M 670 186 Q 692 180 708 188 Q 724 198 726 216 Q 722 230 708 234 Q 692 238 678 230 Q 663 220 662 206 Q 660 194 670 186 Z"/>
    <!-- 인도네시아 -->
    <path fill="#e8e0d4" stroke="#d8d0c4" stroke-width="0.8"
      d="M 685 238 Q 712 230 737 236 Q 760 242 762 256 Q 759 268 741 272 Q 721 274 703 266 Q 685 258 683 246 Z"/>
    <!-- 일본 -->
    <path fill="#e8e0d4" stroke="#d8d0c4" stroke-width="0.8"
      d="M 776 94 Q 784 88 793 92 Q 800 98 797 108 Q 792 116 784 113 Q 776 108 776 94 Z"/>
    <!-- 호주 -->
    <path fill="#e8e0d4" stroke="#d8d0c4" stroke-width="0.8"
      d="M 760 292 Q 790 280 823 284 Q 856 286 876 306 Q 894 324 893 348 Q 890 372 873 388 Q 854 402 830 404 Q 806 404 786 390 Q 766 375 756 352 Q 746 330 750 308 Q 754 296 760 292 Z"/>

    <!-- 경위선 -->
    <line x1="0" y1="230" x2="960" y2="230" stroke="#e0d8ce" stroke-width="0.5" stroke-dasharray="6,12"/>
    <line x1="480" y1="0" x2="480" y2="460" stroke="#e0d8ce" stroke-width="0.5" stroke-dasharray="6,12"/>

    <!-- 台湾 하이라이트 -->
    <ellipse cx="760" cy="172" rx="8" ry="11"
      fill="#a8c898" stroke="#6a9a58" stroke-width="1.5"
      style="cursor:pointer;"
      onclick="window.location.href='taiwan.html'"/>
    <circle class="tw-glow" cx="760" cy="172" r="5" fill="#5a8a48" opacity="0.85"
      style="cursor:pointer;" onclick="window.location.href='taiwan.html'"/>

    <text x="774" y="169" font-size="9" fill="#5a7a48" font-family="sans-serif" font-weight="500">台湾</text>
    <text x="774" y="180" font-size="7.5" fill="#8aaa78" font-family="sans-serif">Taiwan ↗</text>

    <text x="24" y="444" font-size="8" fill="#c8c0b4" font-family="sans-serif" letter-spacing="0.12em">MORE DESTINATIONS OPENING SOON</text>
  </svg>
</section>

<section class="dest-section">
  <p class="section-label" id="dest-eyebrow">NOW BOARDING</p>
  <h2 class="section-title" id="dest-title">目前开放的线路</h2>
  <div class="dest-grid">

    <a class="dest-card" href="taiwan.html">
      <div class="dest-img-wrap">
        <img class="dest-img" src="tw-qingshui-blue.jpg" alt="台湾"/>
      </div>
      <div class="dest-info">
        <p class="dest-status" id="tw-status">● 已开放</p>
        <p class="dest-name" id="tw-name">台湾</p>
        <p class="dest-tagline" id="tw-tagline">旧与新 · 绿与蓝 · 再上阳明</p>
      </div>
    </a>

    <div class="dest-card locked">
      <div class="dest-img-wrap"><div class="dest-placeholder"></div></div>
      <div class="dest-info">
        <p class="dest-status" id="jp-status">○ 即将开放</p>
        <p class="dest-name" id="jp-name">日本</p>
        <p class="dest-tagline" id="jp-tagline">敬请期待</p>
      </div>
    </div>

    <div class="dest-card locked">
      <div class="dest-img-wrap"><div class="dest-placeholder"></div></div>
      <div class="dest-info">
        <p class="dest-status" id="id-status">○ 即将开放</p>
        <p class="dest-name" id="id-name">印度尼西亚</p>
        <p class="dest-tagline" id="id-tagline">敬请期待</p>
      </div>
    </div>

  </div>
</section>

<footer class="footer">
  <p class="footer-text" id="footer-text">慢慢进入一个真实的地方</p>
  <a href="index.html" class="footer-link" id="footer-link">← 回到好好生活星球</a>
</footer>

<script>
var LANG = 'zh';
var T = {
  zh: {
    backLink: '← 回到星球', headerTitle: '观景号列车', headerSub: '⑥ 线 · 好好生活星球',
    heroTitle: '坐上列车<br>慢慢进入<br>一个真实的地方',
    heroDesc: '不是攻略，不是 vlog。<br>是一个地方的气息、颜色，<br>和它留在人身上的东西。',
    heroScroll: '↓ 选择目的地',
    mapEyebrow: 'DESTINATIONS', mapTitle: '目的地 · 台湾目前开放',
    destEyebrow: 'NOW BOARDING', destTitle: '目前开放的线路',
    twStatus: '● 已开放', twName: '台湾', twTagline: '旧与新 · 绿与蓝 · 再上阳明',
    jpStatus: '○ 即将开放', jpName: '日本', jpTagline: '敬请期待',
    idStatus: '○ 即将开放', idName: '印度尼西亚', idTagline: '敬请期待',
    footer: '慢慢进入一个真实的地方', footerLink: '← 回到好好生活星球'
  },
  en: {
    backLink: '← Back to Planet', headerTitle: 'Scenic Train', headerSub: 'Line 6 · Good Life Planet',
    heroTitle: 'Board the train<br>Slowly enter<br>a real place',
    heroDesc: "Not a travel guide, not a vlog.<br>The atmosphere, the colors,<br>and what a place leaves in you.",
    heroScroll: '↓ Choose a destination',
    mapEyebrow: 'DESTINATIONS', mapTitle: 'Destinations · Taiwan now open',
    destEyebrow: 'NOW BOARDING', destTitle: 'Routes now available',
    twStatus: '● Open', twName: 'Taiwan', twTagline: 'Old & New · Green & Blue · Back to Yangming',
    jpStatus: '○ Coming soon', jpName: 'Japan', jpTagline: 'Coming soon',
    idStatus: '○ Coming soon', idName: 'Indonesia', idTagline: 'Coming soon',
    footer: 'Slowly enter a real place', footerLink: '← Back to Good Life Planet'
  }
};
function setLang(lang) {
  LANG = lang;
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  var t = T[lang];
  document.getElementById('back-link').textContent = t.backLink;
  document.getElementById('header-title').textContent = t.headerTitle;
  document.getElementById('header-sub').textContent = t.headerSub;
  document.getElementById('hero-title').innerHTML = t.heroTitle;
  document.getElementById('hero-desc').innerHTML = t.heroDesc;
  document.getElementById('hero-scroll').textContent = t.heroScroll;
  document.getElementById('map-eyebrow').textContent = t.mapEyebrow;
  document.getElementById('map-title').textContent = t.mapTitle;
  document.getElementById('dest-eyebrow').textContent = t.destEyebrow;
  document.getElementById('dest-title').textContent = t.destTitle;
  document.getElementById('tw-status').textContent = t.twStatus;
  document.getElementById('tw-name').textContent = t.twName;
  document.getElementById('tw-tagline').textContent = t.twTagline;
  document.getElementById('jp-status').textContent = t.jpStatus;
  document.getElementById('jp-name').textContent = t.jpName;
  document.getElementById('jp-tagline').textContent = t.jpTagline;
  document.getElementById('id-status').textContent = t.idStatus;
  document.getElementById('id-name').textContent = t.idName;
  document.getElementById('id-tagline').textContent = t.idTagline;
  document.getElementById('footer-text').textContent = t.footer;
  document.getElementById('footer-link').textContent = t.footerLink;
}
</script>
</body>
</html>
