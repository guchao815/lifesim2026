  <button class="sc-btn" id="btn0">
    <div><p class="sc-num" id="sc-num0">STATION 01</p><p class="sc-name" id="sc-name0">抵达</p><p class="sc-tagline" id="sc-tag0">关于十年的等待，和一个约定</p></div>

<script>
var STATIONS = [
  {
    label: 'STATION 01 · 抵达',
    title: '终于踏上这片土地',
    blocks: [
      { type: 'texts', lines: [
        '"甜蜜蜜，你笑得多甜蜜，好像花儿开在春风里，开在春风里。"',
        '收录机里传出邓丽君的歌声，风扇缓慢转动，桌上是一盘刚切开的西瓜——那几乎是我对90年代夏天最清晰的记忆。',
        '受母亲影响，我的童年被这些旋律反复填满。很多年后，我早已记不清语文课本里的古诗词，但这些歌词，却总能在某个瞬间，被旋律轻轻唤醒。',
      ]},
      { type: 'texts', lines: [
        '小学和初中的课文读过许多，真正留下印记的却不多。奇怪的是，我始终记得《日月潭》和《阿里山》。或许是因为它们带着一种朦胧的神秘感——那是一个我们只能通过文字去想象的地方。老师未曾去过，我们也不曾真正设想，有一天会亲眼见到。',
      ]},
      { type: 'question',
        text: '当提到台湾，你脑海里第一个浮现的是什么？',
        opts: [
          { s: '邓丽君的歌声，或者某首旋律', r: '旋律是时间的暗道。它不需要理由，就能把你带回去。台湾对很多人来说，最初就是一种声音——那些从收录机或者父母口中流出来的旋律，在你还没意识到的时候，就已经在心里占了一个地方。' },
          { s: '课本里的日月潭和阿里山', r: '那些课文留下来的，是一种朦胧的神秘感。台湾在那时候，是一个只能用文字去想象的地方——老师未曾去过，我们也不曾真正设想，有一天会亲眼见到。有些地方，就是这样，先以文字的形式住进你心里的。' },
          { s: '周杰伦、五月天，或者某部台偶剧', r: '那些年的台湾流行文化，跨过海峡，落在无数人的青春里。它不是新闻，不是地理，是一种陪伴过你某段时光的声音和故事。那也是一种真实的连接。' },
          { s: '一个认识的台湾人', r: '一个具体的人，往往比任何风景都更能让一个地方变得真实。你认识的那个台湾人，是你和这片土地之间最私人的那条线。' },
          { s: '其实，我对台湾没有太具体的记忆', r: '没有也很正常。有些地方，在你到达之前，它在你的生命里就是一片空白。空白未必是缺失——也许它只是在等待一个具体的时刻，来填上自己的颜色。' },
        ]
      },
      { type: 'texts', lines: [
        '于是很长一段时间里，台湾对我来说，只存在于纸面与想象之中。它没有具体的人，也没有真实的触感。直到大学。',
        '那年冬天，我借着一次冬令营的机会，去了首尔。参加项目的学生来自大陆、台湾、印尼和澳洲。文化和习惯的差异，让大家在分组时很自然地各自聚拢。但有一个台湾青年，偏偏没有这么做。',
        '他选择加入一群大陆学生的队伍，也因此，我认识了第一个台湾朋友。我们因为都喜欢网球，很快熟络起来。临别时约定，将来在北京或上海一起看比赛。一年多后，这个约定真的被兑现了。2017年，我去北京工作，我们一起看了两天中网。那时说好，下一次，该轮到我去台湾找他。',
        '那几年，去台湾自由行还算顺畅，我甚至已经办好了相关证件。但事情就那样被一再拖延，没有明确的原因，只是没有成行。',
      ]},
      { type: 'question',
        text: '你有没有一个一直想去、却一再被推迟的地方？',
        opts: [
          { s: '有，而且还没去', r: '那个地方还在等你。有时候，推迟本身也是一种积累——等你真正到达的那天，也许会发现，时机刚刚好。' },
          { s: '有，但最终去了', r: '去了之后，是什么感觉？有时候等待会让一个地方变得更重，有时候，抵达反而比想象中更轻——但两种都是真实的。' },
          { s: '暂时还没有这样的地方', r: '也许那个地方还没出现。有些向往，是在你遇见它的那一刻才开始的。' },
        ]
      },
      { type: 'texts', lines: [
        '再后来，一切都变了。2019年之后，叠加疫情与两岸关系，这个原本简单的计划，变得越来越遥远。那个念头，也慢慢被放进了一个落灰的角落。',
        '直到我出国工作之后，有一天，在一个vlog里偶然看到，长期居住海外的人，通过某种特殊路径申请到了入台证。那一刻，就像一簇快要熄灭的火，被轻轻吹了一下，又重新亮了起来。',
        '接下来的过程，比想象中漫长得多。前后两个月，补交了四次材料。每一次反馈，都带着一些说不清道不明的要求。原定的出行时间一再临近，我几乎已经做好了最坏打算——留在雅加达，安静地过一个开斋节假期，每天照常去打网球。',
        '直到出发前一周，入台证终于批下来。我和朋友开玩笑说，这趟申请过程，简直像是唐僧取经的"九九八十一难"。但回头看，也正是这些看似无厘头的阻碍，让这次出发多了一点重量。拿到入台证后，我几乎是立刻买了机票。对于一个习惯提前规划的人来说，这大概是我做过最仓促的一次决定，却也是最确定的一次。',
      ]},
      { type: 'quote', text: '"高山青，涧水蓝。\n阿里山的姑娘美如水呀，\n阿里山的少年壮如山。"' },
      { type: 'texts', lines: [
        '这些旋律像是从很远的地方回响而来，带着某种跨越时间的熟悉感。很多年前，它们只是声音。后来，是想象。再后来，是一个被不断推迟的约定。而现在，它终于开始变成现实。',
        '十年的时间，说长不长，说短也不短。有些地方，会在你尚未抵达之前，就已经在你的生命里存在很久。有些路，也许并不是走过去的。只是某一天，你刚好走到了它出现的位置。',
      ]},
      { type: 'quote', text: '我坐在飞往宝岛的航班上，\n忽然意识到——\n我真正想见的，或许从来不只是风景。' },
    ]
  },
  {
    label: 'STATION 02 · 旧与新',
    title: '台北慢生活',
    blocks: [
      { type: 'texts', lines: [
        '降落桃园机场已是晚上九点多。原以为出关会花上不少时间，没想到连同入境与取行李，仅半小时出头。走廊里是偏米黄的色调，不知是岁月沉淀，还是夜色映衬下多了一层柔和。',
        '朋友在出口处等我。时隔八年多再次见到，一种说不出的喜悦慢慢散开，长途奔波的倦意也随之松了下来。',
        '从机场搭乘桃捷进城，再转乘捷运到顶溪。那时已是深夜十一点，路上机车稀少，四周显得格外安静。夜色与路灯自上投下，让人得以慢慢看清这座城市。',
      ]},
      { type: 'texts', lines: [
        '第一眼的感觉，是建筑带着明显的岁月感。道路两旁大多已有四五十年的年纪。街道一侧是连贯的廊道，雨天可以一路走下去不被打断。抬头看，是二楼向外伸出的阳台。后来才知道，这类建筑有个专有名词，叫"骑楼"。',
      ]},
      { type: 'texts', lines: [
        '这些建筑的外立面虽略显老旧，却并不沉闷。尤其在社区街巷，阳台上的绿植常常探出头来，有的郁郁葱葱，有的花团锦簇，给空间添了不少生气。道路始终干净，看不到随意丢弃的垃圾或烟头。',
      ]},
      { type: 'texts', lines: [
        '每日清晨，起床出门吃早餐。我很喜欢老社区的这种氛围，不需要特意寻找，走出门不远，就能看到几家早餐店已经开始营业。窗口前排着外带的人群，店里也熙熙攘攘地坐满了人。',
        '和朋友找了个位置坐下，我点了一碗豆浆和一个中式汉堡。厨房里蒸汽缓慢上升，铁板上不时发出细碎的声响。店员动作利落而稳定，顾客来来往往，除去收银，彼此之间并没有太多交流，但气氛却很自然地连在一起。',
        '这样的场景每天重复，却从不显得陈旧。崭新的一天正在被启动——在老街巷、老骑楼、老店的包围里，那种状态，是安静的，却又是饱满的。',
      ]},
      { type: 'question',
        text: '你多久没在老社区附近，吃一顿烟火气的早饭了？',
        opts: [
          { s: '已经不记得了，好像很久没好好吃过早饭', r: '那种热气腾腾的早晨，其实随时可以找回来。不需要去老社区，只需要早起十分钟，坐下来，慢慢吃。' },
          { s: '偶尔会，但不是常态', r: '偶尔就够了。有时候一顿认真的早饭，能让整个人的状态不一样。' },
          { s: '我很享受早饭这件事，从不将就', r: '这是一种很难得的习惯。早饭认真的人，往往对生活也认真。' },
        ]
      },
      { type: 'texts', lines: [
        '这一次来到台北，第一次走进朋友成长的地方。那些在他口中提过无数次的街道、社区与日常，此刻都有了具体的形状。借住在他家，也见到了他的家人。一起吃饭，听他们聊天，被很自然地照顾着，没有刻意的热情，却处处周到。',
        '有一晚，他们问我想去哪里吃。我说其实不太挑，比起专门去找什么好吃的，更想跟着他们去平时会去的地方。于是我们走进街边巷尾一家开了几十年的小店，环境很简单，来往的多是熟客。',
      ]},
      { type: 'quote', text: '坐在那里，有种很清晰的感觉：\n自己并不是以一个游人的视角在这里，\n而是被带进了他们再平常不过的一天，\n仿佛我本来就在这里。' },
      { type: 'texts', lines: [
        '一天下午，我去了趟国立台湾大学。校园很大，也很安静，树很多，走在里面会不自觉地慢下来。学生们三三两两地分散着，有人坐在草地上聊天，有人骑着自行车慢慢经过，也有人独自走着，没有太明显的目的感。那种松弛不是刻意营造出来的，更像是一种默认的状态。',
      ]},
      { type: 'question',
        text: '你怀念校园时光吗？\n你怀念的是什么？',
        opts: [
          { s: '怀念，那种没有太多压力的时光', r: '那种轻盈不是因为年轻，是因为还没有太多东西要守护。有时候，放下一些，那种轻盈会回来的。' },
          { s: '怀念，是那时候的朋友和关系', r: '人和人之间最自然的连接，往往发生在那段时间。那些关系不一定还在，但它们塑造了现在的你。' },
          { s: '怀念，是那时候对未来还有很多想象', r: '那些想象没有消失，只是换了形状。你现在做的事，也许就是当年某个念头的延续。' },
          { s: '其实不太怀念，现在也挺好', r: '能这么说，说明现在的生活有它自己的重量和意义。这比怀念要难得。' },
        ]

function showSelect() {
  document.getElementById('select-page').style.display = 'block';
  document.getElementById('story-page').style.display = 'none';
  document.getElementById('hdr-back').href = 'train.html';
  window.scrollTo(0, 0);
}

function goStory(idx) {
  document.getElementById('select-page').style.display = 'none';
  document.getElementById('story-page').style.display = 'block';
  document.getElementById('hdr-back').href = '#';
  document.getElementById('hdr-back').onclick = function(e){ e.preventDefault(); showSelect(); };
  window.scrollTo(0, 0);
  renderStory(idx);
}

function renderStory(idx) {
  var wrap = document.getElementById('story-content');
  wrap.innerHTML = '';
  var st = STATIONS[idx];

  var lbl = document.createElement('p');
  lbl.className = 't-station-label';
  lbl.textContent = st.label;
  wrap.appendChild(lbl);

  var ttl = document.createElement('h2');
  ttl.className = 't-title';
  ttl.textContent = st.title;
  wrap.appendChild(ttl);

  setTimeout(function(){ lbl.classList.add('show'); }, 100);
  setTimeout(function(){ ttl.classList.add('show'); }, 400);

  var steps = [];
  st.blocks.forEach(function(block) {
    if (block.type === 'texts') {
      block.lines.forEach(function(line){ steps.push({type:'text', line:line}); });
    } else {
      steps.push(block);
    }
  });
  steps.push({type:'end'});

  var i = 0;
  function next() {
    if (i >= steps.length) return;
    var s = steps[i++];
    if (s.type === 'text') {
      var p = document.createElement('p');
      p.className = 't-body';
      p.textContent = s.line;
      wrap.appendChild(p);
      setTimeout(function(){ p.classList.add('show'); p.scrollIntoView({behavior:'smooth',block:'nearest'}); setTimeout(next, 950); }, 80);
    } else if (s.type === 'quote') {
      var q = document.createElement('p');
      q.className = 't-quote';
      q.innerHTML = s.text.replace(/\n/g,'<br>');
      wrap.appendChild(q);
      setTimeout(function(){ q.classList.add('show'); q.scrollIntoView({behavior:'smooth',block:'nearest'}); setTimeout(next, 1200); }, 80);
    } else if (s.type === 'photo') {
      var img = document.createElement('img');
      img.className = 't-photo'; img.src = s.src; img.alt = s.cap||'';
      var cap = document.createElement('p');
      cap.className = 't-caption'; cap.textContent = s.cap||'';
      wrap.appendChild(img); wrap.appendChild(cap);
      setTimeout(function(){ img.classList.add('show'); img.scrollIntoView({behavior:'smooth',block:'nearest'}); setTimeout(function(){ cap.classList.add('show'); setTimeout(next,800); },500); },80);
    } else if (s.type === 'question') {
      var qb = document.createElement('div'); qb.className = 'q-block';
      renderQBlock(qb, s, wrap, next);
      wrap.appendChild(qb);
      setTimeout(function(){ qb.classList.add('show'); qb.scrollIntoView({behavior:'smooth',block:'nearest'}); },80);
    } else if (s.type === 'end') {
      renderEnd(wrap);
    }
  }
  setTimeout(next, 900);
}

function setLang(lang) {
  LANG = lang;
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  var u = UI[lang];

  // header back
  var back = document.getElementById('hdr-back');
  if (back) back.textContent = u.back;

  // select page
  var sl = document.getElementById('sel-label');
  var st = document.getElementById('sel-title');
  var sd = document.getElementById('sel-desc');
  if (sl) sl.textContent = u.selLabel;
  if (st) st.textContent = u.selTitle;
  if (sd) sd.innerHTML = u.selDesc;

  u.stations.forEach(function(s, i) {
    var n = document.getElementById('sc-num' + i);
    var nm = document.getElementById('sc-name' + i);
    var tg = document.getElementById('sc-tag' + i);
    if (n) n.textContent = s.num;
    if (nm) nm.textContent = s.name;
    if (tg) tg.textContent = s.tag;
  });
}

function getQEN(zhText) {
  for (var k in Q_EN) {
    if (k === zhText || k.replace(/\\n/g,'\n') === zhText) return Q_EN[k];
  }
  return null;
}

function renderQBlock(qb, s, wrap, next) {
  var u = UI[LANG];
  var qEN = getQEN(s.text);
  var ql = document.createElement('p'); ql.className = 'q-dot'; ql.textContent = u.qDot;
  var qt = document.createElement('p'); qt.className = 'q-text';
  qt.innerHTML = (LANG === 'en' && qEN) ? qEN.text : s.text.replace(/\n/g,'<br>');
  var qo = document.createElement('div');
  var qr = document.createElement('div'); qr.className = 'q-resp';
  var done = false;
  s.opts.forEach(function(o){
    var b = document.createElement('button'); b.className = 'q-opt';
    var enOpt = (LANG === 'en' && qEN && qEN.opts[o.s]) ? qEN.opts[o.s] : null;
    b.textContent = (LANG === 'en' && enOpt) ? enOpt.s : o.s;
    b.addEventListener('click', function(){
      if (done) return; done = true;
      qo.querySelectorAll('.q-opt').forEach(function(x){ x.disabled=true; });
      b.classList.add('chosen');
      qr.textContent = (LANG === 'en' && enOpt) ? enOpt.r : o.r;
      qr.style.display = 'block';
      setTimeout(function(){ qr.scrollIntoView({behavior:'smooth',block:'nearest'}); setTimeout(next,1000); },400);
    });
    qo.appendChild(b);
  });
  qb.appendChild(ql); qb.appendChild(qt); qb.appendChild(qo); qb.appendChild(qr);
}

function renderEnd(wrap) {
  var u = UI[LANG];
  var end = document.createElement('div'); end.className = 'end-block';
  var el = document.createElement('p'); el.className = 'end-label'; el.textContent = u.endStation;

  // 写给作者
  var wb = document.createElement('div'); wb.className = 'write-block';
  var wl = document.createElement('p'); wl.className = 'write-label'; wl.textContent = u.writeLabel;
  var wt = document.createElement('p'); wt.className = 'write-text'; wt.innerHTML = u.writeText.replace(/\n/g,'<br>');
  var wa = document.createElement('a'); wa.className = 'write-btn';
  wa.textContent = u.writeBtn;
  wa.href = 'mailto:guchao815@gmail.com?subject=' + encodeURIComponent(LANG === 'en' ? 'From a reader of Taiwan · Scenic Train' : '来自台湾游记的读者');
  wa.target = '_blank';
  wb.appendChild(wl); wb.appendChild(wt); wb.appendChild(wa);

  var eb = document.createElement('div'); eb.style.marginTop = '1.5rem';
  var b1 = document.createElement('button'); b1.className = 'end-btn'; b1.textContent = u.endBack;
  b1.addEventListener('click', showSelect);
  var b2 = document.createElement('a'); b2.className = 'end-btn'; b2.style.cssText = 'text-decoration:none;display:inline-block;';
  b2.textContent = u.endPlanet; b2.href = 'index.html';
  eb.appendChild(b1); eb.appendChild(b2);

  end.appendChild(el); end.appendChild(wb); end.appendChild(eb);
  wrap.appendChild(end);
  setTimeout(function(){ end.classList.add('show'); end.scrollIntoView({behavior:'smooth',block:'nearest'}); },80);
}
</script>
