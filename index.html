<!DOCTYPE html>
<html lang="zh" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好好生活星球</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --warm-bg: #fdf7ee;
    --warm-mid: #f9f0e2;
    --warm-deep: #f5ead8;
    --ink: #3d3228;
    --ink-mid: #6a5c50;
    --ink-light: #8a7060;
    --ink-mute: #b8a898;
    --ink-faint: #c8b8a8;
    --border: #ede5d8;
    --amber: #fdebd0;
    --amber-stroke: #e8d0a8;
    --amber-dark: #7a5c3c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--warm-bg);
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink);
    overflow-x: hidden;
  }


  /* ── LANG SWITCH ── */
  .lang-switch {
    position: fixed; top: 1.25rem; right: 1.25rem; z-index: 999;
    display: flex; background: var(--warm-bg);
    border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
  }
  .lang-btn {
    background: transparent; border: none;
    padding: 0.35rem 0.85rem; font-size: 11px; cursor: pointer;
    font-family: inherit; color: var(--ink-mute);
    transition: all 0.18s; letter-spacing: 0.06em;
  }
  .lang-btn.active { background: var(--ink); color: var(--warm-bg); }

  /* ── BEAT SECTIONS ── */
  .beat {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .z1 {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 520px;
    width: 100%;
  }

  /* ── BEAT 1: HERO ── */
  .planet-wrap {
    position: relative;
    width: 108px;
    height: 108px;
    margin-bottom: 36px;
  }

  .planet-body {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    background: #fdebd0;
    border: 1px solid #f0d5b0;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: float 6s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .planet-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 148px;
    height: 30px;
    border: 1.5px solid #e8c888;
    border-radius: 50%;
    transform: translate(-50%, -50%) rotateX(72deg);
    opacity: 0.65;
    pointer-events: none;
  }

  .greeting {
    font-size: 11px;
    color: #c0a888;
    letter-spacing: 0.22em;
    margin-bottom: 12px;
    text-transform: none;
    font-weight: 300;
  }

  .main-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 40px;
    font-weight: 400;
    color: var(--ink);
    text-align: center;
    line-height: 1.3;
    margin-bottom: 18px;
    letter-spacing: 0.05em;
  }

  .one-liner {
    font-size: 16px;
    color: var(--ink-light);
    text-align: center;
    line-height: 1.9;
    margin-bottom: 40px;
    font-weight: 300;
  }

  .member-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #fdf5eb;
    border: 1px solid #edd9b8;
    border-radius: 40px;
    padding: 9px 22px;
  }

  .member-dots {
    display: flex;
    gap: 4px;
  }

  .mdot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .member-text {
    font-size: 12px;
    color: #9a7a58;
    font-weight: 300;
  }

  .member-text strong {
    font-weight: 500;
    color: #6a4e30;
  }

  /* ── BEAT 2: WORLDVIEW ── */
  .world-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    color: var(--ink-mid);
    line-height: 2.2;
    text-align: center;
    max-width: 440px;
    font-weight: 300;
  }

  .world-text p {
    margin-bottom: 24px;
  }

  .world-text p:last-child {
    margin-bottom: 0;
  }

  /* ── BEAT 3: CTA ── */
  .req {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--ink);
    text-align: center;
    line-height: 1.7;
    margin-bottom: 14px;
    letter-spacing: 0.04em;
  }

  .req-sub {
    font-size: 13px;
    color: var(--ink-mute);
    text-align: center;
    margin-bottom: 48px;
    font-weight: 300;
  }

  .enter-btn {
    padding: 16px 60px;
    background: var(--amber);
    border: 1px solid var(--amber-stroke);
    border-radius: 40px;
    color: var(--amber-dark);
    font-size: 15px;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 400;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.25s, transform 0.15s;
    text-decoration: none;
    display: inline-block;
  }

  .enter-btn:hover {
    background: #f8e0c0;
    transform: translateY(-2px);
  }

  /* ── BEAT 4: MAP ── */
  .map-section {
    padding: 80px 40px 100px;
    position: relative;
    overflow: hidden;
    border-bottom: none;
  }

  .map-header {
    text-align: center;
    margin-bottom: 52px;
  }

  .map-label {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.16em;
    margin-bottom: 8px;
    font-weight: 300;
  }

  .map-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 0.05em;
  }

  .map-wrap {
    max-width: 780px;
    margin: 0 auto;
  }

  .map-wrap svg {
    width: 100%;
    border-radius: 16px;
    filter: drop-shadow(0 4px 24px rgba(120,90,60,0.08));
  }

  .map-footer {
    text-align: center;
    margin-top: 40px;
  }

  .map-footer p {
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    font-weight: 300;
  }

  /* ── FADE-IN ANIMATION ── */
  .fade-up {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── DIVIDER ── */
  .divider {
    width: 24px;
    height: 1px;
    background: var(--border);
    margin: 28px auto;
  }

  /* ── FOUNDER ── */
  .founder-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 24px;
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 40px;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }
  .founder-link:hover {
    background: var(--amber);
    transform: translateY(-1px);
  }
  .founder-label {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }
  .founder-name {
    font-size: 13px;
    color: var(--ink-mid);
    font-weight: 400;
  }

  /* ── SCROLL HINT ── */
  .scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.4;
    animation: bob 2s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(5px); }
  }

  .scroll-hint span {
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 0.12em;
  }

  .scroll-arrow {
    width: 16px;
    height: 16px;
    border-right: 1px solid var(--ink-mute);
    border-bottom: 1px solid var(--ink-mute);
    transform: rotate(45deg);
  }
</style>
</head>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.05 });
  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

  // 保底：页面加载完成后，如果第一屏元素还没显示，强制显示
  window.addEventListener('load', function() {
    setTimeout(function() {
      document.querySelectorAll('.fade-up').forEach(function(el) {
        var rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight) {
          el.classList.add('visible');
        }
      });
    }, 100);
  });

      body: JSON.stringify({ facility_name: facility })
    })
