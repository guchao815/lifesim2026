  {
    id:'love',category:'insight',template:'A',level:2,
    tag:{zh:'情感 · 真实改编',en:"Emotion · Based on a true story"},
    title:{zh:'我们都是这样爱对方的',en:"This Is How We Love Each Other"},
    desc:{zh:'你做手术没告诉父母。被发现后，妈妈哭着问你为什么。那一刻，你想起了很多年前，她也做过同一件事。',en:"You had surgery without telling your parents. When your mum found out and cried asking why, you remembered she had once done the same thing."},
    cover:'phone',
    meta:[{zh:'约 8 分钟',en:"~8 min"},{zh:'双重时间线',en:"Two timelines"},{zh:'真实故事',en:"True story"}],
    keywords:['家','妈','爸','父母','爱','关系','说不出','亲情','手术','生病','隐瞒'],
    scenes:{
      start:{tag:{zh:'城市里，某个工作日',en:"A weekday, in the city"},img:'night',prog:5,body:{zh:'你工作五六年了。\n\n检查结果出来——<strong>鼻中隔偏曲，需要手术，全麻</strong>。医生说不复杂，住院两天，术后休息一周。\n\n你看着报告单，想了一会儿。\n\n手术、全麻、住院——这些词听起来有点重。但你告诉自己：就是个鼻子的问题，没必要让他们担心，做完了再说。',en:"You have been working for five or six years.\n\nThe results are back. <strong>Deviated nasal septum. Surgery required. General anaesthesia.</strong> Two days in hospital, a week to rest.\n\nYou stare at the report for a moment.\n\nSurgery. Anaesthesia. Hospital. The words feel heavy. But you tell yourself: it is just the nose. No need to worry them. You will tell them when it is done."},choices:[{l:'A',t:{zh:'就这么决定了，手术前不告诉他们。',en:"Decided. You will not tell them before the surgery."},n:'hide_decision',c:true},{l:'B',t:{zh:'还是告诉他们吧，就说是小手术。',en:"Tell them anyway. Just say it is minor."},n:'tell_parents'}]},
      hide_decision:{tag:{zh:'手术前的几天',en:"The days before surgery"},img:'night',prog:18,body:{zh:'你请好了假，安排了朋友帮忙陪同，备好了换洗衣服。\n\n爸妈照常发消息，问吃了什么，睡得好不好。你说挺好的，都好。\n\n你没有撒谎——你确实还好。只是有些事情没说。\n\n你觉得这没什么，等手术完了，就是一个小插曲，不值得专门说起。',en:"You take leave, arrange for a friend to accompany you, pack a bag.\n\nYour parents message as usual. Eating well? Sleeping okay? You say fine, everything is fine.\n\nYou are not lying. You really are fine. You just have not mentioned certain things.\n\nYou tell yourself it is nothing. Once it is done, it will just be a small episode, not worth bringing up."},choices:[{l:'→',t:{zh:'手术那天，你嘱咐朋友：别联系我家人。',en:"On the day, you tell your friend: do not contact my family."},n:'surgery_day'}]},
      tell_parents:{tag:{zh:'电话打过去了',en:"You make the call"},img:'phone',prog:18,body:{zh:'妈妈接的。\n\n你说要做个手术，不大，鼻子的问题，全麻，就两天。\n\n她沉默了一会儿，然后说：我去陪你。\n\n你说不用，有朋友，真的不严重。她说：那你爸去。你说：真的不用。\n\n最后她说：那你每天给我发消息。声音有点低。',en:"Your mum picks up.\n\nYou say you need a small surgery. Just the nose. General anaesthesia, two days.\n\nShe is quiet for a moment. Then: I will come.\n\nYou say no need, a friend will be there, really not serious. She says: then your dad will go. You say: really, no need.\n\nFinally she says: then message me every day. Her voice is slightly low."},choices:[{l:'→',t:{zh:'她在等你的消息。',en:"She will be waiting for your messages."},n:'surgery_day_told'}]},
      surgery_day:{tag:{zh:'手术当天',en:"The day of surgery"},img:'home',prog:30,body:{zh:'你换上病号服，把手机交给朋友。\n\n进去之前你看了一眼，爸妈没有新消息。\n\n你想：等出来了再说，那时候已经是结果了，不用他们担心一个过程。\n\n麻药起效前，你闭着眼睛，没有想手术，想的是，他们今天大概在做什么。',en:"You change into a hospital gown and hand your phone to your friend.\n\nBefore going in, you check it one last time. No new messages from your parents.\n\nYou think: I will tell them when I am out. By then it will be over. No need for them to worry about the process.\n\nBefore the anaesthesia takes hold, you close your eyes. You are not thinking about the surgery. You are thinking about what they might be doing today."},choices:[{l:'→',t:{zh:'麻药起效了。',en:"The anaesthesia takes hold."},n:'wakeup'}]},
      surgery_day_told:{tag:{zh:'手术当天',en:"The day of surgery"},img:'home',prog:30,body:{zh:'你换上病号服，把手机交给朋友，叮嘱他：如果我妈发消息，告诉她进去了，别让她担心。\n\n进去之前，你给她发了最后一条：进去了，两三小时，出来让朋友通知你。\n\n她回：好。保重。\n\n就这两个字。你想，她现在一定放下了手机，但还拿着。',en:"You change into a hospital gown and hand your phone to your friend. Tell him: if my mum messages, let her know I have gone in. Do not let her worry.\n\nBefore going in, you send one last message: going in now. Two or three hours. My friend will tell you when I am out.\n\nShe replies: okay. Take care.\n\nJust those two words. You imagine she has put down her phone. But is still holding it."},choices:[{l:'→',t:{zh:'麻药起效了。',en:"The anaesthesia takes hold."},n:'wakeup'}]},
      wakeup:{tag:{zh:'手术室外，几小时后',en:"Outside the operating room"},img:'home',prog:45,body:{zh:'你醒过来。鼻子很胀，头有点晕。\n\n朋友把手机还给你。你看到有几条消息，都是他们问的：怎么样了，出来了吗。\n\n你打了几个字：出来了，很顺利，在休息。然后把手机放下。\n\n你以为这件事就这样过去了。',en:"You come round. Your nose feels swollen, your head heavy.\n\nYour friend hands back your phone. A few messages, all from your parents: how did it go, are you out yet.\n\nYou type a few words: out now, went well, resting. Then you put the phone down.\n\nYou think that is the end of it."},choices:[{l:'→',t:{zh:'出院，回家，一切如常。',en:"You are discharged. Life continues."},n:'after_hospital'}]},
      after_hospital:{tag:{zh:'术后，某一天',en:"Some time after"},img:'night',prog:55,body:{zh:'你完全恢复了，鼻子通畅了很多，一切如常。\n\n手术这件事，你偶尔提起过，说得很轻：对，之前做了个小手术，早好了。\n\n爸妈知道了，说：怎么不早说。\n\n你说：小事，没必要担心。\n\n然后话题就过去了。你觉得这个处理方式很合理。',en:"You recover fully. Everything returns to normal.\n\nYou mention the surgery occasionally, in passing: yes, I had a small procedure, all healed.\n\nYour parents find out. They say: why did you not tell us earlier.\n\nYou say: it was nothing. No need to worry.\n\nThe topic passes. You think you handled it reasonably."},choices:[{l:'→',t:{zh:'直到那封信。',en:"Until the letter."},n:'the_letter'}]},
      the_letter:{tag:{zh:'那封信',en:"The letter"},img:'phone',prog:62,body:{zh:'你朋友寄给你一封信，写了手术那天发生的事，写了陪你的那段时间，写得很认真。\n\n那封信，妈妈看到了。\n\n你不知道她是怎么看到的。她读了，尽管她自己也知道，读别人的信是不对的。\n\n然后她打来了电话。',en:"Your friend wrote you a letter. About the day of the surgery. About accompanying you. Written carefully.\n\nYour mum saw it.\n\nYou do not know how. She read it. Even though she knows that reading someone else's letter is wrong.\n\nThen she called."},choices:[{l:'→',t:{zh:'电话响了。',en:"The phone rings."},n:'mom_calls'}]},
      mom_calls:{tag:{zh:'电话里',en:"On the phone"},img:'phone',prog:72,body:{zh:'她的声音有些哑。\n\n她说：我看到了那封信。\n\n你没有说话。\n\n她说：你做手术，全麻，住院，你为什么不告诉我。\n\n然后你听到她在哭。不是那种很大声的哭，就是声音断了，然后她说：你是我儿子。',en:"Her voice is slightly hoarse.\n\nShe says: I saw the letter.\n\nYou say nothing.\n\nShe says: you had surgery. General anaesthesia. You were in hospital. Why did you not tell me.\n\nThen you hear her crying. Not loudly. Just her voice breaking. Then she says: you are my son."},pause:{zh:'你是我儿子。这句话很简单，但你说不出话来。',en:"You are my son. Simple words. But you cannot speak."},choices:[{l:'A',t:{zh:'你说：就是个小手术，不严重，不想让你担心。',en:"You say: it was a small surgery, not serious, I did not want you to worry."},n:'your_reason'},{l:'B',t:{zh:'你没有立刻回答。那句话让你一下子想起了什么。',en:"You do not answer immediately. Something in those words catches you."},n:'memory_surfaces'}]},
      your_reason:{tag:{zh:'你解释',en:"You explain"},img:'phone',prog:78,body:{zh:'你说：就是个小手术，真的不严重，我不想让你们大老远担心一个不值得担心的事。\n\n她说：你觉得不值得，不代表我不担心。\n\n你说：我就是这么想的。\n\n她沉默了一会儿，说：你从小就这样。\n\n你问：什么样。\n\n她没有回答这个问题。然后你突然想起了一件很久以前的事。',en:"You say: it was just a small surgery, really not serious. I did not want you worrying from so far away about something not worth worrying about.\n\nShe says: you decide it is not worth worrying about, but that does not mean I do not worry.\n\nYou say: that is how I see it.\n\nShe is quiet for a moment. Then: you have always been like this.\n\nYou ask: like what.\n\nShe does not answer. And then you remember something from a long time ago."},choices:[{l:'→',t:{zh:'你想起了高二那年。',en:"You remember the year you were in Year 11."},n:'memory_surfaces'}]},
      memory_surfaces:{tag:{zh:'你想起了',en:"You remember"},img:'home',prog:85,body:{zh:'你高二。小高考前后。\n\n那段时间你每两天打一次电话回家，接电话的都是爸爸，说妈妈出差了。\n\n有一次终于是她接的，声音有点奇怪，你以为她感冒，没多问。\n\n后来有一年暑假回家，你看到她头上有一道疤，她说不小心摔的。\n\n再后来，在一次很激烈的争吵里，她说：<em>我差点死掉，你知道吗。</em>\n\n车祸。脾脏切除。头上缝针。你爸说她出差了。\n\n她恢复了将近两个月，你不知道。',en:"You were in Year 11. Around your mid-term exams.\n\nYou called home every two days. Your dad always picked up. Your mum was away on a business trip, he said.\n\nOnce she answered. Her voice sounded strange. You assumed a cold. You did not ask.\n\nOne summer you came home and saw a scar on her head. She said she had fallen.\n\nYears later, in the middle of a fierce argument, she said: <em>I nearly died. Do you know that.</em>\n\nA car accident. Her spleen removed. Stitches in her head. Your dad said she was away on a business trip.\n\nShe recovered for nearly two months. You never knew."},choices:[{l:'→',t:{zh:'你在电话里，没有说话。',en:"You are still on the phone. You say nothing."},n:'the_parallel'}]},
      the_parallel:{tag:{zh:'电话里，很安静',en:"On the phone, very quiet"},img:'phone',prog:90,body:{zh:'她还在等你说话。\n\n你不知道怎么跟她解释。\n\n因为你刚刚想明白了一件事——你说不想让她担心，和她当年说不想让你分心，是同一句话，同一个逻辑，同一种爱。\n\n你不知道自己是什么时候学会这样的。\n\n也许从来没有学过，只是长在那个家里，就这样了。',en:"She is still waiting for you to speak.\n\nYou do not know how to explain.\n\nBecause you have just understood something. Your reason for not telling her and her reason for not telling you, all those years ago, are the same sentence. The same logic. The same kind of love.\n\nYou do not know when you learned to do this.\n\nMaybe you never learned it. Maybe it just happened, growing up in that house."},nudge:{zh:'有些话，你们两个都欠对方的。',en:"There are things both of you owe each other."},choices:[{l:'A',t:{zh:'你说：妈，你高二那年的事，我一直记得。',en:"You say: mum, I never forgot what happened when I was in Year 11."},n:'end_said'},{l:'B',t:{zh:'你什么都没说。只是说：我知道了，下次会告诉你。',en:"You say nothing about that. Just: I understand. I will tell you next time."},n:'end_quiet'}]},
      end_said:{tag:{zh:'那通电话之后',en:"After that call"},img:'home',prog:100,body:{zh:'',en:""},choices:[],isEnd:true,endType:'full',title:{zh:'我们都是这样爱对方的',en:"This is how we love each other"},story:{zh:'她沉默了很久。\n\n然后她说：你知道。\n\n你说：知道。后来才知道的。\n\n她说：我以为你不知道。\n\n你说：我知道。\n\n你们都没有再说什么。不是因为没有话，是因为有些事说出来和不说，都已经发生了。\n\n后来你挂掉电话，坐了很久。\n\n你想：她当年选择不说，是因为她以为这是保护你的方式。你这次选择不说，也以为这是保护她的方式。\n\n你不知道这是不是原生家庭带来的什么，还是就是你们的方式。\n\n<em>你只知道，你们都没有恶意。都以为自己在为对方做对的事。这就够了。</em>',en:"She is quiet for a long time.\n\nThen she says: you know.\n\nYou say: yes. I found out later.\n\nShe says: I thought you did not know.\n\nYou say: I know.\n\nNeither of you says anything more. Not because there is nothing to say. But because some things have already happened, whether spoken or not.\n\nAfterwards you hang up and sit for a long time.\n\nYou think: she chose not to tell you because she believed it was how she protected you. You chose not to tell her for the same reason.\n\nYou do not know if this is something your family passed down, or simply how the two of you are.\n\n<em>You only know that neither of you meant harm. Both of you thought you were doing the right thing for the other. That is enough.</em>"},insight:{zh:'有些爱的方式是代代相传的，不是刻意教的，只是在一起久了，就学会了。你不一定要改变它，但是当你看见它，你就多了一种选择。',en:"Some ways of loving are passed down without being taught. Just absorbed, over years of closeness. You do not have to change it. But once you see it, you have a choice."}},
      end_quiet:{tag:{zh:'那通电话之后',en:"After that call"},img:'night',prog:100,body:{zh:'',en:""},choices:[],isEnd:true,endType:'reflective',title:{zh:'说不出口的那一刻',en:"The moment you could not speak"},story:{zh:'你说：我知道了，下次会告诉你。\n\n她说：嗯。\n\n挂掉电话之后，你坐在那里，想了很久。\n\n那个平行让你说不出话来——你们做了同一件事，用同一个理由，在不同的年份，朝对方。\n\n你不知道该不该把那件事说出来，不知道说出来会怎样，还是就这样各自知道就好了。\n\n<em>也许沉默也是一种答案。就像它一直都是。</em>',en:"You say: I understand. I will tell you next time.\n\nShe says: okay.\n\nAfter you hang up, you sit there for a long time.\n\nThe parallel silences you. Both of you did the same thing, with the same reason, in different years, to each other.\n\nYou do not know whether to bring it up. What would happen if you did. Whether it is enough for both of you to simply know.\n\n<em>Maybe silence is also an answer. The way it always has been.</em>"},insight:{zh:'不是所有事情都需要说出来才算数。有时候，只是自己看见了，就已经是一种改变。',en:"Not everything needs to be spoken to matter. Sometimes, simply seeing it yourself is already a kind of change."}}
    }
  },
  {
    id:'effort',category:'sports',template:'A',level:1,
    tag:{zh:'日常 · 真实改编',en:'Daily Life · Based on a true story'},
    title:{zh:'大力出不了奇迹',en:"Trying Harder Isn't the Answer"},
    desc:{zh:'你有没有过这种感觉：越用力，越失控。一个发生在球场上的故事——关于节奏、代偿，和那个让一切自然发生的状态。',en:"Ever feel the harder you try, the worse it gets? A story from a tennis court — about rhythm, compensation, and the state where things just flow."},
    cover:'tennis',
    meta:[{zh:'约 5 分钟',en:'~5 min'},{zh:'向内的旅程',en:'Inner journey'},{zh:'无标准答案',en:'No right answers'}],
    keywords:['用力','努力','焦虑','失控','工作压力','越努力','效率','节奏','effort','stress','pressure'],
    scenes:{
      start:{tag:{zh:'球场，训练开始',en:'The court, training begins'},img:'tennis',body:{zh:'你已经好几周没有找到感觉了。\n\n今天的球打得很涩，准备总是慢半拍，出球又浅又软。教练在对面喂球，你接一个，失误一个。\n\n你知道问题在哪——你太紧了。但这个"知道"，好像没有任何用。',en:"You haven't found your rhythm in weeks.\n\nToday every shot feels wrong — late preparation, shallow returns. The coach feeds balls. You miss one after another.\n\nYou know the problem: you're too tense. But knowing doesn't help."},choices:[{l:'A',t:{zh:'咬牙继续，多打几组，用量把感觉找回来。',en:'Push through. More reps. Force the feeling back.'},n:'loop1_grind',c:true},{l:'B',t:{zh:'停下来一秒，感受一下现在身体是什么状态。',en:'Pause for a moment and notice what your body actually feels like.'},n:'pause_feel'}],prog:5},
      loop1_grind:{tag:{zh:'又打了二十分钟',en:'Twenty more minutes'},img:'tennis',body:{zh:'你又打了二十分钟。\n\n球没有更好，手臂开始有点酸。你意识到自己在每次击球前都在屏气——像是在用全身准备一次很重要的事情。\n\n教练叫暂停，说："我换一种方式喂球给你。"',en:"Twenty more minutes. Still not working. Your arm is getting sore. You notice you've been holding your breath before every shot.\n\nThe coach calls a pause. \"Let me feed differently.\""},nudge:{zh:'同样的问题，正在用不同的方式再问你一次。',en:'The same question, asking itself again in a different form.'},choices:[{l:'A',t:{zh:'摆摆手，说"没事，我自己再调整调整"。',en:'"It\'s fine, I\'ll sort it myself."'},n:'loop2_adjust',c:true},{l:'B',t:{zh:'点头，让教练来。',en:'Nod and let the coach take over.'},n:'coach_slow'}],prog:22},
      loop2_adjust:{tag:{zh:'又过了一会儿',en:'A little while later'},img:'tennis',body:{zh:'你试着调整——告诉自己放松，告诉自己不要用力，告诉自己节奏、节奏、节奏。\n\n但"告诉自己"这件事本身，就已经是一种用力了。\n\n球还是不对。你有点想离开球场。',en:"You try to adjust — telling yourself to relax, don't force it, rhythm, rhythm, rhythm.\n\nBut the act of telling yourself is itself a kind of forcing.\n\nStill not right. You feel like leaving."},nudge:{zh:'有时候，我们需要的不是更多努力，而是允许另一种可能出现。',en:"Sometimes what we need isn't more effort, but allowing a different possibility to emerge."},choices:[{l:'A',t:{zh:'算了，今天状态不好，收拍走人。',en:'Forget it. Bad day. Pack up and leave.'},n:'loop3_quit',c:true},{l:'B',t:{zh:'去喝口水，什么都不想，就站在那里一分钟。',en:'Get some water. Stand there for a minute and think nothing.'},n:'pause_feel'}],prog:38},
      loop3_quit:{tag:{zh:'更衣室',en:'The locker room'},img:'locker',body:{zh:'你换好衣服，坐在更衣室的长椅上。\n\n手机里有三条未读消息，都是工作的。你盯着屏幕，突然发现——\n\n你处理工作的方式，好像和今天打球的方式一模一样。',en:"You've changed and you're sitting on the locker room bench.\n\nThree unread work messages on your phone. You stare at the screen and suddenly notice —\n\nYou deal with work exactly the way you played today."},nudge:{zh:'球场和生活，有时候是同一道题。',en:'The court and life are sometimes the same question.'},choices:[{l:'A',t:{zh:'回复消息，先把事情处理掉再说。',en:'Reply to messages. Handle things first.'},n:'work_grind',c:true},{l:'B',t:{zh:'放下手机，想想这个发现说明了什么。',en:"Put the phone down and sit with what you just noticed."},n:'pause_feel'}],prog:50},
      work_grind:{tag:{zh:'办公室，深夜',en:'Office, late at night'},img:'night',body:{zh:'你加班到很晚。任务一件一件完成，但每完成一件，待办清单里又多出两件。\n\n你感觉自己像一台运转超负荷的机器——转速很高，但不知道在往哪里走。\n\n手机闹钟响了：明天还有训练。',en:"You work late. Finishing tasks, but every one completed adds two more.\n\nYou feel like a machine running too hot — spinning fast, going nowhere clear.\n\nYour alarm goes off: training tomorrow."},nudge:{zh:'命运很有耐心。它换了一个场景，但问的还是同一件事。',en:'Life is patient. Different setting, same question.'},choices:[{l:'A',t:{zh:'继续撑，明天早点去球场多练一会儿。',en:'Keep going. Get to the court earlier tomorrow.'},n:'loop_tired',c:true},{l:'B',t:{zh:'关电脑，今晚先停下来。',en:'Close the laptop. Stop for tonight.'},n:'pause_feel'}],prog:62},
      loop_tired:{tag:{zh:'第二天，球场',en:'Next day, the court'},img:'tennis',body:{zh:'你比平时早到了半小时。\n\n但身体还是昨天的身体，节奏还是昨天的节奏。球打出去，还是那种硬、浅、不对的感觉。\n\n教练走过来，什么都没说，只是把喂球机的速度调慢了一半。',en:"You arrive half an hour early.\n\nBut your body is yesterday's body. Your rhythm is yesterday's rhythm. Every shot: hard, shallow, wrong.\n\nThe coach walks over without a word and halves the speed of the ball machine."},nudge:{zh:'你已经是第三次站在这个门口了。',en:"This is the third time you've stood at this door."},choices:[{l:'A',t:{zh:'让节奏慢下来，真的试一次。',en:'Let the rhythm slow down. Actually try it.'},n:'coach_slow'},{l:'B',t:{zh:'"不用，快一点，我要练实战节奏。"',en:'"No thanks, keep it fast. I need to train at match speed."'},n:'gentle_end',c:true}],prog:72},
      pause_feel:{tag:{zh:'停下来的那一刻',en:'The moment you stop'},img:'tennis',body:{zh:'你停下来了。\n\n没有做什么，只是站在那里，感受了一下：手臂在哪里，重心在哪里，呼吸是快还是慢。\n\n发现自己的肩膀一直是耸着的，已经耸了很久，你自己都没有注意到。',en:"You stop.\n\nNothing dramatic. Just standing there, noticing: where are your arms, where is your weight, is your breath fast or slow.\n\nYour shoulders have been raised for a long time. You hadn't noticed."},choices:[{l:'→',t:{zh:'肩膀慢慢落下来，你告诉教练："换一种方式喂球吧。"',en:'Let your shoulders drop. Tell the coach: "Feed it differently."'},n:'coach_slow'}],prog:40},
      coach_slow:{tag:{zh:'节奏慢下来之后',en:'Once the rhythm slows'},img:'tennis',body:{zh:'教练喂球的节奏慢了很多。\n\n突然之间，你有了时间——时间去站好位，时间去引拍，时间去让重心转过来。\n\n你打出去的那一球，不知道为什么，出乎意料地干净。\n\n然后又一球。又一球。',en:"The coach's feed slows right down.\n\nSuddenly you have time — to get into position, to backswing, to let your weight transfer.\n\nThe next ball you hit is, somehow, unexpectedly clean.\n\nThen another. And another."},pause:{zh:'这个状态，你在生活里有没有经历过？是什么时候？',en:'Have you felt this state in your life before? When?'},choices:[{l:'A',t:{zh:'告诉自己"要保持这个状态"，开始刻意维持。',en:'"Keep this state" and start trying to hold on to it.'},n:'loop_maintain',c:true},{l:'B',t:{zh:'什么都不想，就让它继续发生。',en:'Think nothing. Let it keep happening.'},n:'flow_state'}],prog:65},
      loop_maintain:{tag:{zh:'又开始用力了',en:'Trying hard again'},img:'tennis',body:{zh:'"保持，保持，保持。"\n\n你开始想这件事，然后你开始又紧了。\n\n球又打回了原来的感觉。\n\n教练说："你刚才想什么了？"',en:'"Keep it, keep it, keep it."\n\nYou start thinking about it. And then you tighten up again.\n\nThe shots go back to what they were.\n\n"What were you just thinking about?" the coach asks.'},nudge:{zh:'那个状态不是被"维持"出来的。它是在你放下的那一刻出现的。',en:"That state can't be maintained. It appeared the moment you let go."},choices:[{l:'A',t:{zh:'"我不知道。" 停下来，不再想。',en:'"I don\'t know." Stop. Stop thinking.'},n:'flow_state'},{l:'B',t:{zh:'"我在想怎么保持好状态。" 继续想。',en:'"I was thinking about how to stay in the zone." Keep thinking.'},n:'gentle_end',c:true}],prog:78},
      flow_state:{tag:{zh:'接下来的几分钟',en:'The next few minutes'},img:'tennis',body:{zh:'你什么都没想。\n\n球过来，你打过去。准备、挥拍、推送，连贯地发生了，不需要指挥。\n\n有那么几分钟，你找到了那种久违的自如感——<strong>不是"我在努力打好"，而是过程走到了，结果就出现了</strong>。',en:"You think nothing.\n\nBall comes, you hit it. Preparation, swing, follow-through — it all just happens, no directing needed.\n\nFor a few minutes, you find that long-lost feeling of ease. <strong>Not 'I'm trying to hit well' — but the process completing itself, and the result just appearing.</strong>"},choices:[{l:'→',t:{zh:'雨开始下了，训练提前结束。你坐在场边，想了一会儿。',en:'Rain starts. Training ends early. You sit courtside and think for a while.'},n:'end_full'}],prog:90},
      end_full:{tag:{zh:'场边，雨里',en:'Courtside, in the rain'},img:'rain',isEnd:true,endType:'full',title:{zh:'大力不是答案',en:"Trying harder wasn't the answer"},story:{zh:'今天只打了二十分钟，却找回了那个感觉。\n\nMark后来写道：\n\n"所谓大力出奇迹，其实是一种对准备不足的代偿。当准备是完整的，这条代偿路径自然失效了，因为根本不需要它。"\n\n<em>力量不再被刻意调用，击球反而更稳定、更自然。</em>\n\n这件事不只属于球场。它更像是在提醒你：很多时候，结果不是被"努力"出来的，而是在过程回到它本来应有的节奏时，自然发生的。',en:"Only twenty minutes today, but the feeling came back.\n\nMark wrote afterwards:\n\n\"Trying harder is really just compensation for insufficient preparation. When preparation is complete, that compensation pathway becomes unnecessary — because you don't need it.\"\n\n<em>Force stops being deliberately applied, and the shots become more stable, more natural.</em>\n\nThis isn't only about tennis. It's a reminder: results often aren't produced by effort — they emerge when the process returns to its natural rhythm."},insight:{zh:'与其不断加码投入，不如反复去感受、校准、复原——让事情回到它本来该展开的方式。至于结果，只要路径是自然的，发生只是时间问题。',en:"Rather than constantly adding effort, return again and again to sensing, calibrating, restoring — letting things unfold the way they naturally should. As for results: if the path is natural, they are only a matter of time."},prog:100},
      gentle_end:{tag:{zh:'今天就这样了',en:"That's it for today"},img:'tennis',isEnd:true,endType:'gentle',title:{zh:'感觉还没找到',en:"The feeling didn't come today"},story:{zh:'今天没有找到那个感觉。\n\n但Mark说，那种自如感从来不是靠"找"找到的——\n\n<em>它是在你停下来的那一刻，自己出现的。</em>\n\n你今天没有停下来。但你知道了有这样一种可能。下一次，也许会不一样。',en:"The feeling didn't come today.\n\nBut Mark says that ease is never found by looking for it —\n\n<em>it appears the moment you stop.</em>\n\nYou didn't stop today. But now you know that's possible. Next time might be different."},insight:{zh:'命运很有耐心。它会一直问，直到你准备好，让节奏回来。',en:"Life is patient. It keeps asking until you're ready to let the rhythm return."},prog:100}
    }
  },
  {
    id:'taiwan',category:'travel',template:'C',level:2,
    tag:{zh:'旅行 · 真实改编',en:"Travel · Based on a true story"},
    title:{zh:'我真正想见的，或许从来不只是风景',en:"What I Wanted to See Was Never Only the Scenery"},
    desc:{zh:'一个拖延了十年的约定，一段两个月才批下来的申请，一次终于出发的旅行。带你走过海岸、断崖、鹅卵石滩，和一个朋友生活里最平常的一天。',en:"A promise delayed for ten years. An application that took two months. A journey finally taken. Through coastlines, cliffs, pebble beaches, and the most ordinary day in a friend's life."},
    cover:'wetland',
    meta:[{zh:'约 15 分钟',en:"~15 min"},{zh:'四个章节',en:"Four chapters"},{zh:'真实故事',en:"True story"}],
    keywords:['旅行','出发','等待','朋友','约定','风景','慢下来','发现','记忆','台湾'],
    scenes:{
      start:
      {tag:{zh:'某个工作日的下午',en:"A weekday afternoon"},img:'map',prog:5,body:{zh:'那是一个你工作后认识的朋友——不对，更早，大概十年前。\n\n你们在第三个城市相识，因为都打网球很快熟络。临别时约好，总要去对方的城市看看。后来他回了家，你们偶尔联系，那个约定就一直挂着，没有被正式提起，也没有被正式遗忘。\n\n直到你在一个视频里，偶然发现一条路径。那个念头——一簇快要熄灭的火，被轻轻吹了一下，又重新亮了起来。',en:"He was a friend you made about ten years ago — in a third city, not his, not yours. You bonded over tennis and hit it off quickly. When you parted, you said: we should visit each other someday. He went home. You stayed in touch, occasionally. The promise sat there, never formally made, never formally forgotten.\n\nThen one day you saw a video. A small detail. That old idea — an ember nearly out — was gently blown back to life."},choices:[{l:'→',t:{zh:'申请开始了。',en:"The application begins."},n:'application'}]},
      application:
      {tag:{zh:'两个月后',en:"Two months later"},img:'rain',prog:18,body:{zh:'前后补交了四次材料。每次反馈，都带着一些说不清道不明的要求。原定的出行时间一再临近，你几乎已经做好了最坏打算——就在家里，安静地过完这段假期，每天照常打网球。\n\n出发前一周，手续终于批下来。\n\n你和朋友开玩笑说，这趟申请，简直像是取经的九九八十一难。\n\n机票是当天买的。对于一个习惯提前规划的人，这大概是做过最仓促的决定，却也是最确定的一次。',en:"You submitted materials four times. Each round came back with requirements that were hard to parse. Your original travel dates kept approaching. You nearly made peace with staying home — just a quiet holiday, tennis every day.\n\nOne week before departure, it was approved.\n\nYou joked to your friend: this application process was basically eighty-one trials.\n\nYou bought the ticket that same day. For someone who plans everything in advance, it was perhaps the most impulsive decision you had ever made. Also the most certain."},choices:[{l:'→',t:{zh:'你坐上了飞机。',en:"You board the plane."},n:'on_plane'}]},
      on_plane:
      {tag:{zh:'飞往那座城市的航班上',en:"On the flight"},img:'rain',prog:28,body:{zh:'收录机里传出邓丽君的歌声，那几乎是你对童年某个夏天最清晰的记忆。\n\n小学和初中读过的课文，真正留下印记的其实不多。奇怪的是，有几篇描写那座岛屿风景的文章，你始终记得。或许是因为它带着一种朦胧的神秘感——一个只能通过文字想象的地方，老师未曾去过，你也从未设想过，有一天会亲眼见到。\n\n你坐在靠窗的座位，往下看是云层。\n\n你想，我真正想见的，或许从来不只是风景。',en:"Teresa Teng's voice, from an old tape recorder — that was one of your clearest memories of summer as a child.\n\nOf all the texts you read in primary school, few left much impression. Strangely, a few passages describing an island's scenery stayed with you. Perhaps because they carried a certain mystery — a place you could only imagine through words, that your teachers had never visited, that you had never seriously expected to see.\n\nYou sit by the window. Below is cloud.\n\nYou think: what I have really been wanting to see, perhaps, was never only the scenery."},pause:{zh:'有些地方，会在你抵达之前，就已经在你的生命里存在很久。',en:"Some places exist in your life long before you ever arrive."},choices:[{l:'→',t:{zh:'降落。',en:"Landing."},n:'arrive'}]},
      arrive:
      {tag:{zh:'夜抵，出关',en:"Night arrival"},img:'stranger',prog:35,body:{zh:'降落已是晚上九点多。出关、取行李，半小时出头，效率出乎意料。\n\n朋友在出口处等你。时隔八年多再次见到，一种说不出的喜悦慢慢散开，长途奔波的倦意也随之松了下来。\n\n搭捷运进城，再转乘到目的地，那时已是深夜十一点。路上行人稀少，四周很安静。夜色与路灯自上投下，城市慢慢显出轮廓。',en:"It is past nine when you land. Immigration, baggage — done in half an hour. Efficient beyond expectation.\n\nYour friend is waiting at the exit. Eight years since you last saw each other. A quiet joy spreads slowly. The tiredness of the journey loosens.\n\nYou take the metro into the city. By the time you arrive it is nearly eleven. Few people on the streets. Very quiet. Streetlights fall from above. The city slowly reveals its shape."},choices:[{l:'→',t:{zh:'第一眼。',en:"First impressions."},n:'first_look'}]},
      first_look:
      {tag:{zh:'老城区，第一天',en:"The old neighbourhood, day one"},img:'cafe',prog:42,body:{zh:'道路两旁是连贯的廊道，雨天可以一路走下去不被打断。抬头看，是二楼向外伸出的阳台，外立面带着明显的岁月感。后来才知道，这类建筑叫骑楼。\n\n阳台上的绿植探出头来，有的郁郁葱葱，有的花团锦簇。树木像是与城市一同生长出来的，道路始终干净，看不到随意丢弃的垃圾或烟头。\n\n你在街边走着，没有目的地，只是看。',en:"On both sides of the road, covered walkways stretch unbroken — you could walk through rain without getting wet. Look up: second-floor balconies extend outward, facades worn by decades. You later learn the word for these: qilou.\n\nGreen plants spill from the balconies, some lush, some flowering. The trees seem to have grown alongside the city. The streets are clean — no litter, no cigarette ends.\n\nYou walk without destination. Just looking."},choices:[{l:'A',t:{zh:'继续走，看看早晨的样子。',en:"Keep walking. See what morning looks like."},n:'morning_breakfast'},{l:'B',t:{zh:'在骑楼下站一会儿，感受一下这条街。',en:"Stand under the walkway for a moment. Just feel the street."},n:'stand_still'}]},
      stand_still:
      {tag:{zh:'骑楼下',en:"Under the walkway"},img:'cafe',prog:45,body:{zh:'你停下来，靠着柱子站了一会儿。\n\n这条街不宽，但有一种稳定的秩序感。摩托车偶尔经过，远处有人开门，然后关上，一切都在自己的节奏里运转。\n\n你想，城市的性格，有时候要站着不动才能感受到。',en:"You stop. Lean against a column and stand for a moment.\n\nThe street is not wide, but there is a settled order to it. A motorcycle passes occasionally. Someone opens a door in the distance, then closes it. Everything moves at its own pace.\n\nYou think: sometimes you have to stand still to feel what a city is like."},choices:[{l:'→',t:{zh:'去找早餐。',en:"Go find breakfast."},n:'morning_breakfast'}]},
      morning_breakfast:
      {tag:{zh:'清晨，早餐店',en:"Morning, a breakfast shop"},img:'cafe',prog:52,body:{zh:'走出门不远，早餐店已经开始营业。窗口前排着外带的人群，店里也熙熙攘攘地坐满了人。\n\n你和朋友找了个位置坐下。豆浆和一个中式汉堡。厨房里蒸汽缓慢上升，铁板上不时发出细碎的声响。店员动作利落而稳定，顾客来来往往，彼此之间没有太多交流，但气氛却很自然地连在一起。\n\n崭新的一天正在被启动——在老街巷、老骑楼、老店的包围里，那种状态，是安静的，却又是饱满的。',en:"Not far from the door, a breakfast shop is already open. A queue at the window for takeaway. Tables full inside.\n\nYou and your friend find a seat. Soy milk and a Chinese-style sandwich. Steam rises slowly from the kitchen. The griddle makes small sounds. The staff work with quiet efficiency. Customers come and go with little conversation, yet the atmosphere holds together naturally.\n\nA new day being started — in old alleys, old walkways, an old shop. The feeling is quiet, and also full."},choices:[{l:'→',t:{zh:'下午，去台大转转。',en:"That afternoon, a walk through the university."},n:'ntu'}]},
      ntu:
      {tag:{zh:'台大校园，某个下午',en:"The university campus, one afternoon"},img:'wetland',prog:60,body:{zh:'校园很大，也很安静，树很多，走在里面会不自觉地慢下来。学生们三三两两分散着，有人坐在草地上，有人骑着自行车慢慢经过，也有人独自走着，没有太明显的目的感。那种松弛不是刻意营造出来的，更像是一种默认的状态。\n\n校园里有一处湖。水面很平，一只天鹅正独自活动。它先把头整个倒插进水里，尾巴微微翘起，让水一点点浸到身体各处。接着在水面轻轻扑棱几下，再上岸，站在阳光下，用力扑动翅膀，把水珠甩开。\n\n你在那里站了十几分钟，看着它慢慢恢复平静，像是把刚才那阵水与风，都收回到羽毛里。',en:"The campus is large and quiet. Many trees. You find yourself slowing down without meaning to. Students scattered in small groups — some sitting on the grass, some cycling past slowly, some walking alone with no obvious destination. The ease is not performed. It seems to be the default.\n\nThere is a lake. The water is still. A swan moves alone on the surface. It plunges its head completely underwater, tail lifted, letting the water reach every part of its body. Then it paddles gently. Climbs ashore. Stands in the sunlight and beats its wings hard, scattering water in all directions.\n\nYou stand and watch for nearly fifteen minutes as it slowly returns to stillness — as if gathering everything back into its feathers."},pause:{zh:'有时候什么都不做也很好。就站着，看。',en:"Sometimes doing nothing is enough. Just standing. Watching."},choices:[{l:'A',t:{zh:'再看一会儿。',en:"Stay a little longer."},n:'ntu_linger'},{l:'B',t:{zh:'继续走，去找朋友说好的晚饭地点。',en:"Keep going. Meet your friend for dinner."},n:'friend_dinner'}]},
      ntu_linger:
      {tag:{zh:'湖边，多待一会儿',en:"By the lake, a little longer"},img:'wetland',prog:63,body:{zh:'天鹅已经理完了羽毛，重新回到水面，悠然地划动。\n\n你想，松弛这件事，也许不需要学。只是需要一个地方，让你忘记自己在赶什么。\n\n然后你去找了朋友。',en:"The swan has finished preening and returned to the water, gliding without hurry.\n\nYou think: maybe ease is not something you learn. Maybe you just need a place that makes you forget what you were rushing toward.\n\nThen you go find your friend."},choices:[{l:'→',t:{zh:'晚饭。',en:"Dinner."},n:'friend_dinner'}]},
      friend_dinner:
      {tag:{zh:'街边小店，晚饭',en:"A neighbourhood restaurant, dinner"},img:'cafe',prog:68,body:{zh:'他问你想去哪里吃。你说其实不太挑，比起专门去找什么好吃的，更想跟着他们去平时会去的地方。\n\n于是你们走进街边巷尾一家开了几十年的小店，环境很简单，来往的多是熟客。坐在那里，有种很清晰的感觉：自己并不是以一个游人的视角在这里，而是被带进了他们再平常不过的一天，仿佛我本来就在这里。\n\n饭后走在路上，你想，旅行有很多种，这一种，你最喜欢。',en:"He asks where you want to eat. You say you do not really mind. More than finding somewhere famous, you want to go where he actually goes.\n\nSo you walk into a small shop in an alley — open for decades, simple surroundings, mostly regulars. Sitting there, something is clear: you are not here as a visitor. You have been brought into an ordinary day that belongs to someone else. As if you had simply always been here.\n\nWalking back afterwards, you think: there are many ways to travel. This one, you like most."},choices:[{l:'→',t:{zh:'第三天，去看海。',en:"Third day. Go see the sea."},n:'coast_bus'}]},
      coast_bus:
      {tag:{zh:'公车，沿海岸线',en:"The bus, along the coast"},img:'wetland',prog:72,body:{zh:'沿着北海岸缓慢行进，全程一百三十多个站，大约两个小时。\n\n有了这样的条件，做攻略反而可以简单——打开地图，顺着海岸线一点点看，总能找到一些不那么显眼的地方。\n\n公车靠站、开门、关门，乘客上上下下，海在窗外一直陪着你。',en:"The bus travels slowly along the northern coast. Over a hundred and thirty stops. About two hours.\n\nPlanning is simple with this option: open a map, follow the coastline, look for the less obvious places.\n\nThe bus stops, doors open and close, passengers come and go. The sea keeps pace outside the window."},choices:[{l:'→',t:{zh:'下车，走向海。',en:"Get off. Walk toward the sea."},n:'green_reef'}]},
      green_reef:
      {tag:{zh:'老梅绿石槽',en:"The green reef"},img:'wetland',prog:76,body:{zh:'这里和常见的沙滩、峭壁或碎石海岸都不太一样。潮水退去后，整片岩面露出来，一道一道石槽平行伸向海里，沟槽里还留着水，表面很平，微微反光。\n\n阳光慢慢落下来，石槽上的海藻显出一层亮绿色。因为还湿着，颜色很饱和，带一点光泽，看起来像是给整片石槽盖了一层贴合的绿色被子。\n\n海浪一下一下推上来，又退下去，水在石槽之间流动，将绿色衬得更清晰。',en:"This is unlike any beach you have seen — no sand, no cliffs, no pebbles. When the tide recedes, the whole rock surface appears: parallel channels running toward the sea, water still sitting in the grooves, surfaces flat and faintly reflective.\n\nSunlight falls slowly. The seaweed covering the rock glows bright green. Still wet, the colour is saturated, slightly glossy — like a fitted green blanket laid across the stone.\n\nWaves push in and pull back. Water moves between the channels, making the green sharper."},choices:[{l:'A',t:{zh:'在这里多待一会儿。',en:"Stay here a while longer."},n:'green_reef_stay'},{l:'B',t:{zh:'继续往花莲去，去看清水断崖。',en:"Head on to Hualien. See the cliff."},n:'train_to_hualien'}]},
      green_reef_stay:
      {tag:{zh:'绿石槽，多待一会儿',en:"At the reef, staying longer"},img:'wetland',prog:78,body:{zh:'你蹲下来，看着海水在石槽里慢慢流动。\n\n这些线条来自岩石本身的裂隙，海浪长时间顺着较软的部分反复冲刷，把它们慢慢刻深。几千年，或者更久。\n\n你想，有些东西的形成，不是因为力气大，是因为时间长。',en:"You crouch down and watch the water moving slowly through the channels.\n\nThese grooves came from cracks in the rock — waves following the softer lines, deepening them over time. Thousands of years, maybe more.\n\nYou think: some things are shaped not by force, but by time."},choices:[{l:'→',t:{zh:'去花莲。',en:"Go to Hualien."},n:'train_to_hualien'}]},
      train_to_hualien:
      {tag:{zh:'列车，往花莲',en:"The train to Hualien"},img:'map',prog:82,body:{zh:'从台北车站出发，搭自强号往花莲。新车厢，干净、明亮，行进平稳，几乎没有多余的声响。\n\n列车沿东侧前行。海在远处铺开，颜色从浅到深一段段延伸；山脉几乎贴着轨道升起，绿意一路往上延伸到山体深处，间或闪出几块开阔的稻田。\n\n因为起得早，上车后不自觉地打了个盹。再睁眼时，视线正好落在窗外那一抹天蓝上——干净、明亮，几乎是从画面里直接跳出来的。只是一闪而过的几秒，便知道那是清水断崖。\n\n列车驶入隧道，光线短暂收起。再出来时，海与山又重新铺开。',en:"You take the express train from Taipei. New carriages — clean, bright, smooth. Almost no extra noise.\n\nThe train runs along the eastern side. The sea spreads out in the distance, colours deepening in layers. Mountains rise almost against the tracks, green climbing deep into the slopes, interrupted by occasional open rice fields.\n\nYou dozed off after boarding — you were up early. When you open your eyes, the view outside is a streak of blue — clean, bright, almost jumping out of the frame. Just a few seconds, but you know at once: Qingshui Cliff.\n\nThe train enters a tunnel. Light draws back briefly. When it emerges, the sea and mountains open up again."},choices:[{l:'→',t:{zh:'抵达花莲。',en:"You arrive in Hualien."},n:'cliff_morning'}]},
      cliff_morning:
      {tag:{zh:'清水断崖',en:"Qingshui Cliff"},img:'tower',prog:86,body:{zh:'早上起来时，天还是阴的。云层压得很低，光线被收住，海也跟着暗了下来。\n\n到达断崖时，云层刚好裂开一道口子。阳光完整地落下来，海面一下子亮了起来，从深蓝一路过渡到更浅的天蓝，边缘还透着一点亮。\n\n黑灰色的大理石岸边，叠着层层渐变的蓝，整片景色像是被有意压低了声量。不张扬，却更深，也更耐看。热带海岛的海，你会直接觉得美。可这里给你的，似乎是另一种东西——不是扑面而来的热烈，而是让人愿意慢慢走近、慢慢停留的魅力。\n\n看着看着，人会不自觉地安静下来。',en:"The morning is overcast. Cloud sits low. Light is held back. The sea darkens with it.\n\nWhen you reach the cliff, the cloud cracks just enough. Sunlight falls through completely. The sea brightens at once — deep blue transitioning to lighter blue, the edges touched with brightness.\n\nAgainst the black-grey marble shore, layers of blue stack in gradation. The whole scene seems deliberately quieted. Not showy, but deeper. More lasting. Tropical seas make you think: beautiful. This place gives you something else — not heat, but a pull. Something that makes you want to come closer slowly, stay longer.\n\nAfter a while, you find you have gone quiet."},choices:[{l:'A',t:{zh:'在这里再站一会儿。',en:"Stand here a little longer."},n:'cliff_stay'},{l:'B',t:{zh:'去七星潭。',en:"Go to Qixingtan."},n:'qixingtan'}]},
      cliff_stay:
      {tag:{zh:'断崖边，多待一会儿',en:"At the cliff, staying"},img:'tower',prog:88,body:{zh:'你没有急着走。\n\n把无人机升起来，从上方看下去，海与崖的边界一下子变得分明，整片蓝色随之铺展开来。\n\n那一瞬间，会很自然地觉得，自己原本也就是这颗蓝色星球的一部分。',en:"You do not hurry to leave.\n\nYou send up the drone. Looking down, the boundary between sea and cliff becomes sharp and clear. The whole expanse of blue opens up.\n\nIn that moment, it feels natural — obvious, even — that you were always part of this blue planet."},choices:[{l:'→',t:{zh:'去七星潭。',en:"Go to Qixingtan."},n:'qixingtan'}]},
      qixingtan:
      {tag:{zh:'七星潭，下午',en:"Qixingtan, afternoon"},img:'mud',prog:91,body:{zh:'下午到七星潭时，天已经重新阴了下来。海上起了风，一阵一阵从远处推过来，落在岸边。穿着短袖，倒也不觉得冷。\n\n这里是一整片鹅卵石铺成的海滩。海浪不断冲上来，又退下去，把石头一层一层往上推，堆出一个自然的斜面。\n\n海浪拍上来时声音很实，水退下去的那一刻，会带着一整片鹅卵石一起滑动，发出连续的窸窸窣窣声。不是一下，而是一段，有节奏，也有起伏。\n\n你平躺在鹅卵石上，身体被一颗一颗石头顶住，有点硌，却很放松。就躺着，听海。',en:"By the time you reach Qixingtan in the afternoon, the sky has clouded over again. Wind comes off the sea in gusts. You are in short sleeves. Not cold.\n\nThe whole beach is pebbles. Waves push in constantly, pulling the stones up the slope, building a natural incline.\n\nWhen a wave hits, the sound is solid. As the water retreats, it drags a whole surface of pebbles with it — a long, continuous rustling. Not one sound, but a sequence. Rhythmic. Variable.\n\nYou lie back on the pebbles. Each stone presses into you separately. A little uncomfortable. Very relaxed. You just lie there, listening to the sea."},pause:{zh:'有时候什么都不做也很好。就躺着，听。',en:"Sometimes doing nothing is enough. Just lying there, listening."},choices:[{l:'A',t:{zh:'闭上眼睛，听一会儿。',en:"Close your eyes. Just listen for a while."},n:'memory_recall'},{l:'B',t:{zh:'低头看看脚边的石头。',en:"Look at the pebbles near your feet."},n:'pebble_look'}]},
      pebble_look:
      {tag:{zh:'鹅卵石',en:"The pebbles"},img:'mud',prog:92,body:{zh:'形状、颜色、大小都不一样，有些很圆，有些还带着棱角，一颗一颗慢慢看过去。\n\n你想，它们都从同一片海里来，却长成了完全不同的样子。然后你就闭上了眼睛。',en:"Each one is different — shape, colour, size. Some perfectly round, some still with edges. You look through them one by one.\n\nYou think: they all came from the same sea, and ended up completely different. Then you close your eyes."},choices:[{l:'→',t:{zh:'听海。',en:"Listen to the sea."},n:'memory_recall'}]},
      memory_recall:
      {tag:{zh:'七星潭，鹅卵石滩上',en:"Qixingtan, lying on the pebbles"},img:'mud',prog:95,body:{zh:'如果说情境是回忆的提示词，那么这片声音，打开了一扇很久没开的门。\n\n那是大学毕业时的一趟旅行。虽然出生在沿海地区，却是那一次，才真正见到海。那天傍晚，你在石滩上躺了很久。海面被夕阳压低了亮度，渔船一只一只往港口靠，慢慢停下来。后来半夜睡不着，又走回海边，沿着岸边来回走。海浪一遍遍冲上来，又退下去，带着整片鹅卵石滑动，那种声音，一直到现在都还记得。\n\n时间其实已经过去很久了，十几年。你不太确定现在的自己，和当时是不是同一个人，也说不清那一部分还剩下多少。只是在这里的时候，会隐约感觉到，有些东西并没有真的改变——面对还未发生的未来，仍然愿意相信，也仍然愿意好好生活。',en:"If context is the prompt for memory, then this sound opens a door that has not opened in a long time.\n\nA trip after graduation. Though you grew up near the coast, that was the first time you truly saw the sea. You lay on a pebble beach all evening. Sunlight dimmed the sea surface. Fishing boats came in one by one, slowly stopped. Later, you could not sleep and went back. You walked back and forth along the shore. Waves came in and pulled back, dragging the pebbles. That sound — you have never forgotten it.\n\nThat was more than ten years ago. You are not sure whether you are still the same person who lay on that beach. You cannot say how much of that person remains. But lying here now, you sense something that has not really changed — faced with a future not yet happened, you are still willing to believe in it. Still willing to live well."},choices:[{l:'→',t:{zh:'回台北。最后一天。',en:"Back to Taipei. The last day."},n:'back_taipei'}]},
      back_taipei:
      {tag:{zh:'台北车站，夜归',en:"Taipei station, returning at night"},img:'night',prog:97,body:{zh:'昨晚乘台铁从花莲返回台北，走出闸机，台北车站的灯光陡然亮得有些刺眼。四周的人群像是一段被按了2倍速的录像带，公文包、香水味和匆忙的皮鞋声交织在一起，把花莲带回来的那点海盐味儿冲得稀碎。\n\n你低头看了看自己鞋子，上面可能还沾着点泥土，在锃亮的地板上显得格格不入。就像是一个带着满身草木气息的人，笨拙地站在时间洪流的缝隙里。\n\n你有个习惯：去到一个地方，总要去看看它的代表性的公园，像是某种下意识的路径。到了那里，城市才会慢慢显出它的另一面。上周末去阳明山，被一场雾雨拦了下来——风声、雨丝、朦胧的轮廓，一切都在，却又什么都看不真切。\n\n于是你决定，离开前最后一天，再上一次阳明山。',en:"Last night you took the train back from Hualien. Walking out of the barriers, the lights of Taipei station are suddenly, sharply bright. The crowd moves at double speed. Briefcases, perfume, hurried footsteps — they dissolve whatever sea-salt feeling you brought back.\n\nYou look down at your shoes. Still a little mud on them. Out of place on the gleaming floor. Like someone carrying grass and wood back into the current of time, standing awkwardly in the gap.\n\nYou have a habit: wherever you go, you look for the city's signature park. That is where a city shows its other side. Last weekend you tried Yangmingshan and were stopped by fog and drizzle — wind, mist, faint shapes. Everything seemed present, yet nothing was clear.\n\nSo you decide: on the last day before you leave, go up again."},choices:[{l:'→',t:{zh:'最后一天。上山。',en:"Last day. Up the mountain."},n:'yangming'}]},
      yangming:
      {tag:{zh:'阳明山，擎天岗',en:"Yangmingshan, Qingtiangang"},img:'wetland',prog:98,body:{zh:'这天不算晴朗，但云雾轻到足以被拨开。山脚下有光，是那种能穿透云层、但并不刺眼的亮。\n\n擎天岗是一片起伏温和的山丘草原，没有突兀的高峰，也没有逼人的坡度，只是缓缓地铺展开来，像一张被风轻轻掀起边角的绿色毯子。牛安静地低头吃草，像是这片山的原住民，而人只是偶尔路过的访客。\n\n走在这样的草坡上，会不自觉地想发出一些没什么意义的声音。那种冲动来得很自然，好像身体会先于念头，对这片开阔作出一点回应。\n\n这大概走了几公里，却几乎没有赶路的感觉。没有目标，没有时间限制，没有需要完成的事情。只是自在地前行、停下、再前行。身体很轻，呼吸也很稳。',en:"Not quite sunny, but the clouds are thin enough to let light through. At the foot of the mountain there is brightness — the kind that penetrates cloud without glare.\n\nQingtiangang is a gently rolling grassland. No sharp peaks, no steep inclines — it simply unfolds, like a green blanket with its corners lifted by wind. Cattle graze quietly, original residents of this mountain. People are occasional visitors.\n\nWalking across this slope, you find yourself wanting to make a sound — something meaningless. The impulse comes naturally, as if the body responds to open space before the mind catches up.\n\nYou cover perhaps a few kilometres with almost no sense of hurrying. No goal. No time limit. Nothing that needs completing. Just moving forward, stopping, moving again. Your body is light. Your breathing is steady."},pause:{zh:'春和景明，心生欢喜。',en:"Spring light, clear sky. A quiet joy rises."},choices:[{l:'A',t:{zh:'在坡顶停一会儿，往远处看。',en:"Stop at the top of the slope. Look out."},n:'yangming_view'},{l:'B',t:{zh:'随着山路继续走，不用往哪里。',en:"Keep walking with the path. Nowhere in particular."},n:'yangming_walk'}]},
      yangming_view:
      {tag:{zh:'坡顶',en:"The top of the slope"},img:'tower',prog:99,body:{zh:'远处叠起的山线，脚下起伏的草浪，光影在云层间慢慢移动。\n\n你忽然想，阳明山似乎并不是一个可以被单独截取出来的画面。没有哪一帧能代表它，但走在其中的时候，每一帧又都在里面。\n\n有些地方是这样的。',en:"Layered mountain lines in the distance. Grass rising and falling below. Light and shadow moving slowly between the clouds.\n\nYou think: Yangmingshan cannot really be captured in a single frame. No one image represents it. But while you are inside it, every frame is there.\n\nSome places are like this."},choices:[{l:'→',t:{zh:'下山，去找朋友。',en:"Down the mountain. Go find your friend."},n:'last_evening'}]},
      yangming_walk:
      {tag:{zh:'山路上',en:"On the mountain path"},img:'wetland',prog:99,body:{zh:'风不算大，但一直在流动。短袖加一件薄外套刚刚好。\n\n不时会遇到一群牛，在不远处吃草。站着听了一会儿，能听见它们拔草的声音——草从地面被扯起，再送入口中。那一刻，你忍不住去想，这样简单的食物，是怎么长成这样庞大的身体。\n\n然后就不想了。继续走。',en:"The wind is not strong, but it keeps moving. Short sleeves plus a thin jacket — just right.\n\nYou come across a group of cattle nearby, grazing. You stop and listen. You can hear the sound of grass being pulled from the ground and taken into the mouth. You find yourself wondering how something so simple becomes something so large.\n\nThen you stop wondering. Keep walking."},choices:[{l:'→',t:{zh:'下山，去找朋友。',en:"Down the mountain. Go find your friend."},n:'last_evening'}]},
      last_evening:
      {tag:{zh:'最后一个傍晚',en:"The last evening"},img:'stranger',prog:99,body:{zh:'你们在他家附近的街边站了一会儿。没有特别说什么，也没有刻意告别的感觉。就是站着，偶尔说几句话，看着路上的人来来往往。\n\n你想，很多年前，你们是在第三个城市认识的。然后各自去了不同的地方，偶尔联系，那个约定就一直挂着。\n\n后来有了这趟旅行，你第一次走进了他成长的地方，走进了他平时会走的街道，坐在他常去的店里吃了饭。\n\n你以为你来看的是一座城市，但你慢慢发现，你其实是来看一个人的生活——那些具体的、真实的，在这座城市里展开的日子。',en:"You stand with him on a street near his home for a while. Not saying much in particular. No deliberate sense of farewell. Just standing, the occasional word, watching the people passing.\n\nYou think: you met in a third city, years ago. Then each went somewhere different, kept in touch occasionally, that promise hanging there.\n\nThen this trip happened. For the first time you walked into the place he grew up, the streets he walks, the shops he goes to.\n\nYou thought you came to see a city. But slowly you realise: you came to see a life — specific, real, unfolding in this place."},choices:[{l:'→',t:{zh:'第二天，离开。',en:"Next day. You leave."},n:'departure'}]},
      departure:
      {tag:{zh:'机场，出发',en:"The airport, departing"},img:'rain',prog:99,body:{zh:'你排队过安检，把背包放上传送带，走进候机厅。\n\n收录机里邓丽君的歌声，那是你对童年某个夏天最清晰的记忆。阿里山的课文，你那时以为只是文字，只是想象。\n\n十年的时间，说长不长，说短也不短。有些地方，会在你尚未抵达之前，就已经在你的生命里存在很久。有些路，也许并不是走过去的。只是某一天，你刚好走到了它出现的位置。\n\n你找到座位坐下，等待登机。',en:"You join the queue for security. Put your bag on the belt. Walk into the departure hall.\n\nTeresa Teng's voice from an old tape recorder. A summer childhood. A text about mountains and lakes that you once thought were only words, only imagination.\n\nTen years is not so long. Not so short either. Some places exist in your life long before you arrive. Some journeys are not walked toward — you simply reach the moment when they appear.\n\nYou find your seat and wait to board."},choices:[{l:'→',t:{zh:'起飞。',en:"Takeoff."},n:'end_reflection'}]},
      end_reflection:
      {tag:{zh:'飞机上，离开的方向',en:"On the plane, heading away"},img:'rain',prog:100,body:{zh:'',en:""},choices:[],isEnd:true,endType:'full',title:{zh:'我真正想见的，或许从来不只是风景',en:"What I wanted to see was never only the scenery"},story:{zh:'你靠在椅背上，窗外是云。\n\n你想起那只天鹅——把头整个倒插进水里，反复确认每一处都被水带到，然后上岸，用力把水珠甩开，再慢慢把羽毛理顺。没有人教它这个步骤，但每一步都有来处。\n\n你想起七星潭，和那片更久以前的鹅卵石滩。\n\n你想起骑楼下的早晨，朋友家的饭桌，那家几十年的小店，和阳明山上没有目的地的几公里。\n\n有些旅行，是去看一个地方。有些旅行，是去看一段时间——你的，或者别人的，或者两者之间那片难以言说的交叠。\n\n这一次，你想见的，是一个朋友的生活，是一段被长久拖延的约定，是某个童年里只有声音的地方，是十年前的自己和现在的自己之间那条若隐若现的线。\n\n你不确定你都找到了。但你知道，你来了。\n\n<em>有些东西，来了之后才会知道自己原来一直想要。</em>',en:"You lean back. Outside the window, clouds.\n\nYou think of the swan — plunging its head completely underwater, checking that every part was reached, then climbing ashore and beating its wings hard to shed the water, then slowly straightening each feather. No one taught it those steps. But each one had a reason.\n\nYou think of Qixingtan, and the pebble beach from much longer ago.\n\nYou think of mornings under the walkway, dinners at your friend's table, a small shop open for decades, a few kilometres on Yangmingshan with nowhere particular to go.\n\nSome journeys are to see a place. Some are to see a span of time — yours, or someone else's, or the overlap between the two that is hard to put into words.\n\nThis time, you came to see a friend's life, a long-delayed promise, a place that existed in your childhood only as sound, a faint line connecting the person you were ten years ago to who you are now.\n\nYou are not sure you found all of it. But you know you came.\n\n<em>Some things — you only discover you always wanted them once you have arrived.</em>"},insight:{zh:'旅行最诚实的地方在于，你带着什么去，它就照出什么来。有时候是风景，有时候是记忆，有时候是一个关于自己的发现。不必强求。走着走着，你想见的，会慢慢出现。',en:"The most honest thing about travel is this: whatever you bring with you, it reflects back. Sometimes scenery. Sometimes memory. Sometimes something about yourself. You do not need to force it. Keep going, and what you came to see will slowly appear."}}
    }
  }

    title:{zh:'你即你的击球，而击球不会撑谎',en:"You Are Your Hitting, and Hitting Never Lies"},
    desc:{zh:'积极心理暗示和自我评判，背后是同一件事。一个关于内心游戏的真实故事。',en:"Positive self-talk and self-judgment share the same core. A true story about the inner game."},
    cover:'tennis',
    meta:[{zh:'约 6 分钟',en:"~6 min"},{zh:'内心游戏',en:"Inner game"},{zh:'真实故事',en:"True story"}],
    keywords:['用力','急躁','内耗','失控','状态','心流','内心游戏','心态','运动','inner game','zone'],
    scenes:{
      start:
      {tag:{zh:'球场，清晨',en:"The court, early morning"},img:'tennis',prog:8,body:{zh:'清晨的练习，一开始就不对劲。\n\n小场热身，力道总是偏大，落点掉在发球区外。退到底线后，击球莫名其妙——不是击飞，就是打呲，或者下网。这种离谱的状态，是几个月来不多见的。\n\n连续的失误，让水面下隐藏的东西浮了上来：练习了这么久，怎么还可以打这么烂。明明知道动作要怎么做，为什么结果却差十万八千里。\n\n这种感觉就像一个大大的脑袋，困在了一个小小的身躯上。你指东，身体往西。',en:"Something is wrong from the start of morning practice.\n\nWarm-up in the service box — the force keeps coming out too big, shots landing beyond the line. Moving back to the baseline, the hitting becomes inexplicable — flying long, shanking off the frame, hitting the net. A state this bad has not happened in months.\n\nConsecutive errors bring something surfacing from beneath: after all this practice, how can you still play this badly. You know exactly what the motion should be, so why does the result miss by a mile.\n\nIt feels like a very large head trapped inside a very small body. You tell it to go right. It goes left."},choices:[{l:'A',t:{zh:'告诉自己放松，积极暗示，继续打。',en:"Tell yourself to relax. Positive self-talk. Keep going."},n:'positive_talk',c:true},{l:'B',t:{zh:'停下来，走到边上喝口水。',en:"Stop. Walk to the side. Get some water."},n:'pause_water'}]},
      positive_talk:
      {tag:{zh:'底线，继续打',en:"Baseline, keep playing"},img:'tennis',prog:20,body:{zh:'你开始在心里对自己说：放松，trust yourself，I can do it。\n\n这些话你以前用过，某些时候确实有效。于是你一边击球，一边在脑海里重复这些句子，像念咒一样。\n\n但球还是不对。\n\n不仅如此，这些咒语反而让你更加注意到每一次失误——每打完一球，你立刻判断它和预期的差距，然后再次输出指令，再次重复那几句话。\n\n身体还在场上，但心思早已离场，自顾自玩起了另一场游戏。',en:"You start talking to yourself internally: relax, trust yourself, I can do it.\n\nThese phrases have worked before, sometimes. So you hit balls and repeat the sentences in your mind, like an incantation.\n\nBut the hitting is still wrong.\n\nWorse — the incantations make you more aware of each error. After every ball you immediately assess the gap between result and expectation, then issue new instructions, then repeat the phrases again.\n\nYour body is still on the court. Your mind left a while ago and is playing a different game entirely."},nudge:{zh:'积极暗示和自我评判，背后藏着同一件事：预期。',en:"Positive self-talk and self-judgment share the same hidden ingredient: expectation."},choices:[{l:'→',t:{zh:'Tengku 叫停了。',en:"Tengku calls a halt."},n:'tengku_stops'}]},
      pause_water:
      {tag:{zh:'球场边，长凳旁',en:"Courtside, by the bench"},img:'locker',prog:22,body:{zh:'你走到边上，喝了口水。\n\nTengku 走过来，问：昨晚睡好了吗？\n\n你愣了一下。你不记得睡得如何。但你确实感觉到，有什么东西压在心里——说不清楚是什么，只是很笃定地在那里。\n\n你好奇地问他是怎么看出来的。\n\n他说：你的内心世界，已经全部透明地写在击球里。也许你的思维会撒谎，但击球不会，从不会。',en:"You walk to the side and drink some water.\n\nTengku comes over. Did you sleep well last night?\n\nYou pause. You do not actually remember how you slept. But you do sense something pressing on you — you cannot name it clearly, only feel its presence with certainty.\n\nYou ask him how he could tell.\n\nHe says: your inner world is written transparently in every shot. Your thoughts might lie. But your hitting never does."},pause:{zh:'击球不会撒谎。这句话让你停了一下。',en:"Your hitting never lies. That stops you for a moment."},choices:[{l:'→',t:{zh:'你们坐下来聊了一会儿。',en:"You sit and talk for a moment."},n:'after_talk'}]},
      tengku_stops:
      {tag:{zh:'球场边，Tengku 叫停',en:"Courtside, Tengku calls a halt"},img:'locker',prog:25,body:{zh:'Tengku 走过来，让你休息。\n\n他问：昨晚睡好了吗？\n\n你愣了一下。不记得睡得如何。但你笃定地感觉到，有什么东西压在心里，被他清晰地捕捉到了。\n\n你问他是怎么看出来的。\n\n他说：你的内心世界，已经全部透明地写在击球里。也许你的思维会撒谎，但击球不会，从不会。\n\n你坐在那里，想了一下这句话。',en:"Tengku comes over and calls a rest.\n\nDid you sleep well last night?\n\nYou pause. You do not remember. But you feel with certainty that something is pressing on you — and he has caught it clearly.\n\nYou ask how he could tell.\n\nHe says: your inner world is written transparently in every shot. Your thoughts might lie. But your hitting never does.\n\nYou sit with that for a moment."},choices:[{l:'→',t:{zh:'Tengku 提议打一盘记分比赛。',en:"Tengku suggests playing a proper set."},n:'match_proposal'}]},
      after_talk:
      {tag:{zh:'重新站上场',en:"Back on court"},img:'tennis',prog:30,body:{zh:'喝完水，你重新站上了底线。\n\n没有做什么特别的准备。只是站着，等球。\n\n然后Tengku提议：我们打一盘记分比赛吧。\n\n你点头。',en:"After the water, you stand on the baseline again.\n\nNo special preparation. Just standing. Waiting for the ball.\n\nThen Tengku suggests: let's play a proper set, keep score.\n\nYou nod."},choices:[{l:'→',t:{zh:'第一分开始了。',en:"The first point begins."},n:'zone_entry'}]},
      match_proposal:
      {tag:{zh:'记分比赛',en:"A scored set"},img:'tennis',prog:32,body:{zh:'Tengku 提议打一盘记分比赛。\n\n这个间隙好像打断了什么。当你重新站上场，脚踩在底线位置，望向隔网远处，脑海中一片空白——所有的思绪仍在缓冲中，尚未来得及加载。\n\n你没有主动做任何事，只是站在那里。',en:"Tengku suggests playing a proper set.\n\nThis gap seems to break something. When you stand on the baseline again, looking across the net, your mind is blank — all the thoughts still buffering, not yet loaded.\n\nYou do not do anything deliberately. You just stand there."},choices:[{l:'→',t:{zh:'第一分开始了。',en:"The first point begins."},n:'zone_entry'}]},
      zone_entry:
      {tag:{zh:'第一分',en:"The first point"},img:'tennis',prog:55,body:{zh:'球飞过来。\n\n你没有想任何事。准备提前了，步伐跟上了，拍面对准了，球落在你想要的地方。\n\n然后又一球，又一球。\n\n你没有叫它来，但它来了——盯球更清楚，准备更提前，步伐更勤快，击打更准确。零失误拿到三个破发点，然后一鼓作气完成破发。\n\n这是你练习以来第一次拿下教练的发球局。而且是连下四分的方式。\n\n你几乎不敢相信。',en:"The ball comes over.\n\nYou are not thinking about anything. Preparation is earlier, footwork follows, the racket face aligns, the ball lands where you want it.\n\nThen another. And another.\n\nYou did not summon it, but it came — tracking the ball more clearly, preparing earlier, feet moving quicker, striking more accurately. Zero errors, three break points, then the break itself.\n\nThis is the first time you have broken Tengku's serve since you started training. With four straight points.\n\nYou can barely believe it."},pause:{zh:'你不知道自己做了什么。它只是发生了。',en:"You do not know what you did. It just happened."},choices:[{l:'A',t:{zh:'状态太好了，想搞清楚自己做对了什么，把它延续下去。',en:"The state is extraordinary. You want to understand what you did right and keep it going."},n:'analyze_zone',c:true},{l:'B',t:{zh:'什么都不想，就让它继续发生。',en:"Think nothing. Let it keep happening."},n:'stay_zone'}]},
      stay_zone:
      {tag:{zh:'继续打',en:"Continuing"},img:'tennis',prog:72,body:{zh:'你没有去想。\n\n球来，你打。步伐、引拍、随挥——连贯地发生，不需要指挥。\n\n这个状态延续了六局，比分来到3:3。这是你练习以来最好的一段表现。\n\nTengku 在对面打得更认真了，但你能感觉到他眼睛里有一种你以前没见过的东西。',en:"You do not think.\n\nBall comes, you hit. Footwork, backswing, follow-through — happening in sequence, without direction.\n\nThe state holds for six games. Score reaches 3-3. The best stretch of play since you started training.\n\nTengku is playing more seriously across the net. But you can sense something in his eyes you have not seen before."},choices:[{l:'→',t:{zh:'然后一个念头出现了。',en:"Then a thought arrives."},n:'thought_arrives'}]},
      analyze_zone:
      {tag:{zh:'你开始想',en:"You start thinking"},img:'tennis',prog:65,body:{zh:'你开始琢磨：刚才到底做对了什么？\n\n是步伐？是引拍时机？还是什么别的？\n\n你想把它找出来，复制它，延续这个状态。\n\n但就在这个念头出现之后，击球开始走偏。不是一下，是慢慢的，越来越偏，像沙漏里的沙，在你没注意到的地方，悄悄流走了。',en:"You start to work it out: what exactly did you do right just then?\n\nWas it the footwork? The timing of the backswing? Something else?\n\nYou want to identify it, replicate it, extend the state.\n\nBut from the moment this thought appears, the hitting starts to drift. Not all at once — slowly, gradually further off, like sand in an hourglass, slipping away somewhere you were not watching."},nudge:{zh:'你开始想要捉住它的那一刻，它就已经走了。',en:"The moment you tried to hold it, it was already leaving."},choices:[{l:'→',t:{zh:'你飞快丢掉了接下来三局。',en:"You quickly lose the next three games."},n:'losing_streak'}]},
      thought_arrives:
      {tag:{zh:'一个念头',en:"A thought"},img:'tennis',prog:80,body:{zh:'3:3。\n\n你站在底线，忽然意识到——自己刚才打了多么不可思议的六局。\n\n于是一个念头出现了：我刚才到底做对了什么？\n\n就那么一下，思绪动了。\n\n接下来三局，你飞快丢掉了。',en:"3-3.\n\nYou stand on the baseline and suddenly realise — what an extraordinary six games you just played.\n\nA thought arrives: what exactly did I do right just then?\n\nJust that movement of thought.\n\nYou lose the next three games quickly."},choices:[{l:'→',t:{zh:'3:6 告负。Tengku 走过来。',en:"3-6. Tengku comes over."},n:'tengku_end'}]},
      losing_streak:
      {tag:{zh:'比分滑落',en:"The score slides"},img:'tennis',prog:82,body:{zh:'3局，飞快丢掉。\n\n3:6 告负。\n\n你坐在椅子上，脑子里同时存在两种感受：那六局的不可思议，和这三局的迅速崩盘。\n\nTengku 走过来，在旁边坐下。',en:"Three games. Lost quickly.\n\n3-6. Defeat.\n\nYou sit in the chair, holding two feelings at once: the extraordinary six games, and the rapid collapse of these three.\n\nTengku comes over and sits beside you."},choices:[{l:'→',t:{zh:'他说了一句话。',en:"He says something."},n:'tengku_end'}]},
      tengku_end:
      {tag:{zh:'球场边，练习结束后',en:"Courtside, after practice"},img:'locker',prog:90,body:{zh:'Tengku 坐在旁边。\n\n他说：你知道那六局你在做什么吗？\n\n你说：什么都没想。\n\n他点头。然后他说：你不关注的时候，那个状态自然就出来了。你开始想要它，它就走了。积极暗示也好，自我评判也好，背后是同一件事——预期。你把注意力全部放在结果和预期的差距上，身体就没有空间了。\n\n你坐在那里，听着。\n\n然后他补了一句：每一分开始前，做一次归零。然后只管去打。',en:"Tengku sits beside you.\n\nHe says: do you know what you were doing in those six games?\n\nYou say: not thinking about anything.\n\nHe nods. Then: when you stopped paying attention, the state appeared naturally. When you wanted it, it left. Positive self-talk, self-judgment — at their core they are the same thing: expectation. When all your attention goes to the gap between result and expectation, the body has no space left.\n\nYou sit and listen.\n\nThen he adds: before each point, reset to zero. Then just play."},pause:{zh:'每一分开始前，做一次归零。然后只管去打。',en:"Before each point, reset to zero. Then just play."},choices:[{l:'→',t:{zh:'你想了很久这句话。',en:"You sit with this for a long time."},n:'end_full'}]},
      end_full:
      {tag:{zh:'练习结束后，回家路上',en:"On the way home after practice"},img:'rain',prog:100,body:{zh:'',en:""},choices:[],isEnd:true,endType:'full',title:{zh:'你即你的击球，而击球不会撒谎',en:"You Are Your Hitting, and Hitting Never Lies"},story:{zh:'你想到那六局。\n\n那时候你没有在想任何事，球就来了，你就打了，步伐、引拍、随挥——连贯地发生，不需要指挥。那个状态不是被努力出来的，也不是被积极心理暗示召唤来的。它是在你停下来、脑子清空的那一刻，自己出现的。\n\n然后你开始想要理解它，想要复制它，它就走了。\n\n你想到 Tengku 那句话——积极暗示和自我评判，背后是同一件事：预期。两者都把注意力投射在实际与预期的差距上。虽然一个是正向的，一个是负向的，但它们做的是同一件事：把心带离了当下。\n\n然后你想到另一句：每一分开始前，做一次归零。\n\n不是忘掉上一分，是不把它带进下一分。\n\n<em>究竟哪个是真正的我——那个有如神助的我，还是低迷不振的我？也许完整的你，像一把游标卡尺，而当下的你，只是其中一个切片。你打出什么样的球，不是你是谁，只是这一刻你在哪里。</em>',en:"You think about those six games.\n\nYou were not thinking about anything. The ball came, you hit it, footwork, backswing, follow-through — happening in sequence, without direction. That state was not produced by effort, or summoned by positive self-talk. It appeared by itself in the moment you stopped, when your mind went quiet.\n\nThen you tried to understand it, replicate it. And it left.\n\nYou think about what Tengku said — positive self-talk and self-judgment are the same thing at their core: expectation. Both direct attention toward the gap between result and expectation. One is framed positively, one negatively, but they do the same thing: they take the mind away from now.\n\nThen you think about the other thing he said: before each point, reset to zero.\n\nNot forgetting the last point. Not carrying it into the next one.\n\n<em>Which is the real you — the one playing with extraordinary ease, or the one stuck in a slump? Maybe the complete you is like a measuring instrument, and the present you is just one reading on its scale. What kind of shot you hit is not who you are. It is only where you are, in this moment.</em>"},insight:{zh:'积极心理暗示不是没用，只是它和自我评判一样，都暗含了预期。真正的平静不是告诉自己没问题，而是在下一分开始前，真正地放下上一分。',en:"Positive self-talk is not useless — but like self-judgment, it contains expectation. Real composure is not telling yourself things are fine. It is genuinely releasing the last point before the next one begins."}},
      end_partial:
      {tag:{zh:'练习结束，还在想',en:"After practice, still thinking"},img:'rain',prog:90,body:{zh:'',en:""},choices:[],isEnd:true,endType:'reflective',title:{zh:'那六局，和它消失的那一刻',en:"Those Six Games, and the Moment They Left"},story:{zh:'你还在想那六局。\n\n那时候你什么都没想，球就打对了。然后你开始想要理解它，想要延续它，它就走了。\n\n你想不明白这件事——不是因为它太复杂，而是因为它太简单，简单到让你不知道该怎么相信它。\n\n你想起 Tengku 的那句话：积极暗示也好，自我评判也好，背后是同一件事——预期。\n\n也许有些状态，不是靠寻找得来的。它们只在你不找的时候，悄悄出现。\n\n<em>这不是一个你现在就能完全理解的事情。但它发生过——那六局是真实的，你打出了那些球，那个状态是真实的。这就够了，先记住它。</em>',en:"You are still thinking about those six games.\n\nYou were not thinking about anything, and the hitting was right. Then you tried to understand it, to extend it, and it left.\n\nYou cannot quite work it out — not because it is too complicated, but because it is too simple. Simple enough that you do not know how to trust it.\n\nYou think of what Tengku said: positive self-talk and self-judgment, at their core, are the same thing — expectation.\n\nMaybe some states cannot be found. They appear only when you stop looking.\n\n<em>This is not something you can fully understand right now. But it happened — those six games were real, you hit those shots, that state was real. That is enough. Remember it first.</em>"},insight:{zh:'不是每一次领悟都能在发生的当天就完全消化。有些东西，需要在以后某一次练习里，突然想起来，才真正明白。',en:"Not every insight can be fully absorbed on the day it happens. Some things only become clear later — in a future session, when something suddenly reminds you."}}
    }
  }

  {
    id:'cat',category:'daily',template:'C',level:1,
    tag:{zh:'日常 · 真实改编',en:"Daily Life · Based on a true story"},
    title:{zh:'愿无所拘束的活下去',en:"May We Live Without Restraint"},
    desc:{zh:'一只叫大咪的猫，三年，一个平常傍晚的质地。以及他一直在静静教你的事。',en:"A cat named Dami. Three years. The texture of daily life, and what he has been quietly teaching you."},
    cover:'home',
    meta:[{zh:'约 6 分钟',en:"~6 min"},{zh:'一个傍晚',en:"One evening"},{zh:'真实故事',en:"True story"}],
    keywords:['猫','养猫','日常','独居','阯伴','当下','安静','生活'],
    scenes:{
      start:
      {tag:{zh:'某个下班的傍晚',en:"A weekday evening, coming home"},img:'night',prog:8,body:{zh:'钥匙插进去，门开了。\n\n他已经在那里了。\n\n不是等在门口的那种——是听到声音，从某处缓缓走过来，走廊上爪子踩出轻微的声响。鼻头红彤彤的，说明刚才在玩。\n\n他停在你面前，看着你。\n\n你放下包，也看着他。',en:"Key in, door open.\n\nHe is already there.\n\nNot waiting at the door — he heard you and walked over slowly from somewhere, his paws making soft sounds on the hallway floor. His nose is pink-red, which means he was just playing.\n\nHe stops in front of you and looks at you.\n\nYou put down your bag and look back."},choices:[{l:'A',t:{zh:'蹲下来，把手伸向他。',en:"Crouch down and reach your hand toward him."},n:'touch'},{l:'B',t:{zh:'先站着，等他过来。',en:"Stay standing. Wait for him to come to you."},n:'wait'}]},
      wait:
      {tag:{zh:'走廊里，对视',en:"In the hallway, looking at each other"},img:'night',prog:18,body:{zh:'你没有动。\n\n他也没有动。\n\n然后他开口了——ngha，ngha，眼睛圆圆的，古铜色，满是疑惑和迫不及待。\n\n你笑了，把手伸过去。他立刻踮起四肢，脑袋微微用力地顶着你的手心。\n\n你们已经这样做过上千次了，每次都像第一次一样自然。',en:"You do not move.\n\nNeither does he.\n\nThen he opens his mouth — ngha, ngha — eyes wide and copper-coloured, full of puzzlement and urgency.\n\nYou smile and reach your hand out. He immediately lifts onto his toes, head pushing gently but firmly into your palm.\n\nYou have done this a thousand times. Each time feels as natural as the first."},choices:[{l:'→',t:{zh:'进屋，开始这个晚上。',en:"Go inside. The evening begins."},n:'living_room'}]},
      touch:
      {tag:{zh:'走廊里，蹲下来',en:"In the hallway, crouching down"},img:'night',prog:18,body:{zh:'他立刻踮起四肢，脑袋微微用力地顶着你的手心。\n\n这个动作你们已经重复过上千次了——他总是这样，主动迎上来那么一点点，好像在说，我也想。\n\n他的毛是温的，鼻头还是热的，刚才玩得很尽兴。\n\n你在走廊里蹲了一会儿，没有急着站起来。',en:"He immediately lifts onto his toes, his head pushing gently but firmly into your palm.\n\nYou have repeated this gesture a thousand times — he always does this, meeting you just that little bit, as if to say, me too.\n\nHis fur is warm. His nose is still hot from playing.\n\nYou stay crouched in the hallway for a moment, in no hurry to stand."},choices:[{l:'→',t:{zh:'进屋，开始这个晚上。',en:"Go inside. The evening begins."},n:'living_room'}]},
      living_room:
      {tag:{zh:'客厅，晚上',en:"Living room, evening"},img:'home',prog:30,body:{zh:'客厅里空荡荡的，没什么摆件——他搬来没多久，龟背竹和天堂鸟就被破坏殆尽了。玻璃制品碎了好几个。后来干脆什么都不放，看上去家徒四壁。\n\n但你早就习惯了，甚至觉得清爽。\n\n他在沙发上蹲着，尾巴卷成一圈，看你在屋里走动。你经过他旁边，他用额头蹭了一下你的腿，不动声色地标记气味。\n\n你把腿往旁边挪了一步，假装没给他蹭到。他高高扬起尾巴，又倾过来蹭了一下。\n\n就是这么锲而不舍。',en:"The living room is sparse, not much on the shelves — shortly after he moved in, the plants were destroyed, a few glass things broken. Eventually you stopped putting anything out. It looks bare but you got used to it. Actually you find it clean.\n\nHe is crouched on the sofa, tail curled into a ring, watching you move around the room. As you pass, he rubs his forehead against your leg, marking his scent without making a fuss about it.\n\nYou move your leg a step sideways, pretending not to give him the opportunity. He lifts his tail high and leans over to do it again.\n\nThis is just how he is. Persistent."},choices:[{l:'A',t:{zh:'在沙发上坐下来。',en:"Sit down on the sofa."},n:'sofa'},{l:'B',t:{zh:'去厨房倒杯水，他跟过来了。',en:"Go to the kitchen for water. He follows."},n:'kitchen'}]},
      kitchen:
      {tag:{zh:'厨房，他跟过来了',en:"Kitchen, he followed you"},img:'cafe',prog:38,body:{zh:'你去倒杯水，他也跟了过来。\n\n没有什么理由。你去哪里，他就在不远处出现。\n\n他坐在厨房地板上，看你倒水，然后看你把杯子放下，然后看你准备离开，然后站起来，跟你一起走回客厅。\n\n不粘，不吵，只是在。\n\n你想，他大概不需要你一直陪着，他只是喜欢知道你在。',en:"You go to pour some water. He comes along.\n\nNo particular reason. Wherever you go, he appears nearby.\n\nHe sits on the kitchen floor and watches you pour, watches you put the glass down, watches you prepare to leave, then stands and walks back to the living room with you.\n\nNot clingy. Not loud. Just there.\n\nYou think he probably does not need you to be with him constantly. He just likes knowing you are around."},choices:[{l:'→',t:{zh:'回到沙发上。',en:"Back to the sofa."},n:'sofa'}]},
      sofa:
      {tag:{zh:'沙发上，过了一会儿',en:"On the sofa, a while later"},img:'home',prog:50,body:{zh:'你躺下来。\n\n没过多久，他跳上来，在你大腿上蹲稳，收起爪子，尾巴轻轻扫了两下，然后定住。\n\n然后是那个声音——呼噜，呼噜，低沉而均匀，像一台小型的、运转正常的机器。\n\n你第一次听到这个声音时以为他感冒了，呼吸不畅。后来才知道，这是他非常享受当下的信号。\n\n屋里很安静，只有呼噜声。',en:"You lie down.\n\nNot long after, he jumps up and settles on your thighs, tucks his paws in, gives his tail a couple of light sweeps, then goes still.\n\nThen that sound — purring, low and steady, like a small machine running smoothly.\n\nThe first time you heard it you thought he had a cold, his breathing obstructed. Later you learned this is his signal for deep contentment.\n\nThe room is quiet. Just the purring."},pause:{zh:'你上一次在家里什么都不做，是什么时候的事了。',en:"When was the last time you did nothing at home."},choices:[{l:'A',t:{zh:'抚摸他的脑袋，揉揉肚子。',en:"Stroke his head. Rub his belly."},n:'knead'},{l:'B',t:{zh:'就这样，什么都不做，听着他。',en:"Stay still. Do nothing. Just listen."},n:'just_listen'}]},
      just_listen:
      {tag:{zh:'沙发上，听着',en:"On the sofa, listening"},img:'home',prog:60,body:{zh:'你什么都没做。\n\n就听着他的呼噜声，低沉而均匀，随着他的呼吸起伏。\n\n外面偶尔有车声，楼道里偶尔有脚步声，但都是远的。这里很安静。\n\n你不知道自己在想什么，或者说，你没有在特别想什么。只是在这里，感受到他的重量压在大腿上，温热的，一动不动。\n\n你意识到，你已经很久没有这样了——什么都不做，只是在。',en:"You do nothing.\n\nJust listening to his purring, low and steady, rising and falling with his breathing.\n\nOccasionally a car outside, occasionally footsteps in the hallway, but all distant. It is quiet here.\n\nYou do not know what you are thinking, or rather, you are not thinking about anything in particular. Just here, feeling his weight on your thighs, warm, motionless.\n\nYou realise it has been a long time since you were like this — doing nothing. Just being."},choices:[{l:'→',t:{zh:'过了一会儿，他开始踩奶。',en:"After a while, he starts kneading."},n:'knead'}]},
      knead:
      {tag:{zh:'踩奶',en:"Kneading"},img:'home',prog:70,body:{zh:'他开始踩奶了。\n\n前爪一下一下，有节奏地踩在你的腿上，眼睛微微眯起，表情心满意足。\n\n这是猫小时候刚出生、为了获取母乳的动作，但离开母亲之后，长大了，还是会这样做。你觉得，这大概是他表达依赖和羁绊的方式。\n\n他的爪子不算重，但能感受到每一下的力道。踩着踩着，你发现自己的肩膀不知道什么时候松下来了。',en:"He starts kneading.\n\nFront paws, one after the other, pressing rhythmically into your leg, eyes half-closed, expression fully satisfied.\n\nThis is what kittens do at birth to get milk from their mother. He left his mother long ago. He still does this. You think it is probably his way of expressing attachment.\n\nHis paws are not heavy, but you can feel each press. Somewhere in the middle of it, you notice your shoulders have come down."},choices:[{l:'→',t:{zh:'他慢慢安静下来，趴稳了。',en:"He gradually settles, lying flat and still."},n:'sleeping'}]},
      sleeping:
      {tag:{zh:'他睡着了',en:"He falls asleep"},img:'home',prog:82,body:{zh:'呼噜声慢慢低了下去，踩奶的动作也停了。\n\n他趴在你腿上，闭着眼睛，呼吸变得缓慢而深长。\n\n你没有动。\n\n窗外的光已经暗了，屋里也没开灯。你就在半暗中坐着，他在你腿上睡着，发出轻微的呼吸声。\n\n这一方天地不大，但此刻，它是完整的。',en:"The purring gradually fades. The kneading stops.\n\nHe lies flat on your legs, eyes closed, breathing becoming slow and deep.\n\nYou do not move.\n\nThe light outside has darkened. You have not turned on the lights inside. You sit in the half-dark, him asleep on your legs, the faint sound of his breathing.\n\nThis space is small. But right now, it is complete."},choices:[{l:'A',t:{zh:'轻轻摸了摸他，他动了一下，没醒。',en:"You reach down and touch him lightly. He stirs but does not wake."},n:'touch_sleeping'},{l:'B',t:{zh:'就这样坐着，不打扰他。',en:"Stay still. Do not disturb him."},n:'end_still'}]},
      touch_sleeping:
      {tag:{zh:'他动了一下',en:"He stirs"},img:'home',prog:90,body:{zh:'他动了一下，身体往你腿上更贴了一点，又沉下去，继续睡。\n\n你把手放在他背上，能感受到他呼吸时轻微的起伏。\n\n你想起他刚来的时候，四个多月大，像个长条子，轻盈地吱溜乱窜。那时候你以为他可能刻着瘦的基因。\n\n现在他是心宽体胖的猪咪了，压在你腿上，沉甸甸的，踏实。\n\n三年了。',en:"He shifts, pressing himself a little closer into your legs, then sinks back down and keeps sleeping.\n\nYou rest your hand on his back and feel the slight rise and fall of his breathing.\n\nYou think of when he first arrived, four months old, all stretched out and darting around lightly. You thought he might have a lean constitution.\n\nNow he is a plump, contented cat, heavy on your legs, solid.\n\nThree years."},choices:[{l:'→',t:{zh:'窗外的天完全黑了。',en:"Outside, the sky has gone completely dark."},n:'end_still'}]},
      end_still:
      {tag:{zh:'这个晚上',en:"This evening"},img:'night',prog:100,body:{zh:'',en:""},choices:[],isEnd:true,endType:'full',title:{zh:'愿无所拘束的活下去',en:"May We Live Without Restraint"},story:{zh:'你在这里坐了很久。\n\n他在你腿上睡着了，屋里没开灯，外面的车声偶尔传进来，又消失。\n\n你不知道自己有没有想什么。大概没有。只是在，只是坐着，只是感受他压在腿上的重量，温热的，均匀呼吸着。\n\n你想到他的名字，想到三年里那些日常——鼻头红彤彤说明刚在玩，长假回来他扒拉一整晚房门，客厅里什么都不放空荡荡的，他锲而不舍地用额头蹭你的腿。\n\n没有一件是大事。\n\n但加在一起，是生活的质地。是某种你说不太清楚的、却实实在在存在的东西。\n\n窗外是夜晚的城市，屋里是安静的他。<em>他毫不介意房屋不大，毫不介意陪伴有限，就在这一方天地里，充分享受着每一天。</em>\n\n你想，也许这就是他一直在教你的事。',en:"You have been sitting here for a long time.\n\nHe is asleep on your legs. The lights are off. The sound of cars outside comes and goes.\n\nYou do not know if you have been thinking about anything. Probably not. Just here, just sitting, just feeling his weight on your legs, warm, breathing steadily.\n\nYou think of his name, of three years of ordinary things — nose pink-red from just playing, pawing at the door all night when you returned from a long trip, the living room bare and clear, the way he presses his forehead against your leg and keeps going.\n\nNone of it is significant.\n\nBut together, it is the texture of a life. Something you cannot quite name but that is undeniably there.\n\nOutside is the night city. Inside is his quiet presence. <em>He does not mind that the space is small. Does not mind that company is limited. He simply lives each day fully, in this small world of his.</em>\n\nYou think: maybe this is what he has been teaching you all along."},insight:{zh:'有些东西，只有和动物在一起才会出现——不是顿悟，不是改变，只是某种被拉回当下的感觉。他不问你今天过得怎样，不需要你表现什么，他只是在，你也只是在，这已经是一件完整的事了。',en:"Some things only appear when you are with an animal — not a revelation, not a change, just a feeling of being pulled back to now. He does not ask how your day was. Does not need you to perform anything. He is simply here, and so are you, and that is already something complete."}}
    }
  }
